# Test environment — Metasploitable2 + DVWA vulnerable targets
#
# Live LLM tests: pass .env.live for real AI provider credentials:
#   docker compose -f docker/docker-compose.test.yml --env-file .env.live \
#     run --rm test-runner sh -c "pytest tests/integration/ -v"
#
# Vulnerable scan targets: use --profile targets to start lightweight targets:
#   docker compose -f docker/docker-compose.test.yml --profile targets up -d
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: spectra
      POSTGRES_PASSWORD: spectra_test
      POSTGRES_DB: spectra_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectra -d spectra_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - spectra_test

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - spectra_test

  garage:
    image: dxflrs/garage:v2.2.0
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
      - ./garage.toml:/etc/garage.toml:ro
    ports:
      - "19000:3900"
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - spectra_test

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    env_file:
      - ../.env.test
    environment:
      # Override database for container network
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      - S3_ENDPOINT_URL=http://garage:3900
      - S3_ACCESS_KEY=${GARAGE_ACCESS_KEY:-GK0123456789abcdef01234567}
      - S3_SECRET_KEY=${GARAGE_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - TEST_TARGET_IP=metasploitable
      - TEST_TARGET_URL=http://metasploitable
      - PLUGIN_SAFE_MODE=false
      - RATE_LIMIT_STORAGE=redis://redis:6379/0
    ports:
      - "15000:5000"
    volumes:
      - ../app:/app/app:ro
      - ../alembic:/app/alembic:ro
      - ../config/alembic.ini:/app/config/alembic.ini:ro
      - ../plugins:/app/plugins
      - ../tests:/app/tests:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      garage:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      spectra_test:
        aliases:
          - spectra-ui-app

  app-replica:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    env_file:
      - ../.env.test
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      - S3_ENDPOINT_URL=http://garage:3900
      - S3_ACCESS_KEY=${GARAGE_ACCESS_KEY:-GK0123456789abcdef01234567}
      - S3_SECRET_KEY=${GARAGE_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - TEST_TARGET_IP=metasploitable
      - TEST_TARGET_URL=http://metasploitable
      - PLUGIN_SAFE_MODE=false
      - RATE_LIMIT_STORAGE=redis://redis:6379/0
    ports:
      - "15001:5000"
    volumes:
      - ../app:/app/app:ro
      - ../alembic:/app/alembic:ro
      - ../config/alembic.ini:/app/config/alembic.ini:ro
      - ../plugins:/app/plugins
      - ../tests:/app/tests:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      garage:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      spectra_test:
        aliases:
          - spectra-ui-app-replica

  caddy:
    build:
      context: ..
      dockerfile: docker/Dockerfile.caddy
    ports:
      - "15080:80"
    volumes:
      - ./Caddyfile.test:/etc/caddy/Caddyfile:ro
    depends_on:
      app:
        condition: service_healthy
      app-replica:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - spectra_test

  tools:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tools
    env_file:
      - ../.env.test
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      - S3_ENDPOINT_URL=http://garage:3900
      - S3_ACCESS_KEY=${GARAGE_ACCESS_KEY:-GK0123456789abcdef01234567}
      - S3_SECRET_KEY=${GARAGE_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    volumes:
      - ../plugins:/app/plugins
      - ../app:/app/app:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - spectra_test

  # Vulnerable target for E2E testing
  metasploitable:
    image: tleemcjr/metasploitable2
    tty: true
    networks:
      spectra_test:
        ipv4_address: 172.21.0.5

  # DVWA - Damn Vulnerable Web Application
  dvwa:
    image: vulnerables/web-dvwa
    environment:
      - MYSQL_ROOT_PASSWORD=dvwa
    networks:
      spectra_test:
        ipv4_address: 172.21.0.6
    # DVWA exposes HTTP on port 80

  # Test runner service
  test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tools
    user: root
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - seccomp:unconfined
    entrypoint: ["sh", "-c"]
    command:
      - >-
        pip install -q pytest pytest-asyncio pytest-dotenv httpx aiohttp aiosqlite websockets &&
        python3 -m pytest tests/ -v --tb=short -x
    env_file:
      - ../.env.test
    environment:
      # Override for test environment
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      - S3_ENDPOINT_URL=http://garage:3900
      - S3_ACCESS_KEY=${GARAGE_ACCESS_KEY:-GK0123456789abcdef01234567}
      - S3_SECRET_KEY=${GARAGE_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - TEST_TARGET_IP=172.21.0.5
      - TEST_TARGET_URL=http://172.21.0.5
      - METASPLOITABLE_AVAILABLE=true
      - DVWA_URL=http://172.21.0.6
      - WEB_TARGET_URL=http://testphp.vulnweb.com
      - PLUGIN_SAFE_MODE=false
      - SAFE_MODE=true
      - PERMISSION_BOUNDARY=172.21.0.0/24
    volumes:
      - ../app:/app/app:ro
      - ../tests:/app/tests:ro
      - ../plugins:/app/plugins
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      garage:
        condition: service_healthy
      metasploitable:
        condition: service_started
      dvwa:
        condition: service_started
      tools:
        condition: service_healthy
    networks:
      - spectra_test

  load-test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    user: root
    entrypoint: ["sh", "-c"]
    command:
      - >-
        pip install -q pytest pytest-asyncio pytest-dotenv httpx redis websockets &&
        python3 -m pytest tests/load tests/performance tests/soak tests/integration/test_queue.py
        -m "load or performance or soak" -q --override-ini=addopts=
    env_file:
      - ../.env.test
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      - S3_ENDPOINT_URL=http://garage:3900
      - S3_ACCESS_KEY=${GARAGE_ACCESS_KEY:-GK0123456789abcdef01234567}
      - S3_SECRET_KEY=${GARAGE_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - RATE_LIMIT_STORAGE=redis://redis:6379/0
      - LOAD_TEST_APP_URL=http://app:5000
      - LOAD_TEST_APP_REPLICA_URL=http://app-replica:5000
      - LOAD_TEST_CADDY_URL=http://caddy
      - LOAD_TEST_RESET_RATE_LIMIT_STATE=1
      - FULLY_AUTOMATED=true
      - PLUGIN_SAFE_MODE=false
    volumes:
      - ../.env.test:/app/.env.test:ro
      - ../app:/app/app:ro
      - ../tests:/app/tests:ro
      - ../pyproject.toml:/app/pyproject.toml:ro
      - ../alembic:/app/alembic:ro
      - ../config/alembic.ini:/app/config/alembic.ini:ro
      - ../plugins:/app/plugins:ro
    depends_on:
      db:
        condition: service_healthy
      garage:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
      app-replica:
        condition: service_healthy
      caddy:
        condition: service_healthy
      tools:
        condition: service_healthy
    networks:
      - spectra_test

  # Targeted settings/setup/router validation that stays containerized without
  # requiring the full live test stack, while still joining the compose test network.
  settings-test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    user: root
    entrypoint: ["sh", "-c"]
    command:
      - >-
        python -m pip install -q pytest pytest-asyncio pytest-dotenv &&
        python -m pytest
        tests/unit/test_runtime_settings.py
        tests/unit/test_system_setup.py
        tests/unit/test_smart_router.py
        tests/unit/test_settings_runtime_api.py
        tests/unit/test_settings_templates.py
        -q --override-ini=addopts=
    env_file:
      - ../.env.test
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      - S3_ENDPOINT_URL=http://garage:3900
      - S3_ACCESS_KEY=${GARAGE_ACCESS_KEY:-GK0123456789abcdef01234567}
      - S3_SECRET_KEY=${GARAGE_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - TENSORZERO_GATEWAY_URL=http://tensorzero:3000
      - FULLY_AUTOMATED=true
      - PLUGIN_SAFE_MODE=false
    volumes:
      - ../.env.test:/app/.env.test:ro
      - ../app:/app/app:ro
      - ../tests:/app/tests:ro
      - ../pyproject.toml:/app/pyproject.toml:ro
      - ../alembic:/app/alembic:ro
      - ../config/alembic.ini:/app/config/alembic.ini:ro
      - ../plugins:/app/plugins:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - spectra_test

  # Lightweight unit-test runner — no live services required
  unit-test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    user: root
    entrypoint: ["sh", "-c"]
    command:
      - >-
        python -m pip install -q pytest pytest-asyncio pytest-dotenv pytest-cov &&
        python -m pytest tests/unit/ -q --override-ini=addopts=
    env_file:
      - ../.env.test
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      - S3_ENDPOINT_URL=http://garage:3900
      - S3_ACCESS_KEY=${GARAGE_ACCESS_KEY:-GK0123456789abcdef01234567}
      - S3_SECRET_KEY=${GARAGE_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - TENSORZERO_GATEWAY_URL=http://tensorzero:3000
      - FULLY_AUTOMATED=true
      - PLUGIN_SAFE_MODE=false
    volumes:
      - ../.env.test:/app/.env.test:ro
      - ../app:/app/app:ro
      - ../tests:/app/tests:ro
      - ../pyproject.toml:/app/pyproject.toml:ro
      - ../alembic:/app/alembic:ro
      - ../config/alembic.ini:/app/config/alembic.ini:ro
      - ../plugins:/app/plugins:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - spectra_test

  # Playwright browser test runner
  ui-test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.playwright
    entrypoint: ["python3", "-m", "pytest"]
    command: ["tests/e2e/ui/", "-v", "--tb=short", "-x", "--no-cov", "--confcutdir=tests/e2e/ui", "--override-ini=addopts="]
    env_file:
      - ../.env.test
    environment:
      - APP_BASE_URL=http://host.docker.internal:15000
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
    volumes:
      - ../tests:/app/tests:ro
      - ../app:/app/app:ro
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - spectra_test

  # ── Vulnerable Test Targets (--profile targets) ─────────────
  # Lightweight purpose-built containers for live scan testing.
  # Start with: docker compose -f docker/docker-compose.test.yml --profile targets up -d
  vuln-web:
    build:
      context: targets
      dockerfile: Dockerfile.vuln-web
    container_name: spectra-vuln-web
    profiles: ["targets"]
    labels:
      spectra.role: test-target
      spectra.target: vuln-web
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/')"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    networks:
      - spectra_test

  vuln-ssh:
    build:
      context: targets
      dockerfile: Dockerfile.vuln-ssh
    container_name: spectra-vuln-ssh
    profiles: ["targets"]
    labels:
      spectra.role: test-target
      spectra.target: vuln-ssh
    expose:
      - "22"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "22"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 32M
    networks:
      - spectra_test

  vuln-network:
    build:
      context: targets
      dockerfile: Dockerfile.vuln-network
    container_name: spectra-vuln-network
    profiles: ["targets"]
    labels:
      spectra.role: test-target
      spectra.target: vuln-network
    expose:
      - "21"
      - "80"
      - "443"
      - "3306"
    healthcheck:
      test: ["CMD-SHELL", "echo | nc -w 1 localhost 80"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 32M
    networks:
      - spectra_test

networks:
  spectra_test:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
          gateway: 172.21.0.1

volumes:
  garage_meta:
  garage_data:
