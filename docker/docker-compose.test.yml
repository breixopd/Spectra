# Test environment — Metasploitable2 + DVWA vulnerable targets
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: spectra
      POSTGRES_PASSWORD: spectra_test
      POSTGRES_DB: spectra_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectra -d spectra_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - spectra_test

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    env_file:
      - ../.env.test
    environment:
      # Override database for container network
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      - TEST_TARGET_IP=metasploitable
      - TEST_TARGET_URL=http://metasploitable
      - PLUGIN_SAFE_MODE=false
    volumes:
      - ../app:/app/app:ro
      - ../alembic:/app/alembic:ro
      - ../alembic.ini:/app/alembic.ini:ro
      - ../plugins:/app/plugins
      - ../tests:/app/tests:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    networks:
      spectra_test:
        aliases:
          - spectra-ui-app

  tools:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tools
    env_file:
      - ../.env.test
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
    volumes:
      - ../plugins:/app/plugins
      - ../app:/app/app:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - spectra_test

  # Vulnerable target for E2E testing
  metasploitable:
    image: tleemcjr/metasploitable2
    tty: true
    networks:
      spectra_test:
        ipv4_address: 172.21.0.5

  # DVWA - Damn Vulnerable Web Application
  dvwa:
    image: vulnerables/web-dvwa
    environment:
      - MYSQL_ROOT_PASSWORD=dvwa
    networks:
      spectra_test:
        ipv4_address: 172.21.0.6
    # DVWA exposes HTTP on port 80

  # Test runner service
  test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tools
    user: root
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - seccomp:unconfined
    entrypoint: ["sh", "-c"]
    command:
      - >-
        pip install -q pytest pytest-asyncio pytest-dotenv httpx aiohttp aiosqlite &&
        python3 -m pytest tests/ -v --tb=short -x
    env_file:
      - ../.env.test
    environment:
      # Override for test environment
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      - TEST_TARGET_IP=172.21.0.5
      - TEST_TARGET_URL=http://172.21.0.5
      - METASPLOITABLE_AVAILABLE=true
      - DVWA_URL=http://172.21.0.6
      - WEB_TARGET_URL=http://testphp.vulnweb.com
      - PLUGIN_SAFE_MODE=false
      - SAFE_MODE=true
      - PERMISSION_BOUNDARY=172.21.0.0/24
    volumes:
      - ../app:/app/app:ro
      - ../tests:/app/tests:ro
      - ../plugins:/app/plugins
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      metasploitable:
        condition: service_started
      dvwa:
        condition: service_started
      tools:
        condition: service_started
    networks:
      - spectra_test

  # Targeted settings/setup/router validation that stays containerized without
  # depending on the fixed test subnet or the full live test stack.
  settings-test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    user: root
    entrypoint: ["sh", "-c"]
    command:
      - >-
        python -m pip install -q pytest pytest-asyncio pytest-dotenv aiosqlite &&
        python -m pytest
        tests/unit/test_runtime_settings.py
        tests/unit/test_system_setup.py
        tests/unit/test_smart_router.py
        tests/unit/test_settings_runtime_api.py
        tests/unit/test_settings_templates.py
        -q --override-ini=addopts=
    env_file:
      - ../.env.test
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///tmp/settings-flow.db
      - AI_PROVIDER=mock
      - FULLY_AUTOMATED=true
      - PLUGIN_SAFE_MODE=false
    volumes:
      - ../.env.test:/app/.env.test:ro
      - ../app:/app/app:ro
      - ../tests:/app/tests:ro
      - ../pytest.ini:/app/pytest.ini:ro
      - ../alembic:/app/alembic:ro
      - ../alembic.ini:/app/alembic.ini:ro
      - ../plugins:/app/plugins:ro

  # Playwright browser test runner
  ui-test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.playwright
    entrypoint: ["python3", "-m", "pytest"]
    command: ["tests/e2e/ui/", "-v", "--tb=short", "-x", "--confcutdir=tests/e2e/ui", "--override-ini=addopts="]
    env_file:
      - ../.env.test
    environment:
      - APP_BASE_URL=http://spectra-ui-app:5000
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
    volumes:
      - ../tests:/app/tests:ro
      - ../app:/app/app:ro
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - spectra_test

networks:
  spectra_test:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
          gateway: 172.21.0.1
