# Spectra — test stack with vulnerable targets (Metasploitable2 + DVWA)
# Usage: docker compose -f docker/docker-compose.test.yml --profile targets up -d

x-test-env: &test-env
  DATABASE_URL: postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
  S3_ENDPOINT_URL: http://garage:3900
  S3_ACCESS_KEY: ${GARAGE_ACCESS_KEY:-GK0123456789abcdef01234567}
  S3_SECRET_KEY: ${GARAGE_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
  SERVICE_AUTH_SECRET: ${SERVICE_AUTH_SECRET:-test-service-secret-key}
  TENSORZERO_GATEWAY_URL: http://tensorzero:3000
  TOOL_QUEUE_NAME: tools
  PLUGIN_SAFE_MODE: "false"
  COVERAGE_FILE: /tmp/spectra-coverage/.coverage

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: spectra
      POSTGRES_PASSWORD: spectra_test
      POSTGRES_DB: spectra_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectra -d spectra_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "spectra_test_redis"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "spectra_test_redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend

  garage:
    image: dxflrs/garage:v2.2.0
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
      - ./garage.toml:/etc/garage.toml:ro
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - backend

  clickhouse:
    image: clickhouse/clickhouse-server:24.11-alpine
    environment:
      CLICKHOUSE_DB: tensorzero
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_PASSWORD: ""
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend

  tensorzero:
    image: ${TENSORZERO_IMAGE:-tensorzero/gateway:latest}
    command: ["--config-file", "/app/config/tensorzero.toml"]
    volumes:
      - ../config/tensorzero.toml:/app/config/tensorzero.toml:ro
    env_file:
      - ../.env.test
    environment:
      TENSORZERO_CONFIG_FILE: /app/config/tensorzero.toml
      TENSORZERO_CLICKHOUSE_URL: http://clickhouse:8123/tensorzero
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
    networks:
      - frontend
      - backend

  ai-svc:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ai
    environment:
      <<: *test-env
      DATABASE_URL: postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      DATABASE_POOL_SIZE: "8"
      DATABASE_MAX_OVERFLOW: "8"
      SKIP_MIGRATIONS: "true"
      EMBEDDING_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_BASE_URL: ${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
    depends_on:
      db:
        condition: service_healthy
      tensorzero:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5010/health"]
      interval: 5s
      timeout: 3s
      retries: 15
    networks:
      - frontend
      - backend

  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.scheduler
    environment:
      <<: *test-env
      DATABASE_URL: postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      DATABASE_POOL_SIZE: "8"
      DATABASE_MAX_OVERFLOW: "8"
      SKIP_MIGRATIONS: "true"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5011/health"]
      interval: 5s
      timeout: 3s
      retries: 15
    networks:
      - frontend
      - backend

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      <<: *test-env
      DATABASE_URL: postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      SKIP_MIGRATIONS: "true"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5012/health"]
      interval: 5s
      timeout: 3s
      retries: 15
    networks:
      - frontend
      - backend
      - targets

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    env_file:
      - ../.env.test
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      - S3_ENDPOINT_URL=http://garage:3900
      - S3_ACCESS_KEY=${GARAGE_ACCESS_KEY:-GK0123456789abcdef01234567}
      - S3_SECRET_KEY=${GARAGE_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - TEST_TARGET_IP=metasploitable
      - TEST_TARGET_URL=http://metasploitable
      - PLUGIN_SAFE_MODE=false
      - TOOL_QUEUE_NAME=tools
      - QUEUE_STARTUP_TOOL_INSTALL=false
      - RATE_LIMIT_STORAGE=redis://:spectra_test_redis@redis:6379/0
      - API_RATE_LIMIT=1000/minute
      - RATE_LIMIT_LOGIN=100/minute
      - RATE_LIMIT_REGISTER=100/minute
      - RATE_LIMIT_SETUP=100/minute
      - AI_SERVICE_URL=http://ai-svc:5010
      - WORKER_SERVICE_URL=http://worker:5012
      - CONNECT_BACK_HOST=worker
      - TENSORZERO_GATEWAY_URL=http://tensorzero:3000
      - SERVICE_AUTH_SECRET=${SERVICE_AUTH_SECRET:-test-service-secret-key}
    volumes:
      - ../app:/app/app:ro
      - ../alembic:/app/alembic:ro
      - ../config/alembic.ini:/app/config/alembic.ini:ro
      - ../plugins:/app/plugins
      - ../tests:/app/tests:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      garage:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-svc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/version"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s
    networks:
      frontend:
        aliases:
          - spectra-ui-app
      backend:

  app-replica:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    env_file:
      - ../.env.test
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      - S3_ENDPOINT_URL=http://garage:3900
      - S3_ACCESS_KEY=${GARAGE_ACCESS_KEY:-GK0123456789abcdef01234567}
      - S3_SECRET_KEY=${GARAGE_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - SKIP_MIGRATIONS=true
      - TEST_TARGET_IP=metasploitable
      - TEST_TARGET_URL=http://metasploitable
      - PLUGIN_SAFE_MODE=false
      - TOOL_QUEUE_NAME=tools
      - QUEUE_STARTUP_TOOL_INSTALL=false
      - RATE_LIMIT_STORAGE=redis://:spectra_test_redis@redis:6379/0
      - API_RATE_LIMIT=1000/minute
      - RATE_LIMIT_LOGIN=100/minute
      - RATE_LIMIT_REGISTER=100/minute
      - RATE_LIMIT_SETUP=100/minute
      - AI_SERVICE_URL=http://ai-svc:5010
      - WORKER_SERVICE_URL=http://worker:5012
      - CONNECT_BACK_HOST=worker
      - TENSORZERO_GATEWAY_URL=http://tensorzero:3000
      - SERVICE_AUTH_SECRET=${SERVICE_AUTH_SECRET:-test-service-secret-key}
    volumes:
      - ../app:/app/app:ro
      - ../alembic:/app/alembic:ro
      - ../config/alembic.ini:/app/config/alembic.ini:ro
      - ../plugins:/app/plugins
      - ../tests:/app/tests:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_healthy
      garage:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-svc:
        condition: service_healthy
    networks:
      frontend:
        aliases:
          - spectra-ui-app-replica
      backend:

  caddy:
    build:
      context: ..
      dockerfile: docker/Dockerfile.caddy
    ports:
      - "15080:80"
    volumes:
      - ./Caddyfile.snippets:/etc/caddy/Caddyfile.snippets:ro
      - ./Caddyfile.test:/etc/caddy/Caddyfile:ro
    depends_on:
      app:
        condition: service_healthy
      app-replica:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - frontend

  tools:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    user: root
    cap_add:
      - NET_ADMIN
    env_file:
      - ../.env.test
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      - S3_ENDPOINT_URL=http://garage:3900
      - S3_ACCESS_KEY=${GARAGE_ACCESS_KEY:-GK0123456789abcdef01234567}
      - S3_SECRET_KEY=${GARAGE_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - IS_TOOLS_CONTAINER=true
      - QUEUE_NAME=tools
      - WORKER_SKIP_STARTUP_AUTO_INSTALL=true
    volumes:
      - ../plugins:/app/plugins
      - ../app:/app/app:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - frontend
      - backend
      - targets

  # Metasploitable
  metasploitable:
    image: tleemcjr/metasploitable2
    tty: true
    networks:
      targets:
        ipv4_address: 172.21.0.50

  # DVWA
  dvwa:
    image: vulnerables/web-dvwa
    environment:
      - MYSQL_ROOT_PASSWORD=dvwa
    networks:
      targets:
        ipv4_address: 172.21.0.51
    # DVWA on port 80

  # Test runner
  test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test
    user: root
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - seccomp:unconfined
    entrypoint: ["sh", "-c"]
    command:
      - >-
        python3 -m pytest tests/ -v --tb=short -x --ignore=tests/e2e/ui --ignore=tests/unit --ignore=tests/load --ignore=tests/performance --ignore=tests/soak
    env_file:
      - ../.env.test
    environment:
      # Override for test environment
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      - S3_ENDPOINT_URL=http://garage:3900
      - S3_ACCESS_KEY=${GARAGE_ACCESS_KEY:-GK0123456789abcdef01234567}
      - S3_SECRET_KEY=${GARAGE_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - TEST_TARGET_IP=172.21.0.50
      - TEST_TARGET_URL=http://172.21.0.50
      - METASPLOITABLE_AVAILABLE=true
      - DVWA_URL=http://172.21.0.51
      - WEB_TARGET_URL=http://testphp.vulnweb.com
      - PLUGIN_SAFE_MODE=false
      - SAFE_MODE=true
      - PERMISSION_BOUNDARY=172.21.0.0/24
      - APP_BASE_URL=http://caddy
      - APP_USERNAME=admin
      - APP_PASSWORD=${ADMIN_PASSWORD:-Admin123!}
      - AI_SERVICE_URL=http://ai-svc:5010
      - TENSORZERO_GATEWAY_URL=http://tensorzero:3000
      - SERVICE_AUTH_SECRET=${SERVICE_AUTH_SECRET:-test-service-secret-key}
      - SERVICE_MODE=all
    volumes:
      - ../app:/app/app:ro
      - ../tests:/app/tests:ro
      - ../plugins:/app/plugins
      - ../requirements:/app/requirements:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      garage:
        condition: service_healthy
      caddy:
        condition: service_healthy
      ai-svc:
        condition: service_healthy
      tensorzero:
        condition: service_healthy
      metasploitable:
        condition: service_started
      dvwa:
        condition: service_started
      tools:
        condition: service_healthy
    networks:
      - frontend
      - backend

  load-test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test
    user: root
    entrypoint: ["sh", "-c"]
    command:
      - >-
        python3 -m pytest tests/load tests/performance tests/soak tests/integration/test_queue.py
        -m "load or performance or soak" -q --override-ini=addopts=
    env_file:
      - ../.env.test
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      - S3_ENDPOINT_URL=http://garage:3900
      - S3_ACCESS_KEY=${GARAGE_ACCESS_KEY:-GK0123456789abcdef01234567}
      - S3_SECRET_KEY=${GARAGE_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - RATE_LIMIT_STORAGE=redis://:spectra_test_redis@redis:6379/0
      - LOAD_TEST_APP_URL=http://app:5000
      - LOAD_TEST_APP_REPLICA_URL=http://app-replica:5000
      - LOAD_TEST_CADDY_URL=http://caddy
      - LOAD_TEST_RESET_RATE_LIMIT_STATE=1
      - PLUGIN_SAFE_MODE=false
    volumes:
      - ../.env.test:/app/.env.test:ro
      - ../app:/app/app:ro
      - ../tests:/app/tests:ro
      - ../pyproject.toml:/app/pyproject.toml:ro
      - ../docker:/app/docker:ro
      - ../alembic:/app/alembic:ro
      - ../config/alembic.ini:/app/config/alembic.ini:ro
      - ../plugins:/app/plugins:ro
    depends_on:
      db:
        condition: service_healthy
      garage:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
      app-replica:
        condition: service_healthy
      caddy:
        condition: service_healthy
      tools:
        condition: service_healthy
    networks:
      - frontend
      - backend

  # Settings/router test runner
  settings-test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test
    user: root
    entrypoint: ["sh", "-c"]
    command:
      - >-
        python -m pytest
        tests/unit/test_runtime_settings.py
        tests/unit/test_system_setup.py
        tests/unit/test_smart_router.py
        tests/unit/test_settings_runtime_api.py
        tests/unit/test_settings_templates.py
        -q --override-ini=addopts=
    env_file:
      - ../.env.test
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      - S3_ENDPOINT_URL=http://garage:3900
      - S3_ACCESS_KEY=${GARAGE_ACCESS_KEY:-GK0123456789abcdef01234567}
      - S3_SECRET_KEY=${GARAGE_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - TENSORZERO_GATEWAY_URL=http://tensorzero:3000
      - PLUGIN_SAFE_MODE=false
    volumes:
      - ../.env.test:/app/.env.test:ro
      - ../app:/app/app:ro
      - ../tests:/app/tests:ro
      - ../pyproject.toml:/app/pyproject.toml:ro
      - ../docker:/app/docker:ro
      - ../alembic:/app/alembic:ro
      - ../config/alembic.ini:/app/config/alembic.ini:ro
      - ../plugins:/app/plugins:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  # Unit test runner
  unit-test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test
    user: root
    entrypoint: ["sh", "-c"]
    command:
      - >-
        python -m pytest tests/unit/ -q --override-ini=addopts=
    env_file:
      - ../.env.test
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      - S3_ENDPOINT_URL=http://garage:3900
      - S3_ACCESS_KEY=${GARAGE_ACCESS_KEY:-GK0123456789abcdef01234567}
      - S3_SECRET_KEY=${GARAGE_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - TENSORZERO_GATEWAY_URL=http://tensorzero:3000
      - PLUGIN_SAFE_MODE=false
    volumes:
      - ../.env.test:/app/.env.test:ro
      - ../app:/app/app:ro
      - ../tests:/app/tests:ro
      - ../pyproject.toml:/app/pyproject.toml:ro
      - ../docker:/app/docker:ro
      - ../alembic:/app/alembic:ro
      - ../config/alembic.ini:/app/config/alembic.ini:ro
      - ../plugins:/app/plugins:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  # Playwright UI test runner
  # Default APP_BASE_URL is Caddy on the host (manual browser + full stack). CI uses
  # `tests/run_ui_tests.sh`, which sets APP_BASE_URL=http://app:5000 for same-network access.
  ui-test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.playwright
    entrypoint: ["python3", "-m", "pytest"]
    command: ["tests/e2e/ui/", "-v", "--tb=short", "-x", "--confcutdir=tests/e2e/ui", "-p", "no:cov", "-o", "addopts="]
    env_file:
      - ../.env.test
    environment:
      - APP_BASE_URL=http://app:5000
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
    volumes:
      - ../tests:/app/tests:ro
      - ../app:/app/app:ro
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - frontend
      - backend

  # ── Vulnerable Test Targets (--profile targets) ─────────────
  # Lightweight purpose-built containers for live scan testing.
  # Start with: docker compose -f docker/docker-compose.test.yml --profile targets up -d
  vuln-web:
    build:
      context: targets
      dockerfile: Dockerfile.vuln-web
    container_name: spectra-vuln-web
    profiles: ["targets"]
    labels:
      spectra.role: test-target
      spectra.target: vuln-web
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/')"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    networks:
      - targets

  vuln-ssh:
    build:
      context: targets
      dockerfile: Dockerfile.vuln-ssh
    container_name: spectra-vuln-ssh
    profiles: ["targets"]
    labels:
      spectra.role: test-target
      spectra.target: vuln-ssh
    expose:
      - "22"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "22"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 32M
    networks:
      - targets

  vuln-network:
    build:
      context: targets
      dockerfile: Dockerfile.vuln-network
    container_name: spectra-vuln-network
    profiles: ["targets"]
    labels:
      spectra.role: test-target
      spectra.target: vuln-network
    expose:
      - "21"
      - "80"
      - "443"
      - "3306"
    healthcheck:
      test: ["CMD-SHELL", "echo | nc -w 1 localhost 80"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 32M
    networks:
      - targets

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
  targets:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24

volumes:
  garage_meta:
  garage_data:
