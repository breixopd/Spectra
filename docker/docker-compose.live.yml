# Compose override for live integration tests with real LLM provider.
# Layers on top of docker-compose.test.yml:
#   docker compose -f docker/docker-compose.test.yml -f docker/docker-compose.live.yml up -d

services:
  app:
    env_file:
      - ../.env.test
      - ../.env.live
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      - PLUGIN_SAFE_MODE=false

  test-runner:
    env_file:
      - ../.env.test
      - ../.env.live
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:spectra_test@db:5432/spectra_test
      - SPECTRA_URL=http://app:5000
      - PLUGIN_SAFE_MODE=false
      - SAFE_MODE=true
      - PERMISSION_BOUNDARY=172.21.0.0/24
