# Spectra — Staging Environment Compose
#
# Mirrors production but with different ports, separate DB, and reduced resources.
# Staging is typically behind a VPN — no TLS.
#
# Usage:
#   docker compose -f docker/docker-compose.staging.yml up -d
#
# Environment:
#   Create a .env.staging file or export variables before starting.

services:
  # ── MinIO Object Storage ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: spectra-staging-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-spectra}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-spectra_staging_minio}
    expose:
      - "9000"
      - "9001"
    volumes:
      - staging_minio_data:/data
    networks:
      - spectra-staging
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── PostgreSQL (separate staging DB) ────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: spectra-staging-db
    environment:
      POSTGRES_USER: spectra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spectra_staging}
      POSTGRES_DB: spectra_staging
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectra -d spectra_staging"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.125"
          memory: 128M
    networks:
      - spectra-staging

  # ── Spectra App (FastAPI) — staging port 5001 ───────────────
  app:
    image: ghcr.io/breixopd14/spectra-app:${VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    container_name: spectra-staging-app
    ports:
      - "${STAGING_PORT:-5001}:5000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env.staging
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:${POSTGRES_PASSWORD:-spectra_staging}@db:5432/spectra_staging
      - CONNECT_BACK_HOST=spectra-staging-app
      - DEBUG=true
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-spectra}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-spectra_staging_minio}
    volumes:
      - staging_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - spectra-staging

  # ── Spectra Tools (Kali Worker) — staging ───────────────────
  tools:
    image: ghcr.io/breixopd14/spectra-tools:${VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.tools
    container_name: spectra-staging-tools
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    env_file:
      - ../.env.staging
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:${POSTGRES_PASSWORD:-spectra_staging}@db:5432/spectra_staging
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-staging-test-key}
      - IS_TOOLS_CONTAINER=true
      - QUEUE_NAME=default
      - PLUGIN_SAFE_MODE=true
      - TZ=UTC
    volumes:
      - staging_data:/app/data
      - staging_tools_data:/opt/spectra_tools
      - /var/run/docker.sock:/var/run/docker.sock:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
    networks:
      - spectra-staging

networks:
  spectra-staging:

volumes:
  staging_postgres_data:
  staging_minio_data:
  staging_data:
  staging_tools_data:
