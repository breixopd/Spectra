# docker/docker-compose.swarm.yml
# Docker Swarm stack for multi-host deployment
# Usage: docker stack deploy -c docker-compose.swarm.yml spectra
version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg16
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == db
      restart_policy:
        condition: on-failure
        delay: 5s
    environment:
      POSTGRES_USER: spectra
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: spectra
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - spectra-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectra"]
      interval: 10s
      timeout: 5s
      retries: 5
    secrets:
      - db_password

  app:
    image: ${REGISTRY:-}spectra-app:${VERSION:-latest}
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.labels.role == app
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    environment:
      DATABASE_URL: postgresql+asyncpg://spectra:${DB_PASSWORD}@db:5432/spectra
      SERVICE_AUTH_SECRET_FILE: /run/secrets/service_auth
      JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret
      AI_SERVICE_URL: http://ai-service:8001
      SCHEDULER_URL: http://scheduler:8002
    ports:
      - "5000:5000"
    networks:
      - spectra-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    secrets:
      - service_auth
      - jwt_secret
      - db_password

  ai-service:
    image: ${REGISTRY:-}spectra-app:${VERSION:-latest}
    command: ["python", "-m", "uvicorn", "app.ai_service:app", "--host", "0.0.0.0", "--port", "8001"]
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == ai
      restart_policy:
        condition: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://spectra:${DB_PASSWORD}@db:5432/spectra
      SERVICE_AUTH_SECRET_FILE: /run/secrets/service_auth
    networks:
      - spectra-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    secrets:
      - service_auth

  scheduler:
    image: ${REGISTRY:-}spectra-app:${VERSION:-latest}
    command: ["python", "-m", "uvicorn", "app.scheduler_service:app", "--host", "0.0.0.0", "--port", "8002"]
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == app
      restart_policy:
        condition: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://spectra:${DB_PASSWORD}@db:5432/spectra
      SERVICE_AUTH_SECRET_FILE: /run/secrets/service_auth
      BACKUP_ENABLED: "true"
    networks:
      - spectra-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    secrets:
      - service_auth

  worker:
    image: ${REGISTRY:-}spectra-app:${VERSION:-latest}
    command: ["python", "-m", "uvicorn", "app.worker_service:app", "--host", "0.0.0.0", "--port", "8003"]
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.labels.role == worker
      restart_policy:
        condition: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://spectra:${DB_PASSWORD}@db:5432/spectra
      SERVICE_AUTH_SECRET_FILE: /run/secrets/service_auth
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - spectra-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    secrets:
      - service_auth

  caddy:
    image: caddy:2-alpine
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    networks:
      - spectra-net

networks:
  spectra-net:
    driver: overlay
    attachable: true

volumes:
  pgdata:
    driver: local
  caddy_data:
  caddy_config:

secrets:
  db_password:
    external: true
  service_auth:
    external: true
  jwt_secret:
    external: true

configs:
  caddyfile:
    file: ./Caddyfile.prod
