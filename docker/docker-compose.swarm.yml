# docker/docker-compose.swarm.yml
# Docker Swarm stack for multi-host deployment
# Usage: docker stack deploy -c docker-compose.swarm.yml spectra

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == app
      restart_policy:
        condition: on-failure
    volumes:
      - redis_data:/data
    networks:
      - spectra-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: pgvector/pgvector:pg16
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == db
      restart_policy:
        condition: on-failure
        delay: 5s
    environment:
      POSTGRES_USER: spectra
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: spectra
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - spectra-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectra"]
      interval: 10s
      timeout: 5s
      retries: 5
    secrets:
      - db_password

  app:
    image: ${REGISTRY:-ghcr.io/breixopd14/}spectra-app:${VERSION:-latest}
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.labels.role == app
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    environment:
      DATABASE_URL: postgresql+asyncpg://spectra:${DB_PASSWORD}@db:5432/spectra
      SERVICE_AUTH_SECRET_FILE: /run/secrets/service_auth
      JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret
      S3_ENDPOINT_URL: http://garage:3900
      S3_ACCESS_KEY: ${GARAGE_ACCESS_KEY:-spectra}
      S3_SECRET_KEY: ${GARAGE_SECRET_KEY}
      AI_SERVICE_URL: http://ai-svc:5010
      RATE_LIMIT_STORAGE: redis://redis:6379/0
      TENSORZERO_GATEWAY_URL: http://tensorzero:3000
      SCHEDULER_URL: http://scheduler:5011
    ports:
      - "5000:5000"
    networks:
      - spectra-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    secrets:
      - service_auth
      - jwt_secret
      - db_password

  ai-svc:
    image: ${REGISTRY:-ghcr.io/breixopd14/}spectra-ai-svc:${VERSION:-latest}
    command: ["python", "-m", "uvicorn", "app.ai_service:app", "--host", "0.0.0.0", "--port", "5010"]
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == ai
      restart_policy:
        condition: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://spectra:${DB_PASSWORD}@db:5432/spectra
      SERVICE_AUTH_SECRET_FILE: /run/secrets/service_auth
      S3_ENDPOINT_URL: http://garage:3900
      S3_ACCESS_KEY: ${GARAGE_ACCESS_KEY:-spectra}
      S3_SECRET_KEY: ${GARAGE_SECRET_KEY}
      TENSORZERO_GATEWAY_URL: http://tensorzero:3000
      SKIP_MIGRATIONS: "true"
    networks:
      - spectra-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    secrets:
      - service_auth

  scheduler:
    image: ${REGISTRY:-ghcr.io/breixopd14/}spectra-scheduler:${VERSION:-latest}
    command: ["python", "-m", "uvicorn", "app.scheduler_service:app", "--host", "0.0.0.0", "--port", "5011"]
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == app
      restart_policy:
        condition: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://spectra:${DB_PASSWORD}@db:5432/spectra
      SERVICE_AUTH_SECRET_FILE: /run/secrets/service_auth
      S3_ENDPOINT_URL: http://garage:3900
      S3_ACCESS_KEY: ${GARAGE_ACCESS_KEY:-spectra}
      S3_SECRET_KEY: ${GARAGE_SECRET_KEY}
      BACKUP_ENABLED: "true"
      SKIP_MIGRATIONS: "true"
    networks:
      - spectra-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    secrets:
      - service_auth

  worker:
    image: ${REGISTRY:-ghcr.io/breixopd14/}spectra-worker:${VERSION:-latest}
    command: ["python", "-m", "uvicorn", "app.worker_service:app", "--host", "0.0.0.0", "--port", "5012"]
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.labels.role == worker
      restart_policy:
        condition: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://spectra:${DB_PASSWORD}@db:5432/spectra
      SERVICE_AUTH_SECRET_FILE: /run/secrets/service_auth
      S3_ENDPOINT_URL: http://garage:3900
      S3_ACCESS_KEY: ${GARAGE_ACCESS_KEY:-spectra}
      S3_SECRET_KEY: ${GARAGE_SECRET_KEY}
      SKIP_MIGRATIONS: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - spectra-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5012/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    secrets:
      - service_auth

  caddy:
    image: ${REGISTRY:-ghcr.io/breixopd14/}spectra-caddy:${VERSION:-latest}
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    networks:
      - spectra-net

  # Garage S3-compatible Object Storage
  garage:
    image: dxflrs/garage:v2.2.0
    environment:
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:-}
    ports:
      - "3900:3900"
      - "3903:3903"
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    configs:
      - source: garage_config
        target: /etc/garage.toml
    networks:
      - spectra-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3903/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == db
      resources:
        limits:
          memory: 512M

  # ClickHouse (TensorZero analytics + inference storage)
  clickhouse:
    image: clickhouse/clickhouse-server:24.11-alpine
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == ai
      restart_policy:
        condition: on-failure
        delay: 5s
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: tensorzero
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    networks:
      - spectra-net
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # TensorZero Gateway (AI routing, observability, optimization)
  tensorzero:
    image: tensorzero/gateway
    command: ["--config-file", "/app/config/tensorzero.toml"]
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == ai
      restart_policy:
        condition: on-failure
    environment:
      TENSORZERO_CONFIG_FILE: /app/config/tensorzero.toml
      TENSORZERO_CLICKHOUSE_URL: http://clickhouse:8123/tensorzero
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    configs:
      - source: tensorzero_config
        target: /app/config/tensorzero.toml
    networks:
      - spectra-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    secrets:
      - service_auth

networks:
  spectra-net:
    driver: overlay
    attachable: true

volumes:
  pgdata:
    driver: local
  caddy_data:
  caddy_config:
  clickhouse_data:
  garage_meta:
  garage_data:
  redis_data:

secrets:
  db_password:
    external: true
  service_auth:
    external: true
  jwt_secret:
    external: true

configs:
  caddyfile:
    file: ./Caddyfile.prod
  tensorzero_config:
    file: ../config/tensorzero.toml
  garage_config:
    file: ./garage.toml
