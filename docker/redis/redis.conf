# Redis configuration for Spectra Security Assessment Tool

# Basic configuration
port 6379
bind 0.0.0.0
protected-mode no

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru
maxclient 10000

# Persistence
save 900 1
save 300 10
save 60 10000
rdbcompression yes
dbfilename dump.rdb
dir /data

# Logging
loglevel notice
