# Spectra Security Assessment Platform
# 
# All services run as microservices by default.
# Usage: docker compose -f docker/docker-compose.yml up -d
#
# For multi-host production: see docker-compose.swarm.yml
# For testing: see docker-compose.test.yml
services:
  # MinIO Object Storage (S3-compatible, optional)
  minio:
    image: minio/minio:latest
    container_name: spectra-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set in .env}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - spectra-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # PostgreSQL (with pgvector for RAG)
  db:
    image: pgvector/pgvector:pg16
    container_name: spectra-db
    environment:
      POSTGRES_USER: spectra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: spectra
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectra -d spectra"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - spectra-network

  # Redis (shared rate limiting / cache primitives)
  redis:
    image: redis:7-alpine
    container_name: spectra-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - spectra-network

  # Caddy Reverse Proxy
  caddy:
    image: caddy:2-alpine
    container_name: spectra-caddy
    ports:
      - "${SPECTRA_PORT:-80}:80"
      - "${SPECTRA_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - spectra-network

  # Spectra API (FastAPI)
  app:
    image: ${REGISTRY:-}spectra-app:${VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    container_name: spectra-app
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      ai-svc:
        condition: service_healthy
      tensorzero:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:${POSTGRES_PASSWORD:?set in .env}@db:5432/spectra
      - CONNECT_BACK_HOST=spectra-app
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:?set in .env}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:?set in .env}
      - AI_SERVICE_URL=http://ai-svc:5010
      - TENSORZERO_GATEWAY_URL=http://tensorzero:3000
      - RATE_LIMIT_STORAGE=redis://redis:6379/0
      - SERVICE_AUTH_SECRET=${SERVICE_AUTH_SECRET:?set in .env}
    volumes:
      - spectra_data:/app/data
      - spectra_plugins:/app/plugins
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - spectra-network
    develop:
      watch:
        - action: sync
          path: ../app
          target: /app/app
        - action: rebuild
          path: ../requirements/app.txt

  # AI Service (LLM + RAG + Embeddings)
  ai-svc:
    image: ${REGISTRY:-}spectra-ai-svc:${VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    container_name: spectra-ai
    expose:
      - "5010"
    command: ["python", "-m", "uvicorn", "app.ai_service:app", "--host", "0.0.0.0", "--port", "5010"]
    depends_on:
      db:
        condition: service_healthy
      tensorzero:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:${POSTGRES_PASSWORD:?set in .env}@db:5432/spectra
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:?set in .env}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:?set in .env}
      - SERVICE_AUTH_SECRET=${SERVICE_AUTH_SECRET:?set in .env}
      - SKIP_MIGRATIONS=true
      - TENSORZERO_GATEWAY_URL=http://tensorzero:3000
    volumes:
      - spectra_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5010/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - spectra-network

  # ClickHouse (TensorZero analytics + inference storage)
  clickhouse:
    image: clickhouse/clickhouse-server:24.11-alpine
    container_name: spectra-clickhouse
    restart: unless-stopped
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=tensorzero
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    networks:
      - spectra-network

  # TensorZero Gateway (AI routing, observability, optimization)
  tensorzero:
    image: tensorzero/gateway
    container_name: spectra-tensorzero
    command: ["--config-file", "/app/config/tensorzero.toml"]
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ../config/tensorzero.toml:/app/config/tensorzero.toml:ro
    environment:
      - TENSORZERO_CONFIG_FILE=/app/config/tensorzero.toml
      - TENSORZERO_CLICKHOUSE_URL=http://clickhouse:8123/tensorzero
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    networks:
      - spectra-network

  # Scheduler (Backups, Metrics, Cleanup)
  scheduler:
    image: ${REGISTRY:-}spectra-scheduler:${VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    container_name: spectra-scheduler
    expose:
      - "5011"
    command: ["python", "-m", "uvicorn", "app.scheduler_service:app", "--host", "0.0.0.0", "--port", "5011"]
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:${POSTGRES_PASSWORD:?set in .env}@db:5432/spectra
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:?set in .env}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:?set in .env}
      - SERVICE_AUTH_SECRET=${SERVICE_AUTH_SECRET:?set in .env}
      - BACKUP_ENABLED=${BACKUP_ENABLED:-false}
      - SKIP_MIGRATIONS=true
    volumes:
      - spectra_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5011/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - spectra-network

  # Worker (Tool Execution via Ephemeral Sandbox Containers)
  worker:
    image: ${REGISTRY:-}spectra-worker:${VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.tools
    container_name: spectra-worker
    expose:
      - "5012"
    command: ["python", "-m", "uvicorn", "app.worker_service:app", "--host", "0.0.0.0", "--port", "5012"]
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:${POSTGRES_PASSWORD:?set in .env}@db:5432/spectra
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:?set in .env}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:?set in .env}
      - SERVICE_AUTH_SECRET=${SERVICE_AUTH_SECRET:?set in .env}
      - SKIP_MIGRATIONS=true
    volumes:
      - spectra_data:/app/data
      - spectra_plugins:/app/plugins
      - spectra_tools_data:/opt/spectra_tools
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5012/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - spectra-network

networks:
  spectra-network:
    driver: bridge

volumes:
  postgres_data:
  spectra_data:
  spectra_tools_data:
  spectra_plugins:
  caddy_data:
  caddy_config:
  minio_data:
  clickhouse_data:
  redis_data:
