# Spectra Security Assessment Platform - Docker Compose
services:
  # MinIO Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: spectra-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: spectra
      MINIO_ROOT_PASSWORD: spectra_minio_dev
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - spectra-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # PostgreSQL Database (with pgvector for RAG)
  db:
    image: pgvector/pgvector:pg16
    container_name: spectra-db
    environment:
      POSTGRES_USER: spectra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spectra_dev}
      POSTGRES_DB: spectra
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectra -d spectra"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - spectra-network

  # Caddy Reverse Proxy — all traffic goes through here
  caddy:
    image: caddy:2-alpine
    container_name: spectra-caddy
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - spectra-network

  # Spectra App (FastAPI Backend) — internal only, proxied via Caddy
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
      # ENABLE_LOCAL_EMBEDDINGS arg removed
    container_name: spectra-app
    # No public port — Caddy proxies to app:5000 internally
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      # Infrastructure (these always point to Docker service names)
      - DATABASE_URL=postgresql+asyncpg://spectra:${POSTGRES_PASSWORD:-spectra_dev}@db:5432/spectra
      - CONNECT_BACK_HOST=spectra-app
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=spectra
      - S3_SECRET_KEY=spectra_minio_dev
    volumes:
      - ../app:/app/app
      - ../plugins:/app/plugins
      - ../keys:/app/keys:ro
      - ../scripts:/app/scripts:ro
      - spectra_data:/app/data
      - ../alembic:/app/alembic
      - ../alembic.ini:/app/alembic.ini
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - spectra-network
    develop:
      watch:
        - action: sync
          path: ../app
          target: /app/app
        - action: rebuild
          path: ../requirements-app.txt

  # Spectra Tools (Worker & Security Tools)
  tools:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tools
    container_name: spectra-tools
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:${POSTGRES_PASSWORD:-spectra_dev}@db:5432/spectra
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - IS_TOOLS_CONTAINER=true
      - QUEUE_NAME=default
      - PLUGIN_SAFE_MODE=false
      - TZ=UTC
    volumes:
      - ../app:/app/app:ro
      - spectra_data:/app/data
      - ../plugins:/app/plugins
      - ../keys:/app/keys:ro
      - spectra_tools_data:/opt/spectra_tools
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["python", "-m", "app.worker"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped
    networks:
      - spectra-network
    develop:
      watch:
        - action: sync
          path: ../app
          target: /app/app

# Networks
networks:
  spectra-network:
    driver: bridge

volumes:
  postgres_data:
  spectra_data:
  spectra_tools_data:
  caddy_data:
  caddy_config:
  minio_data:
