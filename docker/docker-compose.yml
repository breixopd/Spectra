# Spectra — local development stack
# Production: docker-compose.swarm.yml | Testing: docker-compose.test.yml

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-security: &security-defaults
  cap_drop: [ALL]
  security_opt: ["no-new-privileges:true"]

x-security-stateful: &security-stateful
  cap_drop: [ALL]
  cap_add: [SETUID, SETGID]
  security_opt: ["no-new-privileges:true"]

x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://spectra:${POSTGRES_PASSWORD:?set in .env}@db:5432/spectra
  S3_ENDPOINT_URL: http://garage:3900
  S3_ACCESS_KEY: ${GARAGE_ACCESS_KEY:?set in .env}
  S3_SECRET_KEY: ${GARAGE_SECRET_KEY:?set in .env}
  GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:-}
  GARAGE_ADMIN_URL: http://garage:3903
  SERVICE_AUTH_SECRET: ${SERVICE_AUTH_SECRET:?set in .env}
  TENSORZERO_GATEWAY_URL: http://tensorzero:3000

services:
  # Garage (S3-compatible object storage)
  garage:
    image: dxflrs/garage:v2.2.0
    container_name: spectra-garage
    labels:
      spectra.managed: "true"
      spectra.role: "storage"
    environment:
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:-}
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:?set in .env}
    ports:
      - "127.0.0.1:3900:3900"
      - "127.0.0.1:3903:3903"
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
    <<: *security-stateful

  # PostgreSQL
  db:
    image: pgvector/pgvector:pg16
    container_name: spectra-db
    labels:
      spectra.managed: "true"
      spectra.role: "database"
    environment:
      POSTGRES_USER: spectra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: spectra
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectra -d spectra"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - backend
    logging: *default-logging
    <<: *security-stateful

  # Redis
  redis:
    image: redis:7-alpine
    container_name: spectra-redis
    labels:
      spectra.managed: "true"
      spectra.role: "cache"
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-change-me-redis-pass}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change-me-redis-pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - backend
    logging: *default-logging
    <<: *security-stateful

  # Caddy reverse proxy
  caddy:
    image: ${REGISTRY:-}spectra-caddy:${VERSION:-dev}
    build:
      context: ..
      dockerfile: docker/Dockerfile.caddy
    container_name: spectra-caddy
    labels:
      spectra.managed: "true"
      spectra.role: "proxy"
    ports:
      - "${SPECTRA_PORT:-80}:80"
      - "${SPECTRA_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile.snippets:/etc/caddy/Caddyfile.snippets:ro
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      PLATFORM_DOMAIN: "${PLATFORM_DOMAIN:-localhost}"
      TLS_MODE: "${TLS_MODE:-internal}"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - frontend
    <<: *security-defaults

  # API
  app:
    image: ${REGISTRY:-}spectra-app:${VERSION:-dev}
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    labels:
      spectra.managed: "true"
      spectra.role: "api"
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_healthy
      ai-svc:
        condition: service_healthy
      tensorzero:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      <<: *common-env
      CONNECT_BACK_HOST: spectra-app
      AI_SERVICE_URL: http://ai-svc:5010
      # Shared Redis-backed rate limiting; use memory:// for tests
      RATE_LIMIT_STORAGE: "redis://:${REDIS_PASSWORD:-change-me-redis-pass}@redis:6379/0"
    volumes:
      - spectra_data:/app/data
      - spectra_plugins:/app/plugins
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    stop_grace_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - frontend
      - backend
    logging: *default-logging
    <<: *security-stateful
    develop:
      watch:
        - action: sync
          path: ../app
          target: /app/app
        - action: rebuild
          path: ../requirements/app.txt

  # AI service
  ai-svc:
    image: ${REGISTRY:-}spectra-ai-svc:${VERSION:-dev}
    build:
      context: ..
      dockerfile: docker/Dockerfile.ai
    container_name: spectra-ai
    labels:
      spectra.managed: "true"
      spectra.role: "ai"
    expose:
      - "5010"
    depends_on:
      db:
        condition: service_healthy
      tensorzero:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      <<: *common-env
      SKIP_MIGRATIONS: "true"
    volumes:
      - spectra_data:/app/data
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5010/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    stop_grace_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - frontend
      - backend
    logging: *default-logging
    <<: *security-stateful

  # ClickHouse
  clickhouse:
    image: clickhouse/clickhouse-server:24.11-alpine
    container_name: spectra-clickhouse
    labels:
      spectra.managed: "true"
      spectra.role: "analytics"
    restart: unless-stopped
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=tensorzero
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    networks:
      - backend
    logging: *default-logging
    <<: *security-stateful

  # TensorZero gateway
  tensorzero:
    image: tensorzero/gateway:2025.01.07
    container_name: spectra-tensorzero
    labels:
      spectra.managed: "true"
      spectra.role: "ai-gateway"
    command: ["--config-file", "/app/config/tensorzero.toml"]
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ../config/tensorzero.toml:/app/config/tensorzero.toml:ro
    environment:
      - TENSORZERO_CONFIG_FILE=/app/config/tensorzero.toml
      - TENSORZERO_CLICKHOUSE_URL=http://clickhouse:8123/tensorzero
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    networks:
      - backend
    logging: *default-logging
    <<: *security-stateful

  # Scheduler
  scheduler:
    image: ${REGISTRY:-}spectra-scheduler:${VERSION:-dev}
    build:
      context: ..
      dockerfile: docker/Dockerfile.scheduler
    container_name: spectra-scheduler
    labels:
      spectra.managed: "true"
      spectra.role: "scheduler"
    expose:
      - "5011"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      <<: *common-env
      BACKUP_ENABLED: "${BACKUP_ENABLED:-false}"
      SKIP_MIGRATIONS: "true"
    volumes:
      - spectra_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5011/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    stop_grace_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - frontend
      - backend
    logging: *default-logging
    <<: *security-stateful

  # Worker
  worker:
    image: ${REGISTRY:-}spectra-worker:${VERSION:-dev}
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: spectra-worker
    labels:
      spectra.managed: "true"
      spectra.role: "worker"
    expose:
      - "5012"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      <<: *common-env
      SKIP_MIGRATIONS: "true"
    volumes:
      - spectra_data:/app/data
      - spectra_plugins:/app/plugins
      - spectra_tools_data:/opt/spectra_tools
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5012/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M
    stop_grace_period: 30s
    restart: unless-stopped
    <<: *security-defaults
    cap_add:
      - NET_ADMIN
      - NET_RAW
    logging: *default-logging
    networks:
      - frontend
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  spectra_data:
  spectra_tools_data:
  spectra_plugins:
  caddy_data:
  caddy_config:
  garage_meta:
  garage_data:
  clickhouse_data:
  redis_data:
