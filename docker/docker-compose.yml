# Spectra Security Assessment Platform - Docker Compose
# Usage:
#   docker compose up -d

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: spectra-db
    environment:
      POSTGRES_USER: spectra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spectra_dev}
      POSTGRES_DB: spectra
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectra -d spectra"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - spectra-network

  # Redis (with RediSearch for RAG)
  redis:
    image: redis/redis-stack:latest
    container_name: spectra-redis
    volumes:
      - redis_data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-prod_redis_password}
      REDIS_ARGS: "--requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec --save 60 1"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-prod_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768M
    networks:
      - spectra-network

  # Ollama (Local LLM Inference)
  ai:
    image: ollama/ollama:latest
    container_name: spectra-ai
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 24h
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - spectra-network

  # Spectra App (FastAPI Backend)
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    container_name: spectra-app
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      # Infrastructure (these always point to Docker service names)
      - DATABASE_URL=postgresql+asyncpg://spectra:${POSTGRES_PASSWORD:-spectra_dev}@db:5432/spectra
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      - TOOL_CONTAINER_NAME=spectra-tools
      - CONNECT_BACK_HOST=spectra-app
    volumes:
      - ../app:/app/app
      - ../tests:/app/tests
      - ../plugins:/app/plugins
      - ../keys:/app/keys:ro
      - ../scripts:/app/scripts:ro
      - ../pytest.ini:/app/pytest.ini:ro
      - ../.env.test:/app/.env.test:ro
      - ../reports:/app/reports
      - ../alembic:/app/alembic
      - ../alembic.ini:/app/alembic.ini
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - spectra-network
    develop:
      watch:
        - action: sync
          path: ../app
          target: /app/app
        - action: rebuild
          path: ../requirements.txt

  # Spectra Tools (Worker & Security Tools)
  tools:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tools
    container_name: spectra-tools
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:${POSTGRES_PASSWORD:-spectra_dev}@db:5432/spectra
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - IS_TOOLS_CONTAINER=true
      - PLUGIN_SAFE_MODE=false
    volumes:
      - ../app:/app/app:ro
      - ../tests:/app/tests:ro
      - ../reports:/app/reports
      - ../plugins:/app/plugins
      - ../keys:/app/keys:ro
      - spectra_tools_data:/opt/spectra_tools
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["arq", "app.worker.WorkerSettings"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    networks:
      - spectra-network
    develop:
      watch:
        - action: sync
          path: ../app
          target: /app/app

# Networks
networks:
  spectra-network:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  ollama_data:
  spectra_tools_data:
