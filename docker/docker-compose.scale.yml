# Spectra — Scaled Production Compose
#
# Extends docker-compose.prod.yml with horizontal scaling infrastructure:
#   - Caddy with load-balanced upstream config
#   - Dedicated background worker service
#   - PostgreSQL replication-ready tuning
#   - MinIO with increased resources
#
# Usage:
#   docker compose -f docker/docker-compose.prod.yml \
#                  -f docker/docker-compose.scale.yml up -d
#
# Scale replicas at runtime (bypasses container_name constraint):
#   ./scripts/scale.sh app 5
#   ./scripts/scale.sh tools 3

services:
  # ── PostgreSQL — replication-ready tuning ───────────────────
  db:
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=512MB
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=5
      - -c
      - max_replication_slots=5
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ── Caddy — load-balanced reverse proxy ─────────────────────
  caddy:
    volumes:
      - ./Caddyfile.scale:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy

  # ── Spectra App — increased resources for scaling ───────────
  # NOTE: Use ./scripts/scale.sh app N to scale replicas at runtime.
  # Static deploy.replicas cannot be set here because the base prod
  # file defines container_name (must be unique).
  app:
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M

  # ── Spectra Tools — increased resources for scaling ─────────
  tools:
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G

  # ── Background Worker — async jobs / queue consumer ─────────
  worker:
    image: ghcr.io/breixopd14/spectra-app:${VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    command: ["python", "-m", "app.worker"]
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://spectra:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/spectra
      - IS_WORKER=true
      - QUEUE_NAME=background
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-spectra}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - spectra_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - spectra-network

  # ── MinIO — increased resources for shared storage ──────────
  minio:
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
