{% macro empty_state(icon, title, description, action_url=None, action_label=None) %}
<div class="empty-state flex flex-col items-center justify-center text-center py-8 px-4">
    <div class="w-12 h-12 rounded-xl bg-slate-800/50 flex items-center justify-center mb-4">
        <i data-lucide="{{ icon }}" class="w-5 h-5 inline-block text-slate-500"></i>
    </div>
    <h3 class="text-base font-medium text-white mb-2">{{ title }}</h3>
    <p class="text-sm text-slate-400 mb-4 max-w-sm">{{ description }}</p>
    {% if action_url and action_label %}
    <a href="{{ action_url }}" class="px-4 py-2 bg-violet-600 hover:bg-violet-500 text-white rounded-lg text-sm font-medium transition-colors">
        {{ action_label }}
    </a>
    {% endif %}
</div>
{% endmacro %}
