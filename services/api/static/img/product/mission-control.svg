<svg xmlns="http://www.w3.org/2000/svg" width="1380" height="900" viewBox="0 0 1380 900" role="img" aria-labelledby="title desc">
  <title id="title">Spectra mission control</title>
  <desc id="desc">A synthetic preview of the Spectra mission control dashboard showing mission health, verified findings, an attack graph, and agent activity.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111821"/>
      <stop offset="1" stop-color="#090d13"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171f29"/>
      <stop offset="1" stop-color="#10161e"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#70e5ad"/>
      <stop offset="1" stop-color="#3bbf83"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#24313c" stroke-opacity=".42"/>
    </pattern>
    <clipPath id="graphClip"><rect x="385" y="251" width="609" height="331" rx="12"/></clipPath>
  </defs>

  <rect width="1380" height="900" rx="18" fill="url(#bg)"/>
  <rect x="1" y="1" width="1378" height="898" rx="17" fill="none" stroke="#2a3844"/>

  <!-- app chrome -->
  <rect x="0" y="0" width="1380" height="68" rx="18" fill="#10161e"/>
  <path d="M0 68h1380" stroke="#293742"/>
  <rect x="27" y="22" width="24" height="24" rx="7" fill="#173c31"/>
  <path d="M39 26c6 4 8 9 8 12 0 6-8 10-8 10s-8-4-8-10V30l8-4Z" fill="none" stroke="#6ee6ab" stroke-width="2"/>
