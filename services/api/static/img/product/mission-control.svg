    <path d="M1032 374h197" stroke="#26343f"/><circle cx="1038" cy="398" r="5" fill="#e4b65c"/><text x="1052" y="396" fill="#dbe5e3" font-size="11" font-weight="600">Exposed admin panel</text><text x="1052" y="412" fill="#74868e" font-size="10">high · consensus 3/3</text>
    <path d="M1032 430h197" stroke="#26343f"/><circle cx="1038" cy="454" r="5" fill="#e4b65c"/><text x="1052" y="452" fill="#dbe5e3" font-size="11" font-weight="600">Weak session cookie</text><text x="1052" y="468" fill="#74868e" font-size="10">high · reproduced</text>
    <path d="M1032 486h197" stroke="#26343f"/><circle cx="1038" cy="510" r="5" fill="#6e9dc2"/><text x="1052" y="508" fill="#dbe5e3" font-size="11" font-weight="600">Verbose error output</text><text x="1052" y="524" fill="#74868e" font-size="10">medium · pending review</text>
  </g>

