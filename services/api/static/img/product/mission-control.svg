    <circle cx="1039" cy="721" r="4" fill="#6f9bb4"/><text x="1052" y="725" fill="#cbd8d5">Recon agent mapped API</text><text x="1190" y="725" fill="#687a83">1m</text>
    <circle cx="1039" cy="756" r="4" fill="#e4b65c"/><text x="1052" y="760" fill="#cbd8d5">Safety gate awaiting approval</text><text x="1190" y="760" fill="#687a83">2m</text>
