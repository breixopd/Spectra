  <circle cx="1101" cy="34" r="4" fill="#6ee6ab"/>
  <text x="1113" y="39" fill="#91e8bd" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="600">SYSTEM READY</text>
  <circle cx="1240" cy="34" r="14" fill="#26313b"/>
  <text x="1234" y="39" fill="#d0d9df" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600">AR</text>
  <path d="m1271 30 4 4-4 4m8-8 4 4-4 4" fill="none" stroke="#74848f" stroke-width="1.5"/>

  <!-- sidebar -->
