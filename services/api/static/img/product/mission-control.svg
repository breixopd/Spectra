    <text x="290" y="694" fill="#dbe5e3" font-size="11" font-weight="600">Acme staging perimeter</text><text x="290" y="712" fill="#74868e" font-size="10">mission-042 · exploitation</text><rect x="496" y="703" width="238" height="6" rx="3" fill="#273b3d"/><rect x="496" y="703" width="184" height="6" rx="3" fill="#56c993"/><text x="750" y="711" fill="#a2eac4" font-size="10">78%</text><circle cx="867" cy="702" r="4" fill="#68dfa8"/><text x="880" y="706" fill="#9fe8c0" font-size="10">running</text>
    <path d="M290 730h680" stroke="#26343f"/><text x="290" y="755" fill="#dbe5e3" font-size="11" font-weight="600">Northstar API review</text><text x="290" y="773" fill="#74868e" font-size="10">mission-041 · verification</text><rect x="496" y="764" width="238" height="6" rx="3" fill="#273b3d"/><rect x="496" y="764" width="214" height="6" rx="3" fill="#56c993"/><text x="750" y="772" fill="#a2eac4" font-size="10">91%</text><circle cx="867" cy="763" r="4" fill="#68dfa8"/><text x="880" y="767" fill="#9fe8c0" font-size="10">running</text>
