<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#a78bfa" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="200" x2="800" y2="630"/>
    <line x1="0" y1="400" x2="400" y2="630"/>
  </g>
  <!-- Shield icon — centered and sized for visual balance -->
  <g transform="translate(504, 80) scale(6)">
    <path d="M16 2 L4 8 L4 16 C4 23.7 9.3 30.1 16 32 C22.7 30.1 28 23.7 28 16 L28 8 Z" fill="url(#shield)"/>
    <path d="M16 7 L9 10.5 L9 16 C9 21 12 25.5 16 27 C20 25.5 23 21 23 16 L23 10.5 Z" fill="#0f172a" opacity="0.3"/>
  </g>
  <!-- Decorative separator -->
  <text x="600" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#4c1d95" letter-spacing="12">· · · · ·</text>
  <!-- Title -->
  <text x="600" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="white">Spectra</text>
  <!-- Subtitle -->
