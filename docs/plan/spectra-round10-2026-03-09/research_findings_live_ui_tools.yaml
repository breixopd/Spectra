plan_id: spectra-round10-2026-03-09
objective: "Research live test configuration, test code in production, UI completeness, tool container architecture, and current errors"
focus_area: live_tests_ui_tools
created_at: "2026-03-09"
created_by: researcher
status: completed

tldr: |
  - Live tests (tests/integration/test_live_targets.py) use HTTP against containerized app — no LLM mocking or direct LLM exercises; AI_PROVIDER comes from docker-compose.test.yml env_file (.env.test → mock) unless overridden at Docker level.
  - MockLLMClient and PentestMockLLMClient (343 lines combined) live inside app/services/ai/llm.py — production code — and are only used by tests and the mock provider path. Should be moved to tests/.
  - Both setup.html and settings.html still expose three provider options [ollama, litellm, mock] including separate Ollama fields that are now redundant since Ollama goes through LiteLLM via `ollama/` prefix internally.
  - Tool execution architecture: app sends jobs to a PostgreSQL queue, the Kali-based tools container polls and runs them. All tools run in one shared container (no per-tool isolation). Installation via plugin JSON install specs (apt, binary, go, pip methods).
  - Ruff reports 339 lint errors: 61 unsorted imports (I001), 29 unused imports (F401), 27 trailing whitespace (W293), 22 missing `from` in raise-from (B904), 7 hardcoded passwords (S105), plus minor issues. No type errors from IDE.

research_metadata:
  methodology: "Hybrid retrieval: file reads, grep_search, ruff lint, get_errors tool. 3 passes: broad discovery, focused reads, gap-filling."
  tools_used:
    - read_file
    - grep_search
    - file_search
    - list_dir
    - run_in_terminal (ruff)
    - get_errors
  scope: "tests/, app/templates/, app/static/js/, app/services/ai/llm.py, app/services/tools/, docker/, plugins/"
  confidence: high
  coverage: 90

# ═══════════════════════════════════════════════════════════════
# AREA 1: LIVE TESTING CONFIGURATION
# ═══════════════════════════════════════════════════════════════

area_1_live_testing:
  summary: |
    Live tests run inside Docker via docker-compose.test.yml. The test runner
    hits the Spectra HTTP API — it does NOT import LLM code directly. AI_PROVIDER
    is set to "mock" in .env.test (loaded by env_file). The run_live_tests.sh
    script does not override AI_PROVIDER. The only way live tests exercise a
    real LLM is if someone manually sets AI_PROVIDER to a real value in the
    compose env or container env.

  files_analyzed:
    - file: run_live_tests.sh
      path: tests/run_live_tests.sh
      purpose: "Orchestrates live integration tests via docker compose"
      key_elements:
        - element: "docker compose -f docker-compose.test.yml up -d db tools metasploitable dvwa app"
          type: pattern
          location: "tests/run_live_tests.sh:21"
          description: "Starts all live services including vulnerable targets"
        - element: "curl -sf http://localhost:5000/api/health"
          type: pattern
          location: "tests/run_live_tests.sh:24"
          description: "Polls health endpoint before running tests"
        - element: "docker compose run --rm test-runner tests/integration/test_live_targets.py"
          type: pattern
          location: "tests/run_live_tests.sh:34"
          description: "Runs tests inside test-runner container"
      language: bash
      lines: 35

    - file: test_live_targets.py
      path: tests/integration/test_live_targets.py
      purpose: "Live integration tests against vulnerable Docker targets"
      key_elements:
        - element: auth_headers
          type: function
          location: "tests/integration/test_live_targets.py:31"
          description: "Gets auth token from live API via HTTP POST — no LLM usage"
        - element: TestAPISmoke
          type: class
          location: "tests/integration/test_live_targets.py:50"
          description: "Health, auth, and smoke tests"
        - element: TestToolRegistry
          type: class
          location: "tests/integration/test_live_targets.py:92"
          description: "Tests tool listing and config endpoints"
        - element: TestMissionExecution
          type: class
          location: "tests/integration/test_live_targets.py:~380"
          description: "Launches missions via API — indirectly exercises LLM if configured as real"
      language: python
      lines: 400+

    - file: conftest.py
      path: tests/conftest.py
      purpose: "Root test configuration with auto-mock fixtures for unit tests"
      key_elements:
        - element: _is_live_test
          type: function
          location: "tests/conftest.py:17"
          description: "Detects live tests by marker or filename pattern"
        - element: mock_websocket_for_unit_tests
          type: function
          location: "tests/conftest.py:71"
          description: "autouse fixture that skips mocking for live tests"
        - element: mock_database_for_unit_tests
          type: function
          location: "tests/conftest.py:100"
          description: "autouse fixture that skips DB mocking for live tests"
        - element: real_mission_manager
          type: function
          location: "tests/conftest.py:26"
          description: "Uses get_default_llm_client() for real LLM — only if explicitly requested by test"
        - element: mission_manager
          type: function
          location: "tests/conftest.py:143"
          description: "Default fixture — uses MockLLMClient (imports from app.services.ai.llm)"
      language: python
      lines: 190

    - file: .env.test
      path: .env.test
      purpose: "Test environment variables loaded by pytest-dotenv"
      key_elements:
        - element: "AI_PROVIDER=mock"
          type: variable
          location: ".env.test:5"
          description: "Forces mock AI provider for all tests"
        - element: "DATABASE_URL=sqlite+aiosqlite:///test.db"
          type: variable
          location: ".env.test:4"
          description: "Uses SQLite for unit tests"
        - element: "FULLY_AUTOMATED=true"
          type: variable
          location: ".env.test:9"
          description: "Disables human approval requirements"
      language: env
      lines: 9

  findings:
    - finding: "Live tests do NOT exercise real LLM"
      detail: |
        test_live_targets.py communicates only via HTTP to the app container.
        The app container loads .env.test (AI_PROVIDER=mock). The test-runner
        container in docker-compose.test.yml also gets env_file: ../.env.test.
        No test in the live suite explicitly sets AI_PROVIDER to a real value.
        The TestMissionExecution tests launch missions via API, but the app
        will use MockLLMClient because AI_PROVIDER=mock.
    - finding: "conftest.py correctly separates live vs unit mock paths"
      detail: |
        autouse fixtures check _is_live_test() and skip mocking for live tests.
        But since test_live_targets.py uses HTTP client (not direct imports),
        conftest fixtures are mostly irrelevant for live tests.
    - finding: "real_mission_manager fixture exists but is never used by live tests"
      detail: |
        The fixture at conftest.py:26 calls get_default_llm_client() which
        would use the real AI_PROVIDER setting. However, test_live_targets.py
        never requests this fixture — it only uses auth_headers and client.

