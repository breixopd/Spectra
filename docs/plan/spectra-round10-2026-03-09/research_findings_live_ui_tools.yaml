    pattern: "Safety + Consensus gate before tool execution"
    description: "Every tool action passes through SafetySupervisorAgent then VotingSystem"
    examples:
      - file: app/services/tools/service.py
        location: "app/services/tools/service.py:67-70"
        snippet: "self.safety_supervisor = SafetySupervisorAgent(llm_client); self.consensus = VotingSystem(llm_client)"
    prevalence: common

  - category: naming
    pattern: "Plugin JSON files named after tool ID"
    description: "plugins/{tool_id}.json — e.g., nmap.json, nuclei.json"
    examples:
      - file: plugins/nmap.json
        location: "plugins/nmap.json:1"
        snippet: '{"id": "nmap", "name": "Nmap", ...}'
    prevalence: common

  - category: error_handling
    pattern: "Missing raise-from in except clauses"
    description: "22 instances of raise without 'from e' — loses original traceback"
    examples:
      - file: multiple
        location: "various"
        snippet: "raise SomeError(...) should be raise SomeError(...) from e"
    prevalence: common

  - category: testing
    pattern: "Live vs unit test separation via markers and filename detection"
    description: "_is_live_test checks for @pytest.mark.live or 'test_live' in filename"
    examples:
      - file: tests/conftest.py
        location: "tests/conftest.py:17-23"
        snippet: "if item.get_closest_marker('live'): return True"
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: "app/services/tools/"
      responsibility: "Tool registry, execution, installation, parsing"
      location: "app/services/tools/"
      relationship_to_domain: "Core tool execution pipeline"
    - component: "app/services/ai/llm.py"
      responsibility: "LLM client abstraction + mock implementations"
      location: "app/services/ai/llm.py"
      relationship_to_domain: "Contains test mock code that should be separated"
    - component: "app/api/routers/ui.py"
      responsibility: "Serves all HTML templates and settings endpoints"
      location: "app/api/routers/ui.py"
      relationship_to_domain: "UI route completeness"
    - component: "docker/"
      responsibility: "Container definitions for all services"
      location: "docker/"
      relationship_to_domain: "Tool container architecture and test infrastructure"

  data_flow_involving_domain: |
    UI → FastAPI Router → ToolExecutionService → SafetySupervisor → VotingSystem →
    PostgresJobQueue.enqueue_job() → [tools container] worker dequeues → subprocess
    exec → parse output → store results → WebSocket broadcast

  key_relationships_to_domain:
    - from: app/api/routers/ui.py
      to: app/templates/
      relationship: "renders (Jinja2)"
    - from: app/services/tools/service.py
      to: app/core/queue.py
      relationship: "enqueues jobs"
    - from: app/worker.py
      to: app/services/tools/adapter/
      relationship: "uses for command building and execution"
    - from: tests/conftest.py
      to: app/services/ai/llm.py
      relationship: "imports MockLLMClient"

related_conventions:
  naming_patterns_in_domain: "snake_case for files; PascalCase for classes; {tool_id}.json for plugins"
  structure_of_domain: "Services layer → Adapter layer → Models; Templates → JS → CSS"
  error_handling_in_domain: "22 missing raise-from; broad except patterns in tool execution"
  testing_in_domain: "autouse fixtures with live/unit detection; HTTP-based live tests"
  documentation_in_domain: "Rich docstrings in service layer; plugin JSON has ai_description field"

related_dependencies:
  internal:
    - component: app/core/queue.py
      relationship_to_domain: "PostgresJobQueue for tool execution"
      direction: outbound
    - component: app/core/config.py
      relationship_to_domain: "settings.AI_PROVIDER, settings.TOOL_CONTAINER_NAME"
      direction: inbound
    - component: app/services/ai/agents/safety.py
      relationship_to_domain: "SafetySupervisorAgent for pre-execution validation"
      direction: outbound
  external:
    - name: litellm
      purpose_for_domain: "Unified LLM client routing"
    - name: httpx
      purpose_for_domain: "HTTP client used in live tests"
    - name: shlex
      purpose_for_domain: "Command injection prevention in tool adapter"

open_questions:
  - question: "Should the Ollama provider option be removed from UI now that it goes through LiteLLM?"
    context: "get_llm_client() prepends 'ollama/' to models and routes through LiteLLMRouter. The separate ollama fields in setup/settings are redundant but still functional."
  - question: "Should Mock be hidden from end-user UI (setup + settings)?"
    context: "Mock is a testing/development feature. Showing it in production setup wizard is confusing for end users."
  - question: "Is S608 (SQL injection) a real risk or false positive?"
    context: "Only 1 instance detected by ruff. Needs manual review to determine if parameterized queries are used."
  - question: "Should live tests override AI_PROVIDER to test real LLM integration?"
    context: "Currently live tests never exercise real LLM. The TestMissionExecution tests would be more valuable with a real provider."

gaps:
  - area: "Worker code (app/worker.py)"
    description: "Did not fully read the 900+ line worker — only confirmed it runs tool jobs"
