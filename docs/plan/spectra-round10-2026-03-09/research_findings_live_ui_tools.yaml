area_4_tool_container:
  summary: |
    Security tools run in a single Kali Linux container (spectra-tools).
    No per-tool isolation. The app communicates via a PostgreSQL job queue
    (enqueue/dequeue pattern). The tools container polls for jobs and executes
    them. Tool definitions are JSON plugin files in plugins/ with install
    specs, execution templates, and output parsing config. The adapter layer
    builds commands with shlex.quote() for injection prevention.

  files_analyzed:
    - file: Dockerfile.tools
      path: docker/Dockerfile.tools
      purpose: "Kali-based worker container for security tool execution"
      key_elements:
        - element: "FROM kalilinux/kali-rolling:latest"
          type: pattern
          location: "docker/Dockerfile.tools:6"
          description: "Base image is Kali rolling release"
        - element: "apt-get install nmap nikto sqlmap hydra whatweb seclists"
          type: pattern
          location: "docker/Dockerfile.tools:18-23"
          description: "Core tools pre-installed via apt at build time"
        - element: "pip install dirsearch"
          type: pattern
          location: "docker/Dockerfile.tools:32"
          description: "Python tools installed via pip"
        - element: 'CMD ["python", "-m", "app.worker"]'
          type: pattern
          location: "docker/Dockerfile.tools:40"
          description: "Runs the worker process"
      language: dockerfile
      lines: 40

    - file: docker-compose.yml
      path: docker/docker-compose.yml
      purpose: "Development compose — tools container configuration"
      key_elements:
        - element: "IS_TOOLS_CONTAINER=true"
          type: variable
          location: "docker/docker-compose.yml:95"
          description: "Flag identifying toolbox container"
        - element: "cap_add: NET_ADMIN, NET_RAW"
          type: pattern
          location: "docker/docker-compose.yml:106-107"
          description: "Network capabilities for raw socket operations"
        - element: "/dev/net/tun"
          type: pattern
          location: "docker/docker-compose.yml:109"
          description: "TUN device for VPN support"
        - element: "spectra_tools_data volume"
          type: pattern
          location: "docker/docker-compose.yml:104"
          description: "Persistent volume for installed tools at /opt/spectra_tools"
      language: yaml
      lines: 148

    - file: docker-compose.prod.yml
      path: docker/docker-compose.prod.yml
      purpose: "Production compose — stricter resource limits, PLUGIN_SAFE_MODE=true"
      key_elements:
        - element: "PLUGIN_SAFE_MODE=true"
          type: variable
          location: "docker/docker-compose.prod.yml:96"
          description: "Safe mode enabled in production (disabled in dev)"
        - element: "memory: 4G limit, 1G reservation"
          type: pattern
          location: "docker/docker-compose.prod.yml:112-114"
          description: "More generous resource limits for tools in prod"
      language: yaml
      lines: 149

    - file: service.py
      path: app/services/tools/service.py
      purpose: "Tool execution service with safety checks and consensus validation"
      key_elements:
        - element: ToolExecutionService
          type: class
          location: "app/services/tools/service.py:67"
          description: "Orchestrates tool execution with safety supervisor + voting consensus"
        - element: execute_request
          type: function
          location: "app/services/tools/service.py:135"
          description: "Main execution path: validate → safety check → consensus → enqueue job"
        - element: execute_custom_script
          type: function
          location: "app/services/tools/service.py:106"
          description: "Executes AI-generated scripts via PostgresJobQueue"
        - element: PostgresJobQueue
          type: class
          location: "app/services/tools/service.py:119 (imported)"
          description: "Job queue for inter-container communication"
      language: python
      lines: 200

    - file: CommandToolAdapter
      path: app/services/tools/adapter/__init__.py
      purpose: "Command building, execution, and output parsing"
      key_elements:
        - element: build_command
          type: function
          location: "app/services/tools/adapter/__init__.py:68"
          description: "Builds command, wraps with timeout and docker exec"
        - element: "docker exec {container} bash -c"
          type: pattern
          location: "app/services/tools/adapter/__init__.py:82"
          description: "Commands sent to tools container via docker exec"
        - element: calculate_timeout
          type: function
          location: "app/services/tools/adapter/__init__.py:86"
          description: "Dynamic timeout based on target CIDR size"
      language: python
      lines: 190

    - file: CommandBuilder
      path: app/services/tools/adapter/builder.py
      purpose: "Argument templating with shlex.quote for injection prevention"
      key_elements:
        - element: "shlex.quote(str_value)"
          type: pattern
          location: "app/services/tools/adapter/builder.py:90"
          description: "All user-provided arguments are shell-quoted"
        - element: "target always wins (security)"
          type: pattern
          location: "app/services/tools/adapter/builder.py:51"
          description: "Target cannot be overridden by user args"
      language: python
      lines: 150

    - file: install_all_tools.py
      path: scripts/install_all_tools.py
      purpose: "Bulk tool installation script"
      key_elements:
        - element: "registry.install_tool(tool.config.id)"
          type: function
          location: "scripts/install_all_tools.py:28"
          description: "Iterates all plugin configs and installs each"
      language: python
      lines: 50

  plugin_json_structure:
    description: "Each tool has a JSON file in plugins/ defining its full lifecycle"
    fields:
      - id: "Unique tool identifier"
      - name: "Human-readable name"
      - category: "Tool category (discovery, vulnerability, etc.)"
      - metadata: "AI description, capabilities, supported targets, risk level, tags"
      - installation: "method (apt|binary|go|pip), commands, verification_command, verification_regex"
      - execution: "command, args_template with {placeholders}, timeout config, arg_modifiers"
      - parsing: "Output format (xml|ndjson|text) and field mapping"
      - stealth: "Rate limit, delay, extra args for stealth mode"
      - ui: "Icon and color for dashboard display"
    install_methods:
      - apt: "e.g., nmap — 'apt-get install -y nmap'"
      - binary: "e.g., nuclei — download binary, unzip, chmod, symlink"
      - go: "e.g., some Go tools — 'go install ...'"
      - pip: "e.g., some Python tools"
    examples:
      nmap: "apt method, verification via 'nmap --version', XML output parsing"
      nuclei: "binary method (zip download from GitHub), NDJSON output parsing"

  isolation_model:
    description: |
      No per-tool isolation. All tools run in a single shared Kali container.
      The container has NET_ADMIN and NET_RAW capabilities plus /dev/net/tun
      for VPN tunneling. Commands are wrapped with `timeout` for time limits.
      PLUGIN_SAFE_MODE controls whether unsigned plugins can be loaded.

