area_2_test_code_in_production:
  summary: |
    MockLLMClient (65 lines) and PentestMockLLMClient (~280 lines) are defined
    in app/services/ai/llm.py — production code. They are used by:
    (1) get_llm_client() when provider=="mock",
    (2) tests/conftest.py mission_manager fixture,
    (3) get_default_llm_client() when AI_PROVIDER=="mock".
    No production routers or services import test utilities directly.
    No __debug__ branches found in production code.

  files_analyzed:
    - file: llm.py
      path: app/services/ai/llm.py
      purpose: "LLM client abstraction layer with mock implementations"
      key_elements:
        - element: MockLLMClient
          type: class
          location: "app/services/ai/llm.py:206"
          description: "Basic mock returning canned responses — 65 lines"
        - element: PentestMockLLMClient
          type: class
          location: "app/services/ai/llm.py:349"
          description: "Context-aware mock with pentest domain responses — ~280 lines"
        - element: get_llm_client
          type: function
          location: "app/services/ai/llm.py:610"
          description: "Factory that returns PentestMockLLMClient when provider=='mock'"
        - element: get_default_llm_client
          type: function
          location: "app/services/ai/llm.py:659"
          description: "Reads settings.AI_PROVIDER, returns mock if 'mock'"
      language: python
      lines: 698

  findings:
    - finding: "MockLLMClient and PentestMockLLMClient should be in tests/"
      detail: |
        These classes are ~350 lines of test infrastructure living in production.
        They are only triggered when AI_PROVIDER=mock. In production, this is
        never the intended state. They could be moved to tests/mocks/llm.py
        and imported via a lazy/conditional pattern in the factory.
    - finding: "No test utility imports in production routers/services"
      detail: |
        grep for 'import.*test|from.*test.*import' in app/ found no matches
        apart from vendor JS files (tailwind.js) which are false positives.
    - finding: "No __debug__ branches found"
      detail: "No references to __debug__ in app/ directory."
    - finding: "Mock references in app/ are limited to provider normalization"
      detail: |
        app/api/routers/ui.py:_public_ai_provider() maps non-mock providers to
        'litellm' for display. The string 'mock' appears in templates as a
        provider option value. No other mock-related code in production paths.

