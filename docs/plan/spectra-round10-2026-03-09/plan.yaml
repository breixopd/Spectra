plan_id: spectra-round10-2026-03-09
objective: |
  Fix live tests to use real LLM API, fully separate mock/test code from production,
  clean up UI provider options, and auto-fix ruff lint errors. Per-mission sandbox
  design saved to docs/per-mission-sandboxes.md for future implementation.
created_at: "2026-03-09"
created_by: planner
status: pending_approval
research_confidence: high

tldr: |
  Five tasks. (1) Auto-fix 257 ruff lint errors. (2) Extract mock LLM clients from app/ to
  tests/mocks/ — zero mock/test code in production. (3) Remove Mock from UI, unify Ollama as
  connection type within LiteLLM. (4) Wire live tests to use real AI_PROVIDER via compose
  override. (5) Verify all changes. Per-mission sandbox design written to
  docs/per-mission-sandboxes.md for future rounds.

open_questions:
  - "Which real LLM provider should live tests default to?"

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: "Mock removal breaks unit tests"
      likelihood: medium
      impact: high
      mitigation: "Audit all call sites. Tests use fixtures. ValueError surfaces issues fast."
    - scenario: "UI provider unification breaks saved settings"
      likelihood: medium
      impact: medium
      mitigation: "Backend normalizes ollama→litellm. Frontend handles legacy."
  assumptions:
    - "Unit tests inject mocks via fixtures — none depend on get_llm_client(provider='mock')"
    - "Ruff auto-fix won't introduce behavioral changes"

implementation_specification:
  code_structure: |
    Mock extraction: app/services/ai/llm.py → tests/mocks/llm.py.
    UI cleanup: setup.html, settings.html, settings.js, ui.py.
    Live tests: docker/docker-compose.live.yml + run_live_tests.sh update.
    Lint: ruff --fix across app/.
  affected_areas:
    - app/services/ai/llm.py
    - tests/mocks/llm.py (new)
    - tests/mocks/__init__.py (new)
    - tests/conftest.py
    - app/templates/setup.html
    - app/templates/settings.html
    - app/static/js/settings.js
    - app/api/routers/ui.py
    - tests/run_live_tests.sh
    - docker/docker-compose.live.yml (new)
    - .env.live.example (new)
    - "~120 files touched by ruff auto-fix"
  component_details:
    - component: tests/mocks/llm.py
      responsibility: "Host MockLLMClient and PentestMockLLMClient — test-only"
      interfaces:
        - "MockLLMClient(LLMClient)"
        - "PentestMockLLMClient(MockLLMClient)"
    - component: app/services/ai/llm.py
      responsibility: "LLM client factory — production only, ValueError on mock"
      interfaces:
        - "get_llm_client(provider, **kwargs) -> LLMClient"
        - "get_default_llm_client() -> LLMClient"
    - component: docker/docker-compose.live.yml
      responsibility: "Override AI_PROVIDER for live tests with real LLM"
      interfaces:
        - "Compose override layered on docker-compose.test.yml"
  dependencies:
    - component: tests/mocks/llm.py
      relationship: "imported ONLY by tests/"
    - component: docker-compose.live.yml
      relationship: "extends docker-compose.test.yml"
  integration_points:
    - "get_llm_client() raises ValueError on mock — tests inject via fixtures"
    - "Live tests layer compose files for real LLM"

