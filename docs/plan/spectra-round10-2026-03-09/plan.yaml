      2. In app/services/ai/llm.py: DELETE both mock classes. Replace mock branches in
         get_llm_client()/get_default_llm_client() with raise ValueError.

      3. Update all test imports to use tests.mocks.llm.

      4. Verify: grep -r 'class MockLLMClient' app/ → zero; grep -r 'from tests' app/ → zero.
    agent: developer
    priority: high
    status: pending
    dependencies: []
    context_files:
