plan_id: spectra-round7-2026-03-08
objective: >-
  Assess the current codebase against clarified requirements for per-tier provider
  selection, simple fallback-capable setup, DB-first settings/runtime config, and
  Docker-only workflows.
focus_area: tier_providers_db
created_at: '2026-03-08'
created_by: GitHub Copilot (GPT-5.4)
status: completed

tldr: |
  - Current setup UX supports selecting one or two global providers during first-run setup, but both setup and post-setup settings still collapse to a single primary `AI_PROVIDER` plus a global optional `OLLAMA_ENABLED` secondary; there is no persisted per-tier provider profile.
  - Current router architecture supports per-tier model names only. Tier groups inherit one global credential/base URL strategy, so the code cannot correctly express tier-specific `provider + model + base_url + api_key` and can mis-encode cross-provider tier strings.
  - Database is not the runtime source of truth today. Runtime state is layered as env -> `reports/runtime_settings.json` -> mutable in-memory singleton, with an unused DB loader defined separately and not called during startup.
  - Startup initializes the database engine, cache, embeddings, tools, and later LLM clients before any DB settings hydration, so DB-backed runtime config cannot be authoritative even if stored.
  - Docker testing is only partially standardized. Compose-based test infrastructure exists, but core docs and helper scripts still direct host-side `python3 -m pytest`, and the previously run unit command likely failed first on a missing file: `tests/unit/test_runtime_config.py`.

research_metadata:
  methodology: >-
    Three-pass codebase inspection using semantic discovery, exact pattern search,
    targeted file reads, memory review, and focused verification of startup,
    settings persistence, router construction, UI payloads, and test entrypoints.
  tools_used:
    - memory
    - semantic_search
    - grep_search
    - read_file
    - file_search
    - get_errors
    - run_in_terminal
    - list_dir
  scope: >-
    Settings UX, setup flow, AI router/model config, settings persistence,
    startup initialization, Docker test workflow, and targeted unit tests.
  confidence: high
  coverage: 88

