patterns_found:
  - category: architecture
    pattern: Global singleton settings with layered overrides
    description: >-
      Runtime config is centered on one cached `settings` object loaded from env and
      overridden by JSON. DB hydration exists as a separate helper and is not part of
      the main initialization path.
    examples:
      - file: app/core/config.py
        location: app/core/config.py:219-252
        snippet: |
          settings_instance = Settings()
          settings_instance.load_runtime_settings()
          ...
          settings = get_settings()
      - file: app/api/routers/ui.py
        location: app/api/routers/ui.py:484-549
        snippet: |
          async def load_settings_from_db() -> None:
              ...
              if row.key in secret_fields:
                  settings.LLM_API_KEY = SecretStr(row.value)
    prevalence: common

  - category: architecture
    pattern: Single primary provider with optional global secondary fallback
    description: >-
      Router construction assumes one global `AI_PROVIDER` and one shared credential/
      base URL path, with `OLLAMA_ENABLED` used only as a coarse secondary option.
    examples:
      - file: app/services/ai/router.py
        location: app/services/ai/router.py:255-332
        snippet: |
          provider = settings.AI_PROVIDER
          if provider == "ollama":
              ...
              fallbacks.append({"default": ["cloud-fallback"]})
          elif provider in ("api", "openai"):
              ...
              if settings.OLLAMA_ENABLED:
                  ...
                  fallbacks.append({"default": ["ollama-local"]})
    prevalence: common

  - category: structure
    pattern: Tier routing stores models only, not provider profiles
    description: >-
      Tier fields are three strings (`LLM_TIER1_MODEL`, `LLM_TIER2_MODEL`,
      `LLM_TIER3_MODEL`). Provider, credential, and base URL are inferred from global
      state rather than stored per tier.
    examples:
      - file: app/core/config.py
        location: app/core/config.py:54-56
        snippet: |
          LLM_TIER1_MODEL: str = ""
          LLM_TIER2_MODEL: str = ""
          LLM_TIER3_MODEL: str = ""
      - file: app/api/routers/ui.py
        location: app/api/routers/ui.py:238-240
        snippet: |
          llm_tier1_model: str | None = None
          llm_tier2_model: str | None = None
          llm_tier3_model: str | None = None
    prevalence: common

  - category: error_handling
    pattern: UI claims broader multi-provider support than router implementation can honor
    description: >-
      Setup UI tells users tier models may reference either provider, but router logic
      rewrites tier model strings based on global base URL/provider rules, which breaks
      cross-provider tier references.
    examples:
      - file: app/templates/setup.html
        location: app/templates/setup.html:116
        snippet: |
          When multiple providers are configured, tier models can reference either provider.
      - file: app/services/ai/router.py
        location: app/services/ai/router.py:369-380
        snippet: |
          if settings.LLM_API_BASE_URL:
              litellm_tier = f"openai/{tier_model_name}"
          elif provider == "ollama":
              litellm_tier = f"ollama/{tier_model_name}"
    prevalence: occasional

  - category: testing
    pattern: Mixed Docker and host-local test execution guidance
    description: >-
      Docker compose test services exist, but project guidance and helper scripts still
      instruct host-side pytest invocation.
    examples:
      - file: docker/docker-compose.test.yml
        location: docker/docker-compose.test.yml:87-146
        snippet: |
          test-runner:
            entrypoint: ["python3", "-m", "pytest"]
      - file: README.md
        location: README.md:172-175
        snippet: |
          python3 -m pytest tests/unit/ --no-cov
          python3 -m pytest tests/unit/
      - file: AGENTS.md
        location: AGENTS.md:57-66
        snippet: |
          python3 -m pytest tests/unit/ --no-cov -q
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: Settings singleton
      responsibility: Holds active runtime configuration for providers, routing, platform, and operational toggles.
      location: app/core/config.py:16-252
      relationship_to_domain: Primary runtime source currently read by UI, router, DB engine, and services.
    - component: SystemConfig key-value table
      responsibility: Persists dynamic settings and secrets in the database.
      location: app/models/config.py:13-26
      relationship_to_domain: Intended persistence layer, but not authoritative at process start.
    - component: System setup service
      responsibility: First-run settings creation and limited runtime reinitialization.
      location: app/services/system/setup.py:29-268
      relationship_to_domain: Persists initial provider settings to DB and JSON.
    - component: UI settings router
      responsibility: Post-setup read/write API for settings.
      location: app/api/routers/ui.py:248-549
      relationship_to_domain: Writes to both JSON and DB, reads from in-memory settings.
    - component: Smart router
      responsibility: Builds model groups and fallback chains for LiteLLM routing.
      location: app/services/ai/router.py:251-450
      relationship_to_domain: Encodes the single-primary-provider assumption.
    - component: Database engine/session maker
      responsibility: Establishes the live DB connection for the process.
      location: app/core/database.py:60-84
      relationship_to_domain: Locks DB URL from import-time settings before DB config can be applied.
    - component: Lifespan manager
      responsibility: Startup/shutdown orchestration for cache, embeddings, tools, and service readiness.
      location: app/core/lifespan.py:129-273
      relationship_to_domain: Starts runtime services without DB config hydration.
  interfaces_used_by_domain:
    - interface: POST /api/auth/setup
      location: app/api/routers/auth.py:285-314
      usage_pattern: First-run setup submits one primary provider plus optional flags.
    - interface: POST /api/settings
      location: app/api/routers/ui.py:248-381
      usage_pattern: Mutates runtime singleton, writes JSON, upserts DB, and partially resets LLM state.
    - interface: GET /api/settings
      location: app/api/routers/ui.py:385-415
      usage_pattern: Returns in-memory settings snapshot to the settings page.
    - interface: GET /api/ai/status
      location: app/api/routers/ui.py:418-445
      usage_pattern: Returns single-provider health and model metadata.
  data_flow_involving_domain: >-
    Setup page posts `SystemSetupRequest` -> `SystemSetupService` writes `SystemConfig`
    rows and runtime JSON -> mutable global `settings` updated in process -> later LLM
    client created from the singleton. Post-setup settings page posts `SettingsUpdate`
    -> UI router mutates `settings`, writes runtime JSON, upserts DB, then resets only
    the global LLM singleton. On process start, config loads env then runtime JSON,
    database engine binds immediately, and lifespan initializes services before any DB
    settings loader executes.
  key_relationships_to_domain:
    - from: app/templates/setup.html
      to: app/api/routers/auth.py
      relationship: calls
    - from: app/api/routers/auth.py
      to: app/services/system/setup.py
      relationship: calls
    - from: app/services/system/setup.py
      to: app/models/config.py
      relationship: composes
    - from: app/api/routers/ui.py
      to: app/core/config.py
      relationship: imports
    - from: app/api/routers/ui.py
      to: app/models/config.py
      relationship: imports
    - from: app/services/ai/llm.py
      to: app/services/ai/router.py
      relationship: calls
    - from: app/core/database.py
      to: app/core/config.py
      relationship: imports
    - from: app/core/lifespan.py
      to: app/core/database.py
      relationship: imports

related_conventions:
  naming_patterns_in_domain: >-
    Settings are stored as uppercase global fields and DB keys (`AI_PROVIDER`,
    `LLM_MODEL`, `LLM_TIER1_MODEL`). UI payloads use lower_snake_case request fields.
  structure_of_domain: >-
    Configuration is spread across Pydantic settings, DB key-value persistence, JSON
    persistence files under `reports/`, and separate singleton caches for settings,
    router, and LLM client.
  error_handling_in_domain: >-
    Settings persistence errors are logged and suppressed in JSON load/save paths;
    DB hydration logs warnings on conversion errors and silently skips unavailable DB
    initialization during startup-adjacent use.
  testing_in_domain: >-
    Unit tests patch module-level `settings` objects heavily. Existing tests cover
    single-provider routing and setup but not DB-first hydration or per-tier provider
    profiles.
  documentation_in_domain: >-
    Runtime testing guidance is split across README, AGENTS, deployment docs, and shell
    scripts, with inconsistent host-vs-Docker instructions.

