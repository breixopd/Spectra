open_questions:
  - question: Should per-tier configuration store raw provider credentials on each tier or reference reusable provider profiles?
    context: Current code stores one global API secret and one optional global Ollama endpoint only.
  - question: Should embedding configuration follow the same provider-profile model as generation tiers, or remain a separate global runtime setting?
    context: Embeddings currently use global `EMBEDDING_PROVIDER` and `EMBEDDING_MODEL` fields independent of generation routing.
  - question: Is `DATABASE_URL` intended to remain a bootstrap/environment concern even if other runtime settings become DB-first?
    context: Current architecture cannot read DB-resident `DATABASE_URL` before first DB connection is established.

gaps:
  - area: Existing DB contents
    description: The research inspected code paths and the current `reports/runtime_settings.json`, but not live `SystemConfig` table rows.
    impact: Low. The authoritative architectural issues are visible in code regardless of current row contents.
  - area: Exact prior pytest stderr
    description: The earlier failed terminal output was not available directly; failure attribution for the previous command is based on file presence and code inspection.
    impact: Low. Missing `tests/unit/test_runtime_config.py` is sufficient to explain collection failure for the recorded command.