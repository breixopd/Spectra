requirement_assessment:
  requirement_1_per_tier_different_providers:
    current_state: partially_met_in_ui_claims_only
    evidence:
      - app/templates/setup.html:51-58
      - app/templates/setup.html:116
      - app/services/ai/router.py:356-383
      - app/api/routers/ui.py:223-245
    findings: |
      First-run setup allows selecting both provider checkboxes, but the payload still
      collapses to one primary `llm_provider`, choosing `api` when both are selected
      (`app/templates/setup.html:348`).

      Tier routing is limited to three model strings. There is no tier-level provider,
      base URL, or API key field in either `SystemSetupRequest` or `SettingsUpdate`
      (`app/api/schemas.py:291-312`, `app/api/routers/ui.py:223-245`).

      Router assembly infers tier config from global state. If `LLM_API_BASE_URL` is
      set, every tier model is prefixed with `openai/`; if the primary provider is
      `ollama`, every tier model is prefixed with `ollama/` (`app/services/ai/router.py:369-372`).
      This breaks the setup page guidance that tiers may reference either provider.

      Example failure mode: with global API provider and custom base URL, entering
      `ollama/qwen2.5:3b` as a tier model becomes `openai/ollama/qwen2.5:3b`, which is
      not a valid intended cross-provider reference.
    exact_changes_needed: |
      Replace the current global-tier-string shape with an explicit provider-profile
      model for the default path and each tier. Each tier needs persisted fields for at
      least `provider`, `model`, `base_url`, `api_key_secret_ref` (or provider-profile
      reference), plus optional ordered fallbacks.

      Router construction needs to stop inferring tier credentials from global state.
      Instead, build each LiteLLM model group directly from its own tier/provider
      profile, preserving already-prefixed LiteLLM model strings only when the selected
      provider mode is explicitly `litellm`.

      Setup and settings APIs need schema changes to accept per-tier provider profiles,
      not only `llm_tier{n}_model` strings.

  requirement_2_simple_setup_with_optional_fallbacks:
    current_state: partially_met
    evidence:
      - app/templates/setup.html:94-113
      - app/templates/setup.html:346-356
      - app/services/system/setup.py:152-182
      - app/services/ai/router.py:255-332
    findings: |
      Setup is simple because it asks for one primary model and optionally one second
      provider, but that simplicity is achieved by collapsing configuration to a single
      primary provider plus one coarse fallback flag.

      Current fallback behavior is only global:
      - primary Ollama -> optional cloud fallback (`app/services/ai/router.py:271-288`)
      - primary API -> optional Ollama fallback when `OLLAMA_ENABLED` is true
        (`app/services/ai/router.py:319-332`)

      There is no persisted notion of tier-specific fallback chains, and no way to say
      "tier 1 uses Ollama with API fallback, tier 3 uses API only" in current schemas
      or storage.
    exact_changes_needed: |
      Preserve simple setup by letting first-run and settings forms offer provider
      profiles at the top level, then optionally map tiers to those profiles. A minimal
      simple path is:
      - define one or more provider profiles
      - choose which profile is default
      - optionally override per tier
      - optionally attach fallback profile lists per tier and/or for default routing

      Current `OLLAMA_ENABLED` should be replaced by explicit fallback definitions or a
      profile registry; otherwise the system remains limited to one hard-coded fallback
      relationship.

  requirement_3_database_single_source_of_truth:
    current_state: not_met
    evidence:
      - app/core/config.py:132-224
      - app/api/routers/ui.py:248-381
      - app/api/routers/ui.py:385-445
      - app/api/routers/ui.py:484-549
      - app/core/database.py:60-84
      - app/services/system/setup.py:202-226
      - reports/runtime_settings.json:1-20
    findings: |
      Non-secret runtime config is currently persisted to `reports/runtime_settings.json`
      and loaded in `get_settings()` before the process singleton is created
      (`app/core/config.py:132-224`). The current file includes provider, model, tier,
      embedding, and operational fields.

      `POST /api/settings` updates the in-memory singleton, saves JSON, and also upserts
      DB rows. `GET /api/settings` does not read DB; it simply returns the in-memory
      singleton (`app/api/routers/ui.py:385-415`).

      The DB loader is defined in `app/api/routers/ui.py`, not in the core config or
      startup path, and is not invoked during startup. DB therefore is not the runtime
      source of truth.

      `DATABASE_URL` is stored by setup in `SystemConfig` and optionally in
      `reports/infra_config.json`, but `load_settings_from_db()` does not load
      `DATABASE_URL` at all (`app/api/routers/ui.py:505-538`), and no reader for
      `reports/infra_config.json` was found.

      The live SQLAlchemy engine is created from `settings.DATABASE_URL` at module import
      time (`app/core/database.py:60-84`). Once imported, later DB-config persistence
      cannot rebind the active engine.
    exact_changes_needed: |
      Remove `reports/runtime_settings.json` and `reports/infra_config.json` from the
      authoritative settings path. Runtime writes should go to DB only.

      Move DB settings hydration out of `app/api/routers/ui.py` into a core settings
      service or startup bootstrap module that can load DB-backed config before dependent
      services are initialized.

      Stop returning settings from the mutable singleton as the authoritative read path.
      Either rehydrate the singleton from DB on startup and after writes, or read a DB-
      backed settings service directly for admin/settings endpoints.

      `DATABASE_URL` cannot remain in `SystemConfig` if the engine is created before DB
      hydration. To make DB the source of truth for DB connectivity itself, bootstrap
      must first establish a bootstrap connection source distinct from application runtime
      settings, or a dedicated bootstrap DB/source must be defined. In the current
      architecture, storing `DATABASE_URL` in the same DB cannot control first connect.

  requirement_4_docker_only_workflows:
    current_state: partially_met
    evidence:
      - docker/docker-compose.test.yml:1-177
      - tests/run_ui_tests.sh:10-31
      - tests/run_live_tests.sh:35
      - README.md:172-175
      - AGENTS.md:57-66
      - docs/deployment.md:54
    findings: |
      Compose-based test infrastructure exists and the UI test helper already runs via
      Docker (`tests/run_ui_tests.sh:10-31`).

      Host-local pytest remains documented and scripted:
      - `README.md` runs unit tests with `python3 -m pytest`
      - `AGENTS.md` instructs host-local unit pytest
      - `tests/run_live_tests.sh` invokes host-local `python3 -m pytest`
      - `docs/deployment.md` still documents plain `pytest tests/unit/`

      The compose `test-runner` service uses `docker/Dockerfile.tools` and runs the full
      `tests/` tree, which is broader than the feature-specific settings/router suites
      and not clearly separated into unit vs integration execution.
    exact_changes_needed: |
      Standardize all test entrypoints on Docker Compose. Replace host-local test
      documentation and helper scripts with compose invocations only.

      Add a dedicated unit-test runner service or command path for settings/router/setup
      tests so these suites execute inside Docker without pulling in the full live test
      matrix.

      Update `tests/run_live_tests.sh` to run pytest inside a compose service instead of
      on the host. Update README, AGENTS, and deployment docs to remove host-local pytest
      commands.

current_setup_and_settings_ux:
  setup_page:
    current_behavior: |
      The setup page lets the user select `provider_ollama` and `provider_api`
      independently (`app/templates/setup.html:51-58`). If both are selected, the page
      shows separate model inputs and tells the user tier models can target either
      provider (`app/templates/setup.html:94-116`).

      On submit, however, both-provider selection is normalized to one primary provider:
      `llm_provider = 'api'`, `llm_model = api_model`, and `ollama_model` is carried as
      side data (`app/templates/setup.html:346-356`).
    why_per_tier_providers_are_not_supported: |
      The UI never collects per-tier provider/base URL/API key settings. It collects only
      per-tier model strings, so any later provider choice must be guessed from global
      state.
  settings_page:
    current_behavior: |
      The post-setup settings page is narrower than the setup page. The `AI Provider`
      select contains only `api` (`app/templates/settings.html:51-53`), and the page has
      no controls for `ollama_enabled` or `fully_automated`.
    why_per_tier_providers_are_not_supported: |
      The page exposes only one provider field and three tier model strings. Saving from
      this form cannot express or preserve multiple provider profiles.
    additional_behavioral_risk: |
      Because `SettingsUpdate` defaults `ollama_enabled` to `False` and `fully_automated`
      to `True` (`app/api/routers/ui.py:230,236`), and `settings.js` does not populate
      either field into the save payload (`app/static/js/settings.js:122-141`), a save
      from the current settings page can silently overwrite unexposed state with schema
      defaults.

router_and_model_config_architecture:
  current_architecture: |
    Router assembly uses one global provider discriminator (`settings.AI_PROVIDER`) and
    one global credential/base URL path. Tier routing is implemented by registering
    extra model groups `tier1`, `tier2`, `tier3` from the three model string settings,
    then mapping task tiers to those group names (`app/services/ai/router.py:356-423`).

    Fallbacks are attached only to the `default` group and are derived from the global
    provider mode (`app/services/ai/router.py:271-332`).
  exact_changes_needed: |
    Replace the current global-shared config builder with a profile-aware builder.

    Persist at least these logical objects:
    - provider profiles: provider type, base URL, secret reference, optional host,
      default model, enabled flag
    - routing map: default profile/model and per-tier overrides
    - optional fallback map: ordered fallback profile/model references per default/tier

    Then change `build_model_config_from_settings()` so it:
    - iterates over resolved provider-profile references instead of global settings
    - emits one LiteLLM group per resolved route target
    - emits fallbacks for each route target, not only `default`
    - stops prefix-rewriting tier models based on global `AI_PROVIDER` or
      `LLM_API_BASE_URL`

    `create_smart_router()` can keep task-tier mapping, but the source mapping should be
    tier -> route config object instead of tier -> string derived from shared globals.

settings_persistence_flow:
  current_flow: |
    First-run setup:
    - writes `SystemConfig` rows (`app/services/system/setup.py:156-205`)
    - mutates runtime `settings` singleton (`app/services/system/setup.py:55-75`)
    - writes `reports/runtime_settings.json` (`app/services/system/setup.py:76`)
    - optionally writes `reports/infra_config.json` for `DATABASE_URL`
      (`app/services/system/setup.py:218-242`)

    Post-setup settings save:
    - mutates runtime `settings` singleton (`app/api/routers/ui.py:263-317`)
    - writes `reports/runtime_settings.json` (`app/api/routers/ui.py:318`)
    - upserts DB `SystemConfig` rows (`app/api/routers/ui.py:321-370`)

    Settings read:
    - admin UI reads the in-memory singleton via `GET /api/settings`
      (`app/api/routers/ui.py:385-415`)
  places_runtime_cache_or_json_still_act_as_source_of_truth:
    - location: app/core/config.py:132-224
      detail: Runtime JSON is loaded into the settings singleton before the app serves traffic.
    - location: app/api/routers/ui.py:385-445
      detail: Settings read and AI status read return singleton state, not DB state.
    - location: app/services/system/setup.py:76
      detail: Setup still saves authoritative-looking runtime settings to JSON after DB writes.
    - location: app/services/system/setup.py:224-242
      detail: Custom DB infrastructure is persisted to `reports/infra_config.json`, not consumed from DB.
    - location: app/services/ai/llm.py:919-932
      detail: Global LLM client caches runtime config after first creation.
    - location: app/services/ai/router.py:437-450
      detail: Router singleton caches model routing independently and is not reset by settings writes.

startup_path:
  current_startup_sequence: |
    1. `app/core/config.py` creates `settings = get_settings()` at import time
       (`app/core/config.py:252`).
    2. `get_settings()` loads env-backed settings and then `load_runtime_settings()` from
       `reports/runtime_settings.json` (`app/core/config.py:219-224`).
    3. `app/core/database.py` builds `engine` and `async_session_maker` from
       `settings.DATABASE_URL` at import time (`app/core/database.py:60-84`).
    4. FastAPI startup enters `lifespan()` and initializes cache, embeddings preload,
       tool registry, and background startup tasks (`app/core/lifespan.py:129-210`).
    5. No call to `load_settings_from_db()` is made in `lifespan()` or `main.py`.
  what_must_change_for_db_first_behavior: |
    DB-backed runtime settings must be hydrated before any runtime service that depends
    on them is created.

    At minimum, startup needs a core bootstrap step that loads DB-backed settings before:
    - embedding preload
    - tool registry init if plugin behavior depends on runtime toggles
    - first global LLM/router creation

    For the live database connection itself, the current import-time engine creation is
    incompatible with DB-first configuration of `DATABASE_URL`. That setting must either
    remain bootstrap/environment controlled, or the architecture must introduce a
    bootstrap connection stage distinct from application runtime settings.

docker_test_workflow:
  current_workflow: |
    `docker/docker-compose.test.yml` provides Docker services for Postgres, app, tools,
    vulnerable targets, a generic `test-runner`, and a browser `ui-test-runner`.

    `tests/run_ui_tests.sh` already uses Docker Compose.
    `tests/run_live_tests.sh` still shells out to host-local `python3 -m pytest`.

    Project docs still advertise host-local unit pytest commands.
  what_must_change: |
    The feature-relevant test path for settings/router/setup needs a Docker-native unit
    runner and updated docs/scripts that invoke only compose-based commands.

    The previously requested feature tests should be runnable via a dedicated Docker
    command target, rather than by host-local pytest or by the broad `tests/` compose
    runner.

likely_failing_tests_from_code_inspection:
