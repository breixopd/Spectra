# =============================================================================
# Cross-cutting patterns
# =============================================================================
patterns_found:
  - category: architecture
    pattern: "Dual auth system — localStorage vs cookies"
    description: |
      Frontend uses localStorage + Bearer headers for API auth.
      Backend UI routes use cookie-based auth via _get_ui_user().
      These don't talk to each other — login never sets a cookie.
    examples:
      - file: app/templates/login.html
        location: "login.html:56"
        snippet: "localStorage.setItem('token', data.access_token);"
      - file: app/api/routers/ui.py
        location: "ui.py:37"
        snippet: "token = request.cookies.get('access_token')"
    prevalence: common

  - category: architecture
    pattern: "Three-layer settings persistence"
    description: "Env vars → JSON file → DB. Settings loaded in order, DB only for secrets."
    examples:
      - file: app/core/config.py
        location: "config.py:131-175"
        snippet: "save_runtime_settings / load_runtime_settings"
    prevalence: common

  - category: error_handling
    pattern: "Silent fallback on embedding failure"
    description: |
      EmbeddingService silently falls back to SHA256 without raising errors.
      RAG warns but still stores documents with useless embeddings.
    examples:
      - file: app/services/ai/embeddings.py
        location: "embeddings.py:60"
        snippet: "self._use_fallback = True"
    prevalence: common

  - category: structure
    pattern: "Global status polling on all pages"
    description: "checkSystemStatus() polls /api/system/status every 5s on all pages including login"
    examples:
      - file: app/templates/base.html
        location: "base.html:415-500"
        snippet: "statusPollingInterval = setInterval(checkSystemStatus, 5000)"
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: "SecurityHeadersMiddleware"
      responsibility: "CSP, security headers, origin validation"
      location: "app/core/middleware.py"
      relationship_to_domain: "Affects Swagger UI and API docs rendering"
    - component: "UI Router"
      responsibility: "Serves HTML pages, settings API, LLM test"
      location: "app/api/routers/ui.py"
      relationship_to_domain: "Contains auth check logic and settings CRUD"
    - component: "Auth Router"
      responsibility: "Login, setup, token management"
      location: "app/api/routers/auth.py"
      relationship_to_domain: "Token creation but no cookie setting"
    - component: "EmbeddingService"
      responsibility: "Text embeddings for RAG"
      location: "app/services/ai/embeddings.py"
      relationship_to_domain: "No local model support, API or fallback only"
    - component: "Health Router"
      responsibility: "Health check endpoint"
      location: "app/api/routers/health.py"
      relationship_to_domain: "Minimal — only DB check"

  data_flow_involving_domain: |
    Login: POST /api/auth/token → JWT in response → stored in localStorage (NOT cookie)
    Page nav: GET /targets → ui.py._get_ui_user(request) reads cookie → None → redirect /login
    Settings: GET /api/settings → reads in-memory → POST /api/settings → JSON + DB
    Status: GET /api/system/status → checks DB, cache, tools → returns JSON for status bar
    Embeddings: EmbeddingService → LiteLLM API or SHA256 fallback → RAG stores vectors

  key_relationships_to_domain:
    - from: "login.html"
      to: "localStorage"
      relationship: "stores JWT token"
    - from: "ui.py._get_ui_user()"
      to: "request.cookies"
      relationship: "reads 'access_token' cookie (never set)"
    - from: "base.html"
      to: "/api/system/status"
      relationship: "polls every 5s, shows global status bar"
    - from: "EmbeddingService"
      to: "litellm"
      relationship: "calls litellm.aembedding() for real embeddings"
    - from: "config.py"
      to: "reports/runtime_settings.json"
      relationship: "save/load non-sensitive settings"

related_conventions:
  naming_patterns_in_domain: "Snake case for Python, camelCase for JS, kebab-case for CSS classes"
  structure_of_domain: "Templates in app/templates/, JS in app/static/js/, routers in app/api/routers/"
  error_handling_in_domain: "Try/catch with fallback behavior; status bar shows generic 'Connecting...'"
  testing_in_domain: "Unit tests mock embeddings; no UI/integration tests for auth flow"
  documentation_in_domain: "Docstrings on router functions; no JSDoc on frontend"

related_dependencies:
