    - file: app/templates/dashboard.html
      lines: [44-47]
      role: "Requirements toggle button is icon-only"

  current_behavior: |
    Several buttons use icon-only rendering: <button><i class="fa-solid fa-pause"></i></button>
    These have aria-label attributes for accessibility but no visible text.

    The most likely "blank buttons" are:
    1. dashboard.html L70-72: Pause button — icon-only (fa-pause), has data-tooltip and aria-label
    2. dashboard.html L74-76: Stop button — icon-only (fa-stop), has data-tooltip and aria-label
    3. dashboard.html L45: Requirements toggle — icon-only (fa-file-lines), has aria-label

    If FontAwesome fails to load, these buttons appear completely blank (no text, no icon).

  root_cause: |
