# =============================================================================
# ISSUE 1: Login "Connecting to server" message
# =============================================================================
issue_1_connecting_to_server:
  summary: "Global status bar shows 'Connecting to server...' on login page"
  files:
    - file: app/templates/base.html
      lines: [415-500]
      role: "Contains checkSystemStatus() function that polls /api/system/status"
    - file: app/api/routers/system.py
      lines: [310-410]
      role: "GET /api/system/status endpoint requires authentication (get_current_active_user)"

  current_behavior: |
    base.html includes a global status bar (#global-status-bar, initially hidden) and a
    checkSystemStatus() JS function that polls GET /api/system/status every 5 seconds.

    Two paths show "Connecting to server...":
      1. Line 432: When response is not OK (e.g. 401 Unauthorized because user is not logged in)
      2. Line 496: In the catch block for network/fetch errors

    The status bar is rendered on ALL pages including /login and /setup. Since the user is not
    authenticated on /login, the /api/system/status call returns 401, triggering the "Connecting
    to server..." message. The polling starts immediately via setInterval at bottom of base.html.

  root_cause: |
    The /api/system/status endpoint requires authentication (Depends(get_current_active_user)),
    but checkSystemStatus() runs on every page including unauthenticated pages (/login, /setup).
    When the fetch returns 401, the catch-all sets statusMsg to "Connecting to server...".

  fix_approach: |
    1. Skip status polling on public pages: In the checkSystemStatus() JS, check if current path
       is in publicPaths and return early without showing the status bar.
    2. OR: Make the status endpoint unauthenticated (return minimal data without auth).
    3. Add to the polling init: `if (publicPaths.includes(window.location.pathname)) return;`

# =============================================================================
# ISSUE 2: API docs blank
# =============================================================================
issue_2_api_docs_blank:
  summary: "FastAPI Swagger UI at /api/docs renders blank"
  files:
    - file: app/main.py
      lines: [63-80]
      role: "FastAPI app configured with docs_url='/api/docs', redoc_url='/api/redoc', openapi_url='/api/openapi.json'"
    - file: app/core/middleware.py
      lines: [52-62]
      role: "CSP header blocks external scripts for non-API paths"

  current_behavior: |
    FastAPI is configured with standard Swagger UI:
      docs_url="/api/docs"
      redoc_url="/api/redoc"
      openapi_url="/api/openapi.json"

    The Swagger UI page renders blank. The openapi.json is likely accessible but the
    Swagger UI HTML page loads JS from CDN (cdn.jsdelivr.net) by default.

  root_cause: |
    The CSP middleware in middleware.py (L52-62) sets:
      script-src 'self' 'nonce-{nonce}'
    for all non-API paths.

    However, /api/docs IS an API path (starts with /api/), so CSP is NOT applied.
    The likely issue is that FastAPI's Swagger UI loads JS from cdn.jsdelivr.net, but:
    1. The swagger_ui_params are set (L63-72) but don't affect JS loading
    2. If running in an air-gapped/firewalled environment, CDN is unreachable
    3. The /api/docs page itself doesn't have the nonce, so inline scripts may fail

    Actually, since the path starts with "/api/", the CSP header is skipped entirely
    (line 55: `if not request.url.path.startswith("/api/")`). So CSP is NOT the blocker.

    The real issue is likely: Swagger UI tries to load from CDN and either the network
    blocks it, or there's a browser security policy. Also possible: no routers define
    any response models, so the OpenAPI schema is minimal/empty.

  fix_approach: |
    1. Test if /api/openapi.json returns valid content (curl http://localhost:5000/api/openapi.json)
    2. If CDN is blocked, serve Swagger UI locally by overriding swagger_ui_default_parameters
       or using app = FastAPI(swagger_ui_oauth2_redirect_url=..., docs_url=None) and serving
       a custom docs page with local JS assets.
    3. Alternatively, download swagger-ui-bundle.js and swagger-ui.css to /static/vendor/js/
       and configure FastAPI to use them via swagger_js_url and swagger_css_url parameters.

