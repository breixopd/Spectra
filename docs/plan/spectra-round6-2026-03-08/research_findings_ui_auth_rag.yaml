# =============================================================================
# ISSUE 8: RAG local embeddings
# =============================================================================
issue_8_rag_local_embeddings:
  summary: "No local embedding support; only LiteLLM API or SHA256 fallback"
  files:
    - file: app/services/ai/embeddings.py
      lines: [1-150]
      role: "Full EmbeddingService — LiteLLM API or SHA256 fallback only"
    - file: app/services/ai/rag.py
      lines: [130-155]
      role: "RAG warns about SHA256 fallback and sentence-transformers"
    - file: app/core/config.py
      lines: [57]
      role: "EMBEDDING_MODEL defaults to 'text-embedding-3-small'"
    - file: requirements.txt
      lines: [33]
      role: "sentence-transformers commented out"

  current_behavior: |
    EmbeddingService (embeddings.py) has exactly two modes:
    1. LiteLLM API: Uses litellm.aembedding() with the configured API key and model.
       Activated when AI_PROVIDER != "mock" AND LLM_API_KEY is set.
    2. SHA256 fallback: Deterministic hash-based fake embeddings (L131-150).
       Used when no API key, mock provider, or litellm import fails.

    The SHA256 fallback produces 384-dimensional vectors from hashing, but these have
    NO semantic meaning — cosine similarity on them is meaningless.

    RAG system (rag.py L143-145) explicitly warns:
      "Install sentence-transformers for proper embeddings"
    But this is a dead message — sentence-transformers is never imported or used in
    the codebase. The EmbeddingService never attempts to load sentence-transformers.

    EMBEDDING_MODEL defaults to "text-embedding-3-small" (OpenAI's cheap model).
    It's used via LiteLLM and requires an API key to function.

  root_cause: |
    Local embedding support was planned (requirements.txt has the commented line) but never
    implemented. The EmbeddingService only supports LiteLLM's API-based embeddings.
    The RAG warning message references sentence-transformers but no code uses it.

  fix_approach: |
    To add local embedding support:
    1. Add a third mode to EmbeddingService that loads sentence-transformers when
       EMBEDDING_MODEL matches a known local model (e.g., "all-MiniLM-L6-v2")
    2. In _load_model(), check if model name is a HuggingFace model ID → load via
       sentence-transformers' SentenceTransformer class
    3. Implement async embed() using asyncio.to_thread() since sentence-transformers is sync
    4. Uncomment sentence-transformers in requirements.txt
    5. Add EMBEDDING_PROVIDER setting (api, local, fallback) or auto-detect from model name
    6. Alternative: use fastembed (lighter than sentence-transformers) for local embeddings

# =============================================================================
# ISSUE 9: Settings — DB vs env
# =============================================================================
issue_9_settings_db_vs_env:
  summary: "Dual persistence: JSON file for non-sensitive, DB SystemConfig for secrets"
  files:
    - file: app/core/config.py
      lines: [1-260]
      role: "Settings class with save/load_runtime_settings (JSON file)"
    - file: app/models/config.py
      lines: [1-31]
      role: "SystemConfig model — key/value table with is_secret flag"
    - file: reports/runtime_settings.json
      lines: [1-17]
      role: "Current persisted runtime settings"
    - file: app/api/routers/ui.py
      lines: [250-330]
      role: "POST /api/settings — updates both JSON and DB"
    - file: app/api/routers/ui.py
      lines: [331-370]
      role: "GET /api/settings — reads from in-memory settings"

  current_behavior: |
    THREE-LAYER settings system:
    1. Environment variables / .env file → Pydantic Settings (loaded at startup)
    2. reports/runtime_settings.json → Overrides env for non-sensitive fields on startup
    3. system_config DB table → Stores LLM_API_KEY (and potentially other secrets)

    Flow:
    - On startup: Settings loads from env → then load_runtime_settings() overrides from JSON
    - On save (POST /api/settings): Updates in-memory → saves JSON → saves LLM_API_KEY to DB
    - On read (GET /api/settings): Returns in-memory values

    JSON file currently stores:
    AI_PROVIDER, OLLAMA_HOST, OLLAMA_MODEL, LLM_API_BASE_URL, LLM_MODEL,
    LLM_TIER1_MODEL, LLM_TIER2_MODEL, LLM_TIER3_MODEL, LOG_LEVEL,
    PLUGIN_SAFE_MODE, CONNECT_BACK_HOST, TOOL_CONTAINER_NAME, REQUIRE_APPROVAL,
    PLATFORM_DOMAIN, PLATFORM_BASE_URL, PLATFORM_EXPOSED

    DB currently stores only: LLM_API_KEY (via SystemConfig with is_secret=True)

  root_cause: |
    The system works but has issues:
    1. JSON file is on filesystem — not shared across containers/replicas
    2. SystemConfig DB table exists but is underutilized (only stores API key)
    3. EMBEDDING_MODEL, NOTIFICATION_WEBHOOK, VPN settings are NOT persisted
    4. FULLY_AUTOMATED is env-only but should be runtime-toggleable
    5. No migration path from JSON to full DB storage

  settings_that_should_be_in_db:
    - EMBEDDING_MODEL: "Currently env-only; should be changeable at runtime"
    - NOTIFICATION_WEBHOOK: "Saved in memory but not in JSON or DB"
    - FULLY_AUTOMATED: "Important operational toggle, env-only"
    - ACCESS_TOKEN_EXPIRE_MINUTES: "Security setting, env-only"
    - VPN_ENABLED: "Operational toggle, env-only"
    - CORS_ORIGINS: "May need runtime updates for new domains"

  fix_approach: |
    1. Migrate all runtime settings from JSON to SystemConfig DB table
    2. Keep JSON file as a cache/fallback for startup before DB is available
    3. Add missing settings to the save/load cycle (EMBEDDING_MODEL, NOTIFICATION_WEBHOOK)
    4. Add a settings migration: on startup, if JSON exists but DB doesn't have the keys,
       import from JSON to DB

# =============================================================================
# ISSUE 10: Health check gaps
# =============================================================================
issue_10_health_check_gaps:
  summary: "Health endpoint only checks database; many components unchecked"
  files:
    - file: app/api/routers/health.py
      lines: [1-48]
      role: "Full health endpoint — only checks DB with SELECT 1"
    - file: app/api/routers/system.py
      lines: [310-410]
      role: "System status endpoint — checks DB, cache, tools, embeddings (but requires auth)"

  current_behavior: |
    GET /api/health checks ONLY database connectivity:
      await db.execute(text("SELECT 1"))
    Returns 200 if DB is up, 503 if down. Reports version number.

    GET /api/system/status (authenticated) checks more:
    - Database (SELECT 1)
    - Cache (existence check only)
    - Tool installation status
    - Embeddings loading status
    - Ongoing operations

    But neither endpoint checks:
    - LLM provider connectivity (can we reach OpenAI/Ollama?)
    - Embedding service readiness (is_functional)
    - RAG system health (table exists, embeddings working)
    - Tool container health (is spectra-tools running?)
    - Docker socket accessibility
    - Disk space (reports directory writable)
    - WebSocket connectivity

  root_cause: |
    The health endpoint was written as a minimal liveness check. The system status
    endpoint has more checks but requires authentication and is designed for UI display,
    not for monitoring/orchestration health probes.

  fix_approach: |
    1. Add component checks to /api/health:
       - "rag": Check if EmbeddingService.is_functional
       - "llm": Quick health check via LLM client
       - "cache": Verify cache read/write with a test key
       - "tools_container": Check if TOOL_CONTAINER_NAME is accessible via Docker API
    2. Keep /api/health unauthenticated for load balancer probes
    3. Add optional ?verbose=true parameter for detailed component status
    4. Add a separate /api/health/ready endpoint for readiness probes (all components up)
       vs /api/health/live for liveness probes (app process running)

