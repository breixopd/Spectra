  fix_approach: |
    1. Add visible text labels next to icons for important buttons, or use sr-only spans
       with visual text (e.g., "Pause" text next to the icon)
    2. Add a CSS fallback: icon buttons could use ::before pseudo-elements with text
       content as a no-font fallback
    3. Ensure FontAwesome woff2 files are correctly served (check /static/vendor/webfonts/)
    4. The dashboard Launch button (L62) already has text + icon — follow this pattern

# =============================================================================
# ISSUE 6: Navigation takes back to login
# =============================================================================
issue_6_nav_to_login:
  summary: "Navigating to pages redirects to login despite being authenticated"
  files:
    - file: app/templates/login.html
      lines: [55-57]
      role: "Login stores token in localStorage"
    - file: app/api/routers/ui.py
      lines: [33-43]
      role: "_get_ui_user() checks cookies, NOT localStorage"
    - file: app/api/routers/ui.py
      lines: [90-200]
      role: "All page routes check _get_ui_user(request) and redirect to /login"
    - file: app/templates/base.html
      lines: [203-220]
      role: "JS auth check uses localStorage token"
    - file: app/api/routers/ui.py
      lines: [70-83]
      role: "Dashboard does NOT check auth — just checks if setup is done"

  current_behavior: |
    TWO PARALLEL AUTH SYSTEMS exist that are incompatible:

    1. FRONTEND (JavaScript) — base.html L203-220:
       - Reads token from localStorage
       - If no token and not on public page, redirects to /login
       - Patches window.fetch to add Authorization: Bearer header
       - Handles 401 responses by clearing token and redirecting

    2. BACKEND (Python) — ui.py L33-43:
       - _get_ui_user() reads token from request.cookies.get("access_token")
       - Used by most page routes: /targets, /history, /reports, /overseer, /toolbox…
       - If _get_ui_user() returns None → redirect to /login

    CRITICAL SPLIT:
    - Login page (login.html L56) stores token in localStorage: localStorage.setItem('token', data.access_token)
    - Login page NEVER sets a cookie
    - Backend _get_ui_user() reads from cookies → always returns None
    - Therefore: every click to /targets, /history, /reports, etc. redirects to /login

    EXCEPTION: /dashboard and /login and /setup do NOT call _get_ui_user() — they only check
    if setup is done (select User.id). So /dashboard always renders, but other pages redirect.

  root_cause: |
    The login flow stores the JWT in localStorage but the server-side page routes check
    cookies for authentication. No code ever sets document.cookie with the access_token.

    This is a fundamental mismatch between client-side SPA-style auth (localStorage + Bearer headers)
    and server-side template rendering auth (cookie-based).

  fix_approach: |
    Option A (recommended — cookie-based auth):
      1. In the login success handler (login.html), also set a cookie:
         document.cookie = `access_token=${data.access_token}; path=/; SameSite=Strict; Secure`;
      2. Keep localStorage for API calls (Bearer header via fetch wrapper)
      3. On logout, clear both localStorage and the cookie

    Option B (JS-only auth — remove server-side checks):
      1. Remove _get_ui_user() checks from UI routes
      2. Serve all pages unconditionally (like /dashboard already does)
      3. Let the JS auth check in base.html handle redirection
      4. API calls are already protected by Bearer token

    Option A is more secure (prevents accessing pages without valid token even if JS is disabled).

