plan_id: spectra-round8-2026-03-08
objective: >-
  Produce a compact implementation plan for DB-authoritative LLM runtime config,
  collapsed LiteLLM-backed cloud provider semantics, current actionable fixes,
  and single-node-first infrastructure documentation.
created_at: '2026-03-08'
created_by: GitHub Copilot (GPT-5.4)
status: completed
research_confidence: high

tldr: |
  Keep SystemConfig as the authoritative source for runtime LLM settings,
  collapse cloud execution semantics into one LiteLLM-backed provider concept,
  fix the currently identified code and test hygiene issues, and document a
  single-node-first deployment path that can later expand into UI-managed
  multi-node infrastructure.

open_questions:
  - Should embedding-provider naming and UI copy be collapsed to the same LiteLLM-backed cloud terminology in this round, or left as a follow-up after LLM routing semantics are unified?
  - Should direct non-Ollama cloud fallback in app/services/ai/llm.py remain as a compatibility path, or should all non-mock cloud execution be forced through LiteLLM now?

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Legacy AI rows normalize into the wrong LiteLLM-backed provider shape, changing effective routing after startup or settings saves.
      likelihood: medium
      impact: high
      mitigation: Centralize legacy normalization in the runtime settings service, preserve compatibility reads during rollout, and verify old-row plus mixed-row cases in the targeted settings suite.
    - scenario: UI, API, and tests collapse provider labels inconsistently, leaving setup, status, or /test-llm behavior out of sync with runtime routing.
      likelihood: medium
      impact: high
      mitigation: Treat schemas, setup/settings templates, UI router responses, and their focused tests as one contract change and validate with both settings-test-runner and ui-test-runner.
    - scenario: Future-improvements docs describe split-node growth without a clear migration path from a working single-node deployment, causing operators to implement unsupported topology changes.
      likelihood: medium
      impact: medium
      mitigation: Add an explicit staged roadmap covering single-node baseline, promoted remote tool execution, and later UI-managed node splitting for core services.
  assumptions:
    - DATABASE_URL remains bootstrap or environment managed and is not part of DB-authoritative runtime LLM configuration.
    - The existing Docker Compose test services remain the recommended validation entrypoints for this work.
    - Mock and Ollama remain distinct provider modes even after cloud semantics collapse into LiteLLM-backed routing.

implementation_specification:
  code_structure: >-
    Keep the DB-backed runtime settings service as the authority for LLM state,
    then align router construction, direct fallback behavior, setup/settings
    payloads, templates, tests, and docs around one LiteLLM-backed cloud
    provider concept plus separate Ollama and Mock paths.
  affected_areas:
    - app/services runtime normalization, routing, and fallback behavior
    - setup/settings schemas, UI API responses, and HTML templates
    - targeted unit and UI test entrypoints plus infrastructure roadmap docs
  component_details:
    - component: Runtime LLM configuration service
      responsibility: Normalize legacy AI rows, persist resolved runtime config in SystemConfig, and expose LiteLLM-backed provider semantics to routing code.
      interfaces:
        - Startup hydration from SystemConfig before AI initialization.
        - Settings and setup writes that rehydrate resolved runtime state from DB.
        - Compatibility serialization for legacy fields without treating them as the source of truth.
    - component: Setup and settings contract
      responsibility: Present one cloud provider concept in schemas, templates, status payloads, and connection testing while preserving Ollama and Mock distinctions.
      interfaces:
        - POST /api/auth/setup payload validation and persistence.
        - GET and POST /api/settings plus GET /api/ai/status.
        - POST /test-llm request shaping from setup and settings pages.
    - component: Validation and operator roadmap
      responsibility: Fix the known UI test bootstrap issue and document the supported path from single-node deployment to later UI-managed split-node infrastructure.
      interfaces:
        - docker compose -f docker/docker-compose.test.yml run --rm settings-test-runner
        - docker compose -f docker/docker-compose.test.yml run --rm ui-test-runner
        - docs/FUTURE_IMPROVEMENTS.md operator roadmap sections
  dependencies:
    - component: app.models.config.SystemConfig
      relationship: Stores the authoritative runtime LLM configuration and compatibility keys.
    - component: app/services/ai/router.py and app/services/ai/llm.py
      relationship: Must consume the unified LiteLLM-backed cloud semantics.
    - component: setup/settings APIs and templates
      relationship: Must present and persist the same provider semantics as runtime routing.
  integration_points:
    - Lifespan startup hydration before router or embedding initialization.
    - First-run setup writes and post-write DB rehydration.
    - Admin settings reads, writes, AI status, and connection tests.
    - Docker Compose validation for focused runtime tests and UI regression checks.

tasks:
  - id: task-001
    title: Unify runtime provider semantics behind DB-authoritative LiteLLM-backed routing
    description: |
      Deliver the core runtime change that keeps SystemConfig authoritative for LLM
      behavior while collapsing cloud provider semantics into one LiteLLM-backed
      concept. This task covers runtime normalization, router assembly, direct
      fallback decisions, and focused unit-test updates so the code no longer
      models api and litellm as separate cloud families.
    agent: developer
    priority: high
    status: completed
    dependencies: []
    context_files:
      - app/services/system/runtime_settings.py: Current DB hydration, compatibility serialization, and legacy normalization logic.
      - app/services/ai/router.py: Current split cloud-provider router assembly.
      - tests/unit/test_runtime_settings.py: Focused normalization and startup-order coverage.
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 300
    focus_area: runtime/provider-architecture
    verification:
      - Run docker compose -f docker/docker-compose.test.yml run --rm settings-test-runner after updating runtime normalization, router behavior, and focused unit expectations.
      - Verify legacy rows that previously surfaced api semantics now resolve to the unified LiteLLM-backed cloud provider shape without breaking Ollama or Mock behavior.
      - Verify cache or singleton reset paths still rebuild resolved runtime state from DB after setup or settings writes.
    acceptance_criteria:
      - SystemConfig remains the authoritative runtime source for LLM provider behavior, while JSON runtime files stay non-authoritative compatibility storage.
      - Runtime normalization, router construction, and direct fallback code no longer depend on separate api versus litellm cloud identities.
      - Focused tests cover legacy-row normalization, unified cloud-route translation, and startup hydration ordering under the collapsed semantics.
      - Recommended Docker validation command is documented and passes: docker compose -f docker/docker-compose.test.yml run --rm settings-test-runner.
    failure_modes:
      - scenario: A partial refactor leaves compatibility serialization emitting api-shaped values that reintroduce the old split during rehydration.
        likelihood: medium
        impact: high
        mitigation: Update serialization and inference helpers together and keep round-trip tests for legacy, normalized, and mixed DB states.
    tech_stack:
      - Python 3.11
      - FastAPI
      - SQLAlchemy
      - LiteLLM
    test_coverage: Update focused unit coverage for runtime normalization, router config building, and fallback behavior.

  - id: task-002
    title: Align setup, settings, and operator-facing cloud semantics with the unified runtime model
    description: |
      Deliver one user-facing cloud-provider story across setup, settings, schemas,
      status payloads, connection tests, and operator docs. This task removes the
      duplicate api versus litellm choice from the UI and API contract, updates
      request and template tests, and rewrites setup and deployment semantics to
      match the clarified architecture.
    agent: developer
    priority: high
    status: completed
    dependencies:
      - task-001
    context_files:
      - app/templates/setup.html: First-run provider selection and test payload shaping.
      - app/templates/settings.html: Post-setup provider choices and copy.
      - app/api/routers/ui.py: Settings, AI status, and connection test semantics.
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 320
    focus_area: ui/setup/docs-semantics
    verification:
      - Run docker compose -f docker/docker-compose.test.yml run --rm settings-test-runner after schema, router response, and template expectation updates.
      - Run docker compose -f docker/docker-compose.test.yml run --rm ui-test-runner after setup and settings UI semantics are updated.
      - Verify setup, settings, AI status, and /test-llm all present one LiteLLM-backed cloud option plus separate Ollama and Mock behavior.
    acceptance_criteria:
      - Setup and settings UI no longer present api and litellm as separate cloud provider choices.
      - Schemas, settings responses, AI status metadata, and /test-llm request shaping reflect the unified LiteLLM-backed cloud terminology.
      - .env.example and docs/deployment.md stop teaching AI_PROVIDER=api as the default cloud example and instead document the collapsed semantics.
      - Recommended Docker validation commands are captured and usable: docker compose -f docker/docker-compose.test.yml run --rm settings-test-runner and docker compose -f docker/docker-compose.test.yml run --rm ui-test-runner.
    failure_modes:
      - scenario: Template copy changes land without matching schema or response updates, so the UI shows unified language while backend validation still expects legacy provider ids.
        likelihood: medium
        impact: high
        mitigation: Treat schemas, UI router payloads, templates, and their focused tests as one acceptance boundary and validate both API and browser paths.
    tech_stack:
      - HTML templates
      - Vanilla JavaScript
      - FastAPI
      - Pydantic
      - Markdown
    test_coverage: Update template, setup, and settings API tests to assert the unified cloud-provider contract.

  - id: task-003
    title: Fix remaining actionable errors and document the single-node-first infrastructure roadmap
    description: |
      Resolve the currently identified actionable workspace issues and expand the
      future-improvements roadmap so operators see a supported progression from one
      local node to later UI-managed remote nodes. This task covers the UI test
      conftest warning, any directly related lint cleanup, and roadmap language for
      single-node first, remote tool workers next, and later core-service splitting.
    agent: developer
    priority: medium
    status: completed

