      direction: inbound
    - component: app/services/ai/router.py
      relationship_to_domain: Consumes normalized profiles to build LiteLLM routing.
      direction: outbound
    - component: app/services/ai/llm.py
      relationship_to_domain: Consumes router/default provider state for client creation.
      direction: outbound
  external:
    - name: SQLAlchemy
      purpose_for_domain: Persists and hydrates `SystemConfig` rows via async sessions.
    - name: Pydantic / pydantic-settings
      purpose_for_domain: Validates provider payloads and base settings.
    - name: LiteLLM
      purpose_for_domain: Unified completion and router layer for cloud and routed model access.
    - name: Docker Compose
      purpose_for_domain: Containerized validation path for the targeted runtime/settings test suite.
    - name: Playwright
      purpose_for_domain: Browser/UI test layer whose conftest currently has the only actionable diagnostic in this audit scope.

change_scope_required:
  - file: app/api/schemas.py
    current_behavior: >-
      `AIProviderProfile`, `SystemSetupRequest`, and `SettingsUpdateRequest` all accept
      both `api` and `litellm` as separate provider ids, and first-run schemas also keep
      legacy `provider_api` / `llm_provider` fields.
    architecture_conflict: >-
      This preserves a conceptual split between cloud API routing and LiteLLM routing.
    exact_change_needed: >-
      Collapse accepted cloud provider ids to a single LiteLLM-backed concept for LLMs,
      preserving only `ollama`, `litellm`, and `mock` for LLM provider selection; retain
      model strings and optional `base_url` / `api_key` as LiteLLM profile properties.
  - file: app/services/system/runtime_settings.py
    current_behavior: >-
      Legacy normalization and compatibility serialization branch separately for `api`
      versus `litellm`, and compatibility tier serialization emits `openai/...` only for
      `api` providers.
    architecture_conflict: >-
      Structured DB-backed config still encodes cloud routes as two provider types.
    exact_change_needed: >-
      Normalize legacy cloud rows to one LiteLLM-backed provider semantic, update
      `_serialize_tier_model()` / `_infer_profile_from_model()` / `_build_legacy_profiles()` /
      `serialize_runtime_ai_config_values()` / `apply_runtime_settings()` to treat
      openai-compatible credentials and raw provider-prefixed LiteLLM routes as one cloud
      provider concept while preserving `ollama` and `mock`.
  - file: app/services/ai/router.py
    current_behavior: >-
      Legacy router config builder keeps separate `api` and `litellm` branches, and
      structured profile handling also distinguishes the two when building LiteLLM params.
    architecture_conflict: >-
      Router assembly preserves two cloud-provider modes even though execution goes through LiteLLM.
    exact_change_needed: >-
      Merge the `api` and `litellm` config-building paths behind one LiteLLM-backed cloud
      profile builder that decides whether to pass `model` as raw route or `openai/...`
      based on the profile model/base-url data rather than provider identity alone.
  - file: app/services/ai/llm.py
    current_behavior: >-
      Direct-client fallback only supports `api/openai`, not `litellm`, and the factory
      docstring still documents `ollama`, `api`, and `mock`.
    architecture_conflict: >-
      Direct fallback semantics no longer match the runtime router architecture.
    exact_change_needed: >-
      Rename or replace the cloud direct-client branch so fallback logic aligns with one
      LiteLLM-backed cloud provider concept, or remove the naming distinction entirely
      from direct fallback code paths while preserving `ollama` and `mock` behavior.
  - file: app/api/routers/ui.py
    current_behavior: >-
      `/api/ai/status` returns `provider_info.api`, and `/test-llm` maps every non-Ollama
      request to `provider="api"`.
    architecture_conflict: >-
      API surface still exposes and tests a separate `api` provider concept.
    exact_change_needed: >-
      Rename status metadata and connection-test handling to the unified LiteLLM-backed
      cloud semantics, keeping Ollama-specific host testing separate and preserving mock.
  - file: app/templates/setup.html
    current_behavior: >-
      UI offers separate `api` and `litellm` options and explicitly rewrites `litellm`
      to `api` when testing the default profile.
    architecture_conflict: >-
      First-run UX teaches users that `api` and `litellm` are different provider families.
    exact_change_needed: >-
      Remove the duplicate provider choice from setup, collapse cloud copy to one LiteLLM
      route/profile concept, and stop coercing `litellm` to `api` in client-side payloads.
  - file: app/templates/settings.html
    current_behavior: >-
      Post-setup settings repeats separate `api` and `litellm` options and labels embeddings
      as using the default API profile.
    architecture_conflict: >-
      Ongoing admin UX still reflects the old dual-provider model.
    exact_change_needed: >-
      Mirror the setup-page collapse: one LiteLLM-backed cloud option, Ollama, and Mock;
      update embedding copy so it references the default LiteLLM/cloud profile rather than `API`.
  - file: tests/unit/test_settings_runtime_api.py
    current_behavior: >-
      Test stubs use `AI_PROVIDER="api"` and `provider: "api"` for the default cloud profile.
    architecture_conflict: >-
      Tests encode the split semantics as the expected runtime shape.
    exact_change_needed: >-
      Update fixture defaults and assertions to the unified LiteLLM-backed cloud provider terminology.
  - file: tests/unit/test_system_setup.py
    current_behavior: >-
      Legacy setup fixture and structured profiles both use `api` as the cloud provider id.
    architecture_conflict: >-
      Setup tests preserve the legacy cloud-provider identity as canonical.
    exact_change_needed: >-
      Update legacy and structured setup expectations to the collapsed provider semantics,
      leaving Ollama and Mock distinctions unchanged.
  - file: tests/unit/test_runtime_settings.py
    current_behavior: >-
      Legacy-row normalization expectations start from `AI_PROVIDER: api`.
    architecture_conflict: >-
      Compatibility tests still treat `api` as the baseline cloud runtime identity.
    exact_change_needed: >-
      Rewrite legacy normalization expectations so cloud rows normalize to the single LiteLLM-backed concept.
  - file: tests/unit/test_smart_router.py
    current_behavior: >-
      Contains explicit `TestLiteLLMProvider` coverage for the separate legacy `litellm` branch.
    architecture_conflict: >-
      The test suite assumes two distinct cloud branches in legacy router construction.
    exact_change_needed: >-
      Refocus coverage on unified cloud-profile translation and raw route handling instead of a separate provider branch.
  - file: .env.example
    current_behavior: >-
      Documents `api` and `litellm` as separate supported values and uses `AI_PROVIDER=api` as the default cloud example.
    architecture_conflict: >-
      Operator guidance conflicts with the intended unified LiteLLM architecture.
    exact_change_needed: >-
      Update examples so cloud configuration is expressed through LiteLLM-backed semantics only, while preserving separate Ollama and Mock examples.
  - file: docs/deployment.md
    current_behavior: >-
      Production examples still use `AI_PROVIDER=api`.
    architecture_conflict: >-
      Deployment docs still teach the deprecated conceptual split.
    exact_change_needed: >-
      Replace `api`-specific examples with unified LiteLLM-backed cloud configuration examples.

current_db_runtime_flow:
  authoritative_flow:
    - step: Startup constructs the settings singleton from environment plus non-AI runtime JSON cache.
      evidence: app/core/config.py:234
    - step: Lifespan startup hydrates DB-backed runtime settings from `SystemConfig` before embedding initialization.
      evidence: app/core/lifespan.py:164
    - step: Settings updates build a runtime AI config, upsert `SystemConfig`, commit, rehydrate from DB, then save non-AI runtime cache JSON.
      evidence: app/api/routers/ui.py:299
    - step: First-run setup writes runtime AI config into `SystemConfig`, commits, and rehydrates from DB.
      evidence: app/services/system/setup.py:156
  non_db_source_of_truth_behavior_remaining:
    - behavior: SQLAlchemy engine bootstrap remains environment/bootstrap-only via `settings.DATABASE_URL`.
      evidence: app/core/database.py:60
    - behavior: '`reports/runtime_settings.json` is still written and loaded, but AI/provider fields are explicitly excluded.'
      evidence: app/core/config.py:135
    - behavior: External DB settings are additionally written to `reports/infra_config.json` during setup.
      evidence: app/services/system/setup.py:204
    - behavior: Legacy compatibility fields (`AI_PROVIDER`, `LLM_MODEL`, `LLM_TIER*_MODEL`, `OLLAMA_ENABLED`) are still serialized into DB rows and back into the in-memory singleton.
      evidence: app/services/system/runtime_settings.py:456

