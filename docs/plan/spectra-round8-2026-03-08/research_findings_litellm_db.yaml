future_improvements_doc_gap:
  existing_coverage:
    - item: UI-driven remote node registration and management exists in the roadmap.
      evidence: docs/FUTURE_IMPROVEMENTS.md:80
    - item: Single-host-then-split-host phasing is explicitly documented for the RAG service.
      evidence: docs/FUTURE_IMPROVEMENTS.md:143
  missing_or_partial_coverage:
    - gap: >-
        The document does not explicitly say that the whole platform should start with
        `app + db + tools` on one server first and only later split those roles across nodes.
      evidence: docs/FUTURE_IMPROVEMENTS.md:56
    - gap: >-
        The multi-server section describes adding remote servers from the UI, but it does
        not define a phase where an existing single-node deployment is promoted into
        UI-managed multi-node topology for the core stack.
      evidence: docs/FUTURE_IMPROVEMENTS.md:80
    - gap: >-
        Tool scaling focuses on container pooling and concurrent missions, not on the
        operator workflow for moving tool execution from a single local node to remote,
        UI-managed worker nodes later.
      evidence: docs/FUTURE_IMPROVEMENTS.md:56

open_questions:
  - question: >-
      Should the embedding-provider naming also be collapsed from `api` to the same
      LiteLLM-backed cloud terminology used for chat/completions?
    context: >-
      The setup/settings templates and embedding service still expose `embedding_provider=api`
      even though the LLM clarification applies to cloud routing semantics too
      (`app/templates/setup.html:173`, `app/templates/settings.html:166`, `app/services/ai/embeddings.py:71`).
  - question: >-
      Is the legacy direct-client fallback in `app/services/ai/llm.py` intended to remain,
      or should all non-mock/non-Ollama execution paths be forced through LiteLLM only?
    context: >-
      The smart router is primary, but `get_default_llm_client()` still falls back to
      direct `APIClient` creation if router setup fails (`app/services/ai/llm.py:876`).
  - question: >-
      Is persisting `DATABASE_URL` into `SystemConfig` still required now that database
      connectivity remains bootstrap-only and setup also writes `reports/infra_config.json`?
    context: >-
      Setup writes external DB config to both DB and JSON, but engine creation still reads
      only bootstrap settings (`app/services/system/setup.py:185`, `app/core/database.py:60`).

