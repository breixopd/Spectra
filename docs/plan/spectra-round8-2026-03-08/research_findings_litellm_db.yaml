plan_id: spectra-round8-2026-03-08
objective: >-
  Audit the current codebase for LiteLLM-vs-API provider semantics, DB-backed LLM
  runtime configuration, current actionable errors, and documentation gaps around
  single-node-first deployment and later UI-driven node splitting.
focus_area: litellm_db
created_at: '2026-03-08'
created_by: GitHub Copilot (GPT-5.4)
status: completed

tldr: |
  - The runtime AI source of truth is currently the database-backed `SystemConfig` flow for LLM/provider settings: startup hydrates DB rows into the in-memory singleton before embeddings load, and settings/setup writes rehydrate from DB before saving JSON compatibility cache.
  - The codebase still models cloud routing as two conceptual providers, `api` and `litellm`, across schemas, templates, router branches, runtime normalization, direct-client fallback code, tests, and `.env` docs, which conflicts with the clarified architecture that all cloud traffic goes through LiteLLM.
  - No functional failures were found in the targeted settings/runtime/router suite: `docker compose -f docker/docker-compose.test.yml run --rm settings-test-runner` passed with `46 passed in 4.05s`.
  - The only current actionable workspace diagnostic found in the audited area is in `tests/e2e/ui/conftest.py`: permissive `urllib.request.urlopen()` scheme handling plus an import-order lint issue.
  - `docs/FUTURE_IMPROVEMENTS.md` already describes UI-driven multi-server management and a phased one-host-to-second-host RAG split, but it does not state the same single-node-first-to-node-splitting lifecycle for the overall app/db/tools stack.

research_metadata:
  methodology: >-
    Two-pass codebase inspection using repo memory review, semantic discovery,
    exact pattern search, targeted file reads, static diagnostics, and one
    containerized validation run for the settings/runtime/router suite.
  tools_used:
    - memory
    - semantic_search
    - grep_search
    - read_file
    - file_search
    - get_errors
    - run_in_terminal
    - list_dir
    - create_file
  scope: >-
    LiteLLM/runtime-settings architecture, setup/settings API surface, UI setup and
    settings templates, targeted tests, test compose configuration, and related
    deployment/future-improvements documentation.
  confidence: high
  coverage: 89

