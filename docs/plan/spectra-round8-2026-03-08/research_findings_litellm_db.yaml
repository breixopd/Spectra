patterns_found:
  - category: architecture
    pattern: Cloud routing is still modeled as two conceptual providers
    description: >-
      The runtime layer, router, API schemas, UI templates, tests, and docs still treat
      `api` and `litellm` as separate provider identities even though cloud traffic is
      already routed through LiteLLM.
    examples:
      - file: app/api/schemas.py
        location: app/api/schemas.py:312
        snippet: |
          if provider not in {"ollama", "api", "litellm", "mock"}:
              raise ValueError("Unsupported provider")
      - file: app/services/ai/router.py
        location: app/services/ai/router.py:406
        snippet: |
          elif provider == "api":
              base_url = profile.get("base_url")
              litellm_model = f"openai/{model}" if base_url else model
          elif provider == "litellm":
              litellm_params = {"model": model}
      - file: app/templates/setup.html
        location: app/templates/setup.html:416
        snippet: |
          const payload = {
              provider: profile.provider === 'litellm' ? 'api' : profile.provider,
              model: profile.model,
          };
    prevalence: common

  - category: structure
    pattern: DB-backed runtime AI config coexists with legacy compatibility fields
    description: >-
      Structured provider profiles, routing, and fallbacks are authoritative at runtime,
      but the system still serializes and reapplies legacy fields such as `AI_PROVIDER`,
      `LLM_MODEL`, `LLM_TIER*_MODEL`, and `OLLAMA_ENABLED`.
    examples:
      - file: app/services/system/runtime_settings.py
        location: app/services/system/runtime_settings.py:456
        snippet: |
          values["AI_PROVIDER"] = (str(default_profile.get("provider", "mock")), False)
          api_profile = _find_first_profile(runtime_ai_config.profiles, ("api", "litellm"))
      - file: app/services/system/runtime_settings.py
        location: app/services/system/runtime_settings.py:571
        snippet: |
          settings.AI_PROVIDER = default_provider
          settings.OLLAMA_ENABLED = any(
              profile.get("provider") == "ollama"
              for profile_name, profile in runtime_ai_config.profiles.items()
          )
    prevalence: common

  - category: architecture
    pattern: DB is authoritative for LLM runtime settings, but not for database connectivity bootstrap
    description: >-
      Startup hydrates AI/runtime settings from `SystemConfig`, while the SQLAlchemy engine
      is still created from `settings.DATABASE_URL` before any DB hydration can occur.
    examples:
      - file: app/core/lifespan.py
        location: app/core/lifespan.py:164
        snippet: |
          await hydrate_runtime_settings_from_db(persist_normalized=True, commit=True)
          logger.info("[OK] Runtime settings hydrated from DB")
      - file: app/core/database.py
        location: app/core/database.py:60
        snippet: |
          db_url, connect_args = _configure_database_url(settings.DATABASE_URL.get_secret_value())
          engine = create_async_engine(db_url, ...)
    prevalence: common

  - category: structure
    pattern: Non-AI runtime JSON remains a compatibility cache, and infra DB settings also persist to a separate JSON file
    description: >-
      `reports/runtime_settings.json` is used only for non-AI runtime fields, while
      external DB settings are additionally written to `reports/infra_config.json`.
    examples:
      - file: app/core/config.py
        location: app/core/config.py:135
        snippet: |
          def save_runtime_settings(self):
              """Save current settings to a runtime JSON file for persistence.
              Runtime AI settings are intentionally excluded..."""
      - file: app/services/system/setup.py
        location: app/services/system/setup.py:204
        snippet: |
          config_path = Path("reports/infra_config.json")
    prevalence: occasional

  - category: testing
    pattern: Targeted settings/runtime/router validation is containerized and currently passing
    description: >-
      The repo-standard targeted suite runs through `settings-test-runner` and completed
      successfully during this audit.
    examples:
      - file: docker/docker-compose.test.yml
        location: docker/docker-compose.test.yml:149
        snippet: |
          settings-test-runner:
            command:
              - >-
                python -m pytest
                tests/unit/test_runtime_settings.py
                tests/unit/test_system_setup.py
                tests/unit/test_smart_router.py
                tests/unit/test_settings_runtime_api.py
                tests/unit/test_settings_templates.py
      - file: docker/docker-compose.test.yml
        location: docker/docker-compose.test.yml:159
        snippet: |
          tests/unit/test_runtime_settings.py
          tests/unit/test_system_setup.py
          tests/unit/test_smart_router.py
    prevalence: occasional

related_architecture:
  components_relevant_to_domain:
    - component: Runtime settings normalization service
      responsibility: Read `SystemConfig`, normalize provider profiles/routing/fallbacks, apply them to the settings singleton, and reset caches.
      location: app/services/system/runtime_settings.py:661
      relationship_to_domain: Core authority for runtime LLM/provider state.
    - component: Setup service
      responsibility: Persist first-run config and trigger DB-backed runtime hydration.
      location: app/services/system/setup.py:29
      relationship_to_domain: First writer for LLM/provider settings.
    - component: Settings UI/API router
      responsibility: Mutate runtime config, expose resolved state, and test connectivity.
      location: app/api/routers/ui.py:201
      relationship_to_domain: Ongoing writer/reader for runtime LLM config.
    - component: LiteLLM smart router
      responsibility: Build model configs and execute routed completions.
      location: app/services/ai/router.py:429
      relationship_to_domain: Consumes normalized runtime provider state.
    - component: SQLAlchemy bootstrap layer
      responsibility: Create DB engine and session maker from bootstrap config.
      location: app/core/database.py:60
      relationship_to_domain: Defines the non-DB bootstrap boundary for `DATABASE_URL`.
  interfaces_used_by_domain:
    - interface: POST /api/auth/setup
      location: app/services/system/setup.py:116
      usage_pattern: Accepts structured provider profiles or legacy `llm_provider` fields and writes DB-backed runtime config.
    - interface: POST /api/settings
      location: app/api/routers/ui.py:201
      usage_pattern: Partially updates DB-backed runtime config, rehydrates from DB, then persists non-AI runtime JSON cache.
    - interface: GET /api/settings
      location: app/api/routers/ui.py:364
      usage_pattern: Returns legacy compatibility fields plus structured resolved runtime config.
    - interface: GET /api/ai/status
      location: app/api/routers/ui.py:405
      usage_pattern: Exposes health, resolved routes, and per-provider connection metadata.
    - interface: POST /test-llm
      location: app/api/routers/ui.py:438
      usage_pattern: Connection test endpoint that still maps every non-Ollama provider to `api`.
  data_flow_involving_domain: >-
    `SystemSetupRequest` or `SettingsUpdateRequest` -> `build_runtime_ai_config_from_payload()` ->
    `serialize_runtime_ai_config_values()` -> `SystemConfig` rows -> `hydrate_runtime_settings_from_db()` ->
    in-memory `settings` singleton -> `create_smart_router()` / `get_default_llm_client()`.
    Separately, `settings.save_runtime_settings()` persists non-AI cache fields to
    `reports/runtime_settings.json`, and `SystemSetupService._save_infra_config()` writes
    `reports/infra_config.json` for external DB references.
  key_relationships_to_domain:
    - from: app/core/lifespan.py
      to: app/services/system/runtime_settings.py
      relationship: calls
    - from: app/services/system/setup.py
      to: app/services/system/runtime_settings.py
      relationship: calls
    - from: app/api/routers/ui.py
      to: app/services/system/runtime_settings.py
      relationship: calls
    - from: app/services/ai/router.py
      to: app/core.config settings singleton
      relationship: reads
    - from: app/services/ai/llm.py
      to: app/services/ai/router.py
      relationship: calls
    - from: app/core/database.py
      to: app/core/config.py
      relationship: reads

related_conventions:
  naming_patterns_in_domain: >-
    The code uses `AI_PROVIDER` as the legacy global selector, `provider_profiles` /
    `provider_routing` / `provider_fallbacks` for structured config, and still reserves
    the literal provider ids `api`, `litellm`, `ollama`, and `mock` across schemas,
    tests, and templates.
  structure_of_domain: >-
    Runtime config logic is centralized in `app/services/system/runtime_settings.py`.
    API validation lives in `app/api/schemas.py`, persistence and read endpoints in
    `app/api/routers/ui.py`, setup bootstrap in `app/services/system/setup.py`, and
    execution routing in `app/services/ai/router.py` plus `app/services/ai/llm.py`.
  error_handling_in_domain: >-
    DB hydration normalizes malformed JSON rows by ignoring invalid values, router creation
    warns and falls back to direct LiteLLM calls when no configs exist, and `/test-llm`
    returns a generic failure payload rather than propagating provider-specific exceptions.
  testing_in_domain: >-
    Focused unit coverage exists for normalization, setup persistence, router profile
    mapping, runtime settings APIs, and template behavior. The documented containerized
    validation path is the five-test `settings-test-runner` service.
  documentation_in_domain: >-
    Operator-facing docs currently mix the newer “LiteLLM smart routing” architecture with
    legacy `AI_PROVIDER=api` examples and separate `api`/`litellm` options in UI copy.

