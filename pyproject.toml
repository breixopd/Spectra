[tool.bandit]
exclude_dirs = ["tests", "alembic"]
skips = ["B101"]  # assert is fine in non-production code

[tool.bandit.assert_used]
skips = ["*/tests/*", "*/test_*.py"]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "S", "B", "UP"]
ignore = ["E501", "S101", "S108", "B008"]
# S = bandit rules via ruff (security)
# B = bugbear (common bugs)
# UP = pyupgrade

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "S106"]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"
reportMissingImports = "none"
reportMissingModuleSource = "none"
