# =============================================================================
# TensorZero Gateway Configuration for Spectra
# =============================================================================
#
# All AI inference routes through TensorZero using the native DeepSeek provider.
# Set DEEPSEEK_API_KEY in secrets/.env (Compose) or Swarm secret.
#
# Tiers:
#   fast     — deepseek-v4-flash (deepseek-chat), thinking disabled
#   balanced — deepseek-v4-flash (deepseek-chat), thinking enabled
#   capable  — deepseek-v4-pro (deepseek-reasoner), thinking enabled
#
# DEEPSEEK_API_KEY is required at gateway boot — the gateway validates provider
# credentials on startup, so it must be set in .env / Swarm secret before launch.
#

[gateway]
bind_address = "0.0.0.0:3000"

# =============================================================================
# Models — Three tiers (native DeepSeek)
# =============================================================================

[models.fast]
routing = ["primary"]

[models.fast.providers.primary]
type = "deepseek"
model_name = "deepseek-chat"
api_key_location = "env::DEEPSEEK_API_KEY"
extra_body = [{ "pointer" = "/thinking/type", "value" = "disabled" }]

[models.balanced]
routing = ["primary"]

[models.balanced.providers.primary]
type = "deepseek"
model_name = "deepseek-chat"
api_key_location = "env::DEEPSEEK_API_KEY"
extra_body = [{ "pointer" = "/thinking/type", "value" = "enabled" }]

[models.capable]
routing = ["primary"]

[models.capable.providers.primary]
type = "deepseek"
model_name = "deepseek-reasoner"
api_key_location = "env::DEEPSEEK_API_KEY"
# DeepSeek thinking.type accepts only adaptive | enabled | disabled. "enabled" gives
# the reasoner full chain-of-thought (the highest-reasoning tier).
extra_body = [{ "pointer" = "/thinking/type", "value" = "enabled" }]

# =============================================================================
# Functions — Map Spectra tasks to model tiers
# =============================================================================

[functions.scope]
type = "chat"

[functions.scope.variants.default]
type = "chat_completion"
model = "fast"

[functions.tool_selection]
type = "chat"

[functions.tool_selection.variants.default]
type = "chat_completion"
model = "fast"

[functions.safety_check]
type = "chat"

[functions.safety_check.variants.default]
type = "chat_completion"
model = "fast"

[functions.parsing]
type = "chat"

[functions.parsing.variants.default]
type = "chat_completion"
model = "fast"

[functions.planning]
type = "chat"

[functions.planning.variants.default]
type = "chat_completion"
model = "balanced"

[functions.steering]
type = "chat"

[functions.steering.variants.default]
type = "chat_completion"
model = "balanced"

[functions.consensus]
type = "chat"

[functions.consensus.variants.default]
type = "chat_completion"
model = "balanced"

[functions.vector_generation]
type = "chat"

[functions.vector_generation.variants.default]
type = "chat_completion"
model = "balanced"

[functions.reporting]
type = "chat"

[functions.reporting.variants.default]
type = "chat_completion"
model = "balanced"

[functions.exploit_crafting]
type = "chat"

[functions.exploit_crafting.variants.default]
type = "chat_completion"
model = "capable"

[functions.poc_generation]
type = "chat"

[functions.poc_generation.variants.default]
type = "chat_completion"
model = "capable"

[functions.post_exploitation]
type = "chat"

[functions.post_exploitation.variants.default]
type = "chat_completion"
model = "capable"

[functions.default]
type = "chat"

[functions.default.variants.default]
type = "chat_completion"
model = "balanced"

# =============================================================================
# Metrics
# =============================================================================

[metrics.task_success]
type = "boolean"
level = "inference"
optimize = "max"

[metrics.exploit_success]
type = "boolean"
level = "inference"
optimize = "max"

[metrics.response_quality]
type = "float"
level = "inference"
optimize = "max"
