[pytest]
# Register custom marks to avoid warnings
markers =
    asyncio: mark a test as an async test that requires the asyncio loop
    e2e: mark a test as an end-to-end test
    integration: mark a test as an integration test
    slow: mark a test as slow-running
    live: mark a test as a live test (no mocking - uses real DB and LLM)
    ui: mark a test as a browser UI test (Playwright)
    property: mark a test as property-based (hypothesis)

# Configure test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Configure output
log_cli = false

# Explicitly configure file logging
log_file = logs/spectra_testing.log
log_file_level = DEBUG
log_file_format = %(asctime)s | %(levelname)-8s | %(name)s:%(lineno)d | %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Configure test running with coverage
# Note: Use `pytest -s` to see output when debugging locally
addopts =
    --verbose
    --tb=short
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html:reports/coverage
    --cov-fail-under=70
    --cov-config=.coveragerc

# Warning filters
filterwarnings =
    ignore::DeprecationWarning
    ignore:coroutine.*was never awaited:RuntimeWarning

# Add current directory to python path
pythonpath = .

# Configure asyncio
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function

# Configure pytest-dotenv to load test environment variables
env_files =
    .env.test
env_override_existing_values = 1
