<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Shield icon -->
  <path d="M600 180 l-50 -25 l0 45 c0 38 50 63 50 63 s50-25 50-63 l0-45 z" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>
  <!-- Brand name -->
  <text x="600" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#ffffff">Spectra</text>
  <!-- Tagline -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#64748b">AI-Powered Penetration Testing Platform</text>
  <!-- Accent line -->
  <rect x="525" y="400" width="150" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>
