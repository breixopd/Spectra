<!DOCTYPE html>
<html lang="en">
<head>
    {% include 'partials/head.html' %}
    <title>Reset Password — Spectra</title>
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
<div class="card">
    <div class="logo">
        <a href="/">
            {% include 'partials/shield_svg.html' %}
            Spectra
        </a>
    </div>

    <div id="formView">
        <h1>Set New Password</h1>
        <p class="subtitle">Enter your new password below.</p>

        <form id="resetForm">
            <div class="field">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" required minlength="8" maxlength="128" autocomplete="new-password" placeholder="Minimum 8 characters">
            </div>
            <div class="field">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" name="confirm" required minlength="8" maxlength="128" autocomplete="new-password" placeholder="Repeat password">
            </div>
            <button type="submit" class="btn" id="submitBtn">Reset Password</button>
        </form>
        <div id="msg" class="msg"></div>
    </div>

    <div id="noTokenView" class="invalid-token" style="display:none;">
        <h1>Invalid Link</h1>
        <p>This password reset link is missing or invalid. Please request a new one.</p>
        <a href="/forgot-password" class="btn" style="display:inline-block;text-decoration:none;text-align:center;">Request New Link</a>
    </div>

    <div class="links"><a href="/login">Back to Sign In</a></div>
</div>

<script nonce="{{ request.state.csp_nonce }}">
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
        document.getElementById('formView').style.display = 'none';
        document.getElementById('noTokenView').style.display = 'block';
    }

    const form = document.getElementById('resetForm');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.className = 'msg';
        msg.textContent = '';

        const pw = form.password.value;
        const confirm = form.confirm.value;
        if (pw !== confirm) {
            msg.textContent = 'Passwords do not match.';
            msg.className = 'msg error';
            return;
        }

        btn.disabled = true; btn.textContent = 'Resetting…';
        try {
            const res = await fetch('/api/public/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token, new_password: pw }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Reset failed');
            msg.textContent = data.detail || 'Password reset! Redirecting…';
            msg.className = 'msg success';
            setTimeout(() => { window.location.href = '/login'; }, 2000);
        } catch (err) {
            msg.textContent = err.message;
            msg.className = 'msg error';
            btn.disabled = false; btn.textContent = 'Reset Password';
        }
    });
</script>
</body>
</html>
