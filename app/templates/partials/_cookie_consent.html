{# Cookie consent banner — include at the bottom of base.html and landing.html #}
<div id="cookie-consent" class="fixed bottom-0 left-0 right-0 z-50 hidden" role="alert" aria-label="Cookie consent">
  <div class="mx-auto max-w-5xl p-4">
    <div class="rounded-xl border border-white/10 bg-slate-900/95 backdrop-blur-lg p-4 shadow-2xl shadow-black/40 flex flex-col sm:flex-row items-start sm:items-center gap-4">
      <div class="flex-1 text-sm text-slate-300">
        <p>We use cookies to ensure essential site functionality and improve your experience. See our <a href="/legal/cookies" class="text-violet-400 hover:text-violet-300 underline">Cookie Policy</a> for details.</p>
      </div>
      <div class="flex gap-2 shrink-0">
        <button onclick="acceptCookies('essential')" class="px-4 py-2 text-sm rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-300 border border-white/10 transition-colors">
          Essential Only
        </button>
        <button onclick="acceptCookies('all')" class="px-4 py-2 text-sm rounded-lg bg-violet-600 hover:bg-violet-500 text-white font-semibold transition-colors">
          Accept All
        </button>
      </div>
    </div>
  </div>
</div>
<script>
(function() {
    function acceptCookies(level) {
        document.cookie = 'cookie_consent=' + level + ';path=/;max-age=31536000;SameSite=Strict';
        var el = document.getElementById('cookie-consent');
        if (el) el.classList.add('hidden');
    }
    window.acceptCookies = acceptCookies;
    // Show banner if no consent cookie
    if (!document.cookie.match(/cookie_consent=/)) {
        var el = document.getElementById('cookie-consent');
        if (el) el.classList.remove('hidden');
    }
})();
</script>
