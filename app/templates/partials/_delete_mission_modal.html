<!-- Delete Mission Confirmation Modal -->
<div id="delete-mission-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title">
    <div class="w-full h-full flex items-center justify-center">
    <div class="glass-panel rounded-xl p-6 max-w-md w-full mx-4">
        <h3 id="delete-modal-title" class="text-lg font-semibold text-white mb-2">
            <i data-lucide="alert-triangle" class="w-5 h-5 inline-block text-rose-400 mr-2"></i>
            Delete Mission
        </h3>
        <p id="delete-mission-target-row" class="hidden text-slate-400 text-sm mb-1">
            Target: <span id="delete-mission-target" class="text-white"></span>
        </p>
        <p class="text-slate-400 text-sm mb-4">
            This will permanently delete this mission and its data. This action cannot be undone.
            Download the report first if needed.
        </p>
        <div class="flex gap-3 justify-end">
            <button type="button" onclick="handleDeleteMissionModalCancel()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm font-medium transition-colors">
                Cancel
            </button>
            <button type="button" id="download-before-delete-btn" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm font-medium transition-colors">
                <i data-lucide="download" class="w-4 h-4 inline-block mr-1"></i> Download Report
            </button>
            <button type="button" onclick="handleDeleteMissionModalConfirm()" class="px-4 py-2 bg-rose-600 hover:bg-rose-500 text-white rounded-lg text-sm font-medium transition-colors">
                <i data-lucide="trash-2" class="w-4 h-4 inline-block mr-1"></i> Delete
            </button>
        </div>
    </div>
    </div>
</div>
