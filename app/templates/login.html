{% extends "base.html" %}

{% block content %}
<div class="w-full">
    <div class="glass-panel p-8 rounded-2xl w-full animate-fade-in-up shadow-2xl shadow-violet-500/5">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-full bg-violet-500/20 text-violet-400 flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-shield-halved text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">Sign In</h1>
            <p class="text-slate-400 mt-2 text-sm">Enter your credentials to continue.</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Username</label>
                <input type="text" id="username" name="username" required class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-2 text-white focus:border-violet-500 focus:outline-none transition-colors">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Password</label>
                <input type="password" id="password" name="password" required class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-2 text-white focus:border-violet-500 focus:outline-none transition-colors">
            </div>

            <button type="submit" class="w-full py-3 rounded-lg bg-violet-600 hover:bg-violet-500 active:scale-[0.98] text-white font-bold transition-all mt-6 shadow-lg shadow-violet-500/20">
                Sign In
            </button>
        </form>
        
        <div id="error-msg" class="mt-4 text-center text-red-400 text-sm hidden"></div>
        <div id="success-msg" class="mt-4 text-center text-green-400 text-sm hidden bg-green-500/10 border border-green-500/20 p-3 rounded-lg"></div>

        <div class="mt-6 text-center text-sm space-y-2">
            <a href="/forgot-password" class="text-violet-400 hover:text-violet-300 transition-colors block">Forgot Password?</a>
            <p class="text-slate-400">Don't have an account? <a href="/register" class="text-violet-400 hover:text-violet-300 transition-colors">Register</a></p>
        </div>
    </div>
</div>

<script nonce="{{ request.state.csp_nonce }}">
    // Check for setup success message
    if (new URLSearchParams(window.location.search).get('setup') === 'complete') {
        const successMsg = document.getElementById('success-msg');
        successMsg.textContent = 'Setup complete! Please log in with your admin credentials.';
        successMsg.classList.remove('hidden');
    }

    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        
        try {
            const res = await fetch('/api/auth/token', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: new URLSearchParams(formData)
            });
            
            if (!res.ok) throw new Error('Invalid credentials');
            
            const data = await res.json();
            localStorage.setItem('token', data.access_token);
            document.cookie = `access_token=${data.access_token}; path=/; SameSite=Strict; max-age=${60*60*24}`;
            window.location.href = '/dashboard';
            
        } catch (err) {
            const msg = document.getElementById('error-msg');
            msg.textContent = err.message;
            msg.classList.remove('hidden');
        }
    };
</script>
{% endblock %}
