{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center h-full">
    <div class="glass p-8 rounded-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-full bg-violet-500/20 text-violet-400 flex items-center justify-center mx-auto mb-4">
                <i class="ph ph-lock-key text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">Login</h1>
            <p class="text-gray-400 mt-2">Enter your credentials to access Spectra.</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Username</label>
                <input type="text" name="username" required class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-2 text-white focus:border-violet-500 focus:outline-none transition-colors">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Password</label>
                <input type="password" name="password" required class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-2 text-white focus:border-violet-500 focus:outline-none transition-colors">
            </div>

            <button type="submit" class="w-full py-3 rounded-lg bg-violet-600 hover:bg-violet-500 text-white font-bold transition-colors mt-6">
                Sign In
            </button>
        </form>
        
        <div id="error-msg" class="mt-4 text-center text-red-400 text-sm hidden"></div>
    </div>
</div>

<script>
    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        
        try {
            const res = await fetch('/api/auth/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams(formData)
            });
            
            if (!res.ok) throw new Error('Invalid credentials');
            
            const data = await res.json();
            localStorage.setItem('token', data.access_token);
            window.location.href = '/dashboard';
            
        } catch (err) {
            const msg = document.getElementById('error-msg');
            msg.textContent = err.message;
            msg.classList.remove('hidden');
        }
    };
</script>
{% endblock %}
