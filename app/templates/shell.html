<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spectra Shell | {{ session_id }}</title>
    <link rel="stylesheet" href="/static/css/output.css">
    <link rel="stylesheet" href="/static/vendor/css/xterm.css" />
    <script src="/static/vendor/js/xterm.js"></script>
    <script src="/static/vendor/js/xterm-addon-fit.js"></script>
    <script src="/static/js/reconnecting-ws.js"></script>
    <style>
        body { background-color: #0f172a; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        #terminal { flex: 1; padding: 10px; }
        .xterm-viewport { overflow-y: auto !important; }
    </style>
</head>
<body>
    <div class="bg-slate-900 border-b border-white/10 p-2 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <span class="text-slate-300 font-mono text-sm">Session: {{ session_id }}</span>
        </div>
        <span class="text-slate-500 text-xs">Target: {{ target }}</span>
    </div>
    <div id="terminal"></div>

    <script nonce="{{ request.state.csp_nonce }}">
        const term = new Terminal({
            cursorBlink: true,
            theme: {
                background: '#0f172a',
                foreground: '#e2e8f0',
                cursor: '#10b981'
            },
            fontFamily: 'Menlo, Monaco, "Courier New", monospace',
            fontSize: 14
        });

        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));
        fitAddon.fit();

        window.onresize = () => fitAddon.fit();

        // WebSocket Connection with auto-reconnect
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const sessionId = {{ session_id|tojson }};
        const shellToken = localStorage.getItem('token');
        const wsUrl = `${protocol}//${window.location.host}/api/v1/shell/${sessionId}${shellToken ? '?token=' + encodeURIComponent(shellToken) : ''}`;
        const ws = new ReconnectingWebSocket(wsUrl, { maxRetries: 10 });

        ws.on('open', () => {
            term.write('\r\n\x1b[32mConnected.\x1b[0m\r\n');
        });

        ws.on('message', (event) => {
            term.write(event.data);
        });

        ws.on('close', () => {
            term.write('\r\n\x1b[31m[SYSTEM] Connection closed. Reconnecting...\x1b[0m\r\n');
        });

        ws.on('error', (error) => {
            term.write('\r\n\x1b[31m[SYSTEM] Connection error.\x1b[0m\r\n');
        });

        term.onData(data => {
            ws.send(data);
        });
    </script>
</body>
</html>
