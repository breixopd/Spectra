{% extends "base.html" %}

{% block content %}
<div class="flex flex-col sm:flex-row sm:items-center justify-between mb-6 gap-3 animate-fade-in-up">
    <h1 class="text-2xl font-semibold text-white tracking-tight">Assessment Reports</h1>
    <div class="flex space-x-2">
        <button class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg text-sm font-medium transition-colors">
            <i class="fa-solid fa-filter mr-2 text-slate-400"></i>
            Filter
        </button>
        <button class="px-4 py-2 bg-violet-600 hover:bg-violet-500 text-white rounded-lg text-sm font-medium transition-colors">
            <i class="fa-solid fa-plus mr-2"></i>
            New Report
        </button>
    </div>
</div>

<!-- Empty State -->
<div id="reports-empty" class="empty-state glass-panel rounded-xl animate-fade-in-up stagger-1">
    <i class="fa-solid fa-file-lines text-amber-400/40"></i>
    <h3>No reports generated</h3>
    <p>Reports will appear here after completing a security assessment mission.</p>
</div>

<!-- Reports List -->
<div class="glass-panel rounded-xl overflow-hidden animate-fade-in-up stagger-1 hidden sm:block">
    <div class="overflow-x-auto">
    <table class="w-full text-left text-sm">
        <thead class="bg-white/5 text-slate-400 font-medium border-b border-white/5">
            <tr>
                <th class="px-6 py-4">Report Name</th>
                <th class="px-6 py-4">Target</th>
                <th class="px-6 py-4">Date</th>
                <th class="px-6 py-4">Findings</th>
                <th class="px-6 py-4 text-right">Actions</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-white/5 text-slate-300" id="reports-list">
            <!-- Report Row Template (Hidden) -->
            <template id="report-row-template">
                <tr class="hover:bg-white/5 transition-colors group">
                    <td class="px-6 py-4 font-medium text-white report-name">Executive Summary</td>
                    <td class="px-6 py-4 font-mono text-xs text-slate-400 report-target">10.10.10.5</td>
                    <td class="px-6 py-4 text-slate-500 report-date">Oct 24, 2023</td>
                    <td class="px-6 py-4">
                        <div class="flex items-center space-x-2">
                            <span class="px-1.5 py-0.5 rounded bg-rose-500/10 text-rose-400 text-[10px] font-mono border border-rose-500/20 report-critical">2</span>
                            <span class="px-1.5 py-0.5 rounded bg-amber-500/10 text-amber-400 text-[10px] font-mono border border-amber-500/20 report-high">5</span>
                            <span class="px-1.5 py-0.5 rounded bg-blue-500/10 text-blue-400 text-[10px] font-mono border border-blue-500/20 report-medium">8</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button class="text-slate-500 hover:text-violet-400 transition-colors mr-3" title="View HTML">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                        <button class="text-slate-500 hover:text-white transition-colors mr-3" title="Download PDF">
                            <i class="fa-solid fa-file-pdf"></i>
                        </button>
                        <button class="text-slate-500 hover:text-white transition-colors" title="Download JSON">
                            <i class="fa-solid fa-file-code"></i>
                        </button>
                    </td>
                </tr>
            </template>
        </tbody>
    </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/reports.js"></script>
{% endblock %}
