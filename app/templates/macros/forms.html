{% macro form_field(id, label, type="text", placeholder="", required=true, **attrs) %}
<div class="field">
    <label for="{{ id }}">{{ label }}</label>
    <input type="{{ type }}" id="{{ id }}" name="{{ id }}"
           {% if required %}required aria-required="true"{% endif %}
           {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
           {% for key, val in attrs.items() %}{{ key }}="{{ val }}" {% endfor %}>
</div>
{% endmacro %}

{% macro submit_button(text, id="submitBtn") %}
<button type="submit" class="btn" id="{{ id }}">{{ text }}</button>
{% endmacro %}

{% macro message_box(id="msg") %}
<div id="{{ id }}" class="msg" aria-live="polite"></div>
{% endmacro %}
