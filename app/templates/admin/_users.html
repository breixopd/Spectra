        <div id="section-users" class="section-panel space-y-4" role="tabpanel" aria-labelledby="tab-users">

                <div class="flex items-center gap-2 flex-1">
                    <div class="relative flex-1 max-w-sm">
                        <i data-lucide="search" class="w-3.5 h-3.5 inline-block absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
                        <input id="user-search" type="text" placeholder="Search users..." class="form-input pl-9 py-2" aria-label="Search users">

                    <select id="user-role-filter" class="form-input form-select w-32" aria-label="Filter by role">

                        <option value="admin">Admin</option>

                        <option value="viewer">Viewer</option>

                    <select id="user-status-filter" class="form-input form-select w-32" aria-label="Filter by status">
                        <option value="">All Status</option>

                        <option value="false">Inactive</option>
                    </select>

                <div class="overflow-x-auto">
                    <table class="admin-table w-full text-sm">

                            <tr class="border-b border-white/5">
                                <th scope="col" class="text-left px-4 py-3 text-xs text-slate-500 uppercase tracking-wider font-semibold">User</th>
                                <th scope="col" class="text-left px-4 py-3 text-xs text-slate-500 uppercase tracking-wider font-semibold">Email</th>
                                <th scope="col" class="text-left px-4 py-3 text-xs text-slate-500 uppercase tracking-wider font-semibold">Role</th>

            </div>

<!-- Create/Edit User Modal -->
<div class="modal-backdrop hidden" id="user-modal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="user-modal-title">
        <div class="flex items-center justify-between mb-4">
            <h3 id="user-modal-title" class="text-lg font-semibold text-white">Create User</h3>
            <button data-action="closeModal" data-value="user-modal" class="text-slate-400 hover:text-white"><i data-lucide="x" class="w-4 h-4 inline-block"></i></button>
        </div>
        <form id="user-form" class="space-y-3">
            <input type="hidden" id="user-form-id">
            <div id="user-form-username-group">
                <label class="form-label">Username</label>
                <input id="user-form-username" class="form-input" type="text" required minlength="3" maxlength="50" autocomplete="off">
            </div>
            <div>
                <label class="form-label">Email</label>
                <input id="user-form-email" class="form-input" type="email" required autocomplete="off">
            </div>
            <div id="user-form-password-group">
                <label class="form-label">Password</label>
                <input id="user-form-password" class="form-input" type="password" minlength="8" autocomplete="new-password">
                <p class="text-xs text-slate-500 mt-1">Min 8 chars, uppercase, lowercase, digit</p>
            </div>
            <div>
                <label class="form-label">Role</label>
                <select id="user-form-role" class="form-input form-select">
                    <option value="operator">Operator</option>
                    <option value="viewer">Viewer</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div id="user-form-plan-group">
                <label class="form-label">Plan (optional)</label>
                <select id="user-form-plan" class="form-input form-select">
                    <option value="">None</option>
                </select>
            </div>
            <div id="user-form-status-group" class="hidden">
                <label class="form-label">Status</label>
                <select id="user-form-status" class="form-input form-select">
                    <option value="true">Active</option>
                    <option value="false">Inactive</option>
                </select>
            </div>
            <div class="flex justify-end gap-2 pt-2">
                <button type="button" data-action="closeModal" data-value="user-modal" class="px-4 py-2 rounded-lg text-sm text-slate-400 hover:bg-white/5 transition-colors">Cancel</button>
                <button type="submit" class="px-4 py-2 bg-violet-600 hover:bg-violet-500 text-white rounded-lg text-sm font-medium transition-colors">Save</button>
            </div>
        </form>
    </div>
</div>
