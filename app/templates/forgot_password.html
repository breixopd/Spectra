<!DOCTYPE html>
<html lang="en">
<head>
    {% include 'partials/head.html' %}
    <title>Forgot Password — Spectra</title>
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
<div class="card">
    <div class="logo">
        <a href="/">
            {% include 'partials/shield_svg.html' %}
            Spectra
        </a>
    </div>
    <h1>Reset Password</h1>
    <p class="subtitle">Enter your email and we'll send a reset link.</p>

    <form id="forgotForm">
        <div class="field">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
        </div>
        <button type="submit" class="btn" id="submitBtn">Send Reset Link</button>
    </form>

    <div id="msg" class="msg"></div>
    <div class="links"><a href="/login">Back to Sign In</a></div>
</div>

<script nonce="{{ request.state.csp_nonce }}">
    const form = document.getElementById('forgotForm');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.className = 'msg';
        msg.textContent = '';
        btn.disabled = true; btn.textContent = 'Sending…';

        try {
            const res = await fetch('/api/public/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: form.email.value.trim() }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Request failed');
            msg.textContent = data.detail;
            msg.className = 'msg success';
        } catch (err) {
            msg.textContent = err.message;
            msg.className = 'msg error';
        }
        btn.disabled = false; btn.textContent = 'Send Reset Link';
    });
</script>
</body>
</html>
