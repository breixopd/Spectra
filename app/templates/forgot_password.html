<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Forgot Password — Spectra</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f; --accent: #00ff88; --accent-dim: rgba(0,255,136,0.12);
            --violet: #8b5cf6; --violet-dim: rgba(139,92,246,0.15);
            --text: #e2e8f0; --text-muted: #64748b;
            --border: rgba(255,255,255,0.06);
            --font-sans: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            font-family: var(--font-sans); background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 2rem;
            background-image:
                radial-gradient(ellipse 60% 40% at 50% 0%, var(--violet-dim), transparent),
                radial-gradient(ellipse 50% 30% at 80% 100%, var(--accent-dim), transparent);
        }
        .card {
            width: 100%; max-width: 420px; padding: 2.5rem;
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 20px; backdrop-filter: blur(12px);
        }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo a {
            color: #fff; text-decoration: none; font-size: 1.25rem; font-weight: 700;
            display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .logo svg { width: 24px; height: 24px; }
        h1 { text-align: center; font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 0.875rem; margin-bottom: 2rem; }
        label { display: block; font-size: 0.8125rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.375rem; }
        input {
            width: 100%; padding: 0.625rem 0.875rem; font-size: 0.875rem;
            background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text); outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--violet); }
        .field { margin-bottom: 1.25rem; }
        .btn {
            width: 100%; padding: 0.75rem; font-size: 0.9375rem; font-weight: 700;
            background: var(--accent); color: #0a0a0f; border: none; border-radius: 10px;
            cursor: pointer; transition: transform 0.15s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,255,136,0.25); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .msg { margin-top: 1rem; text-align: center; font-size: 0.8125rem; padding: 0.75rem; border-radius: 10px; display: none; }
        .msg.error { display: block; color: #fb7185; background: rgba(251,113,133,0.08); border: 1px solid rgba(251,113,133,0.15); }
        .msg.success { display: block; color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(0,255,136,0.15); }
        .links { text-align: center; margin-top: 1.5rem; font-size: 0.8125rem; color: var(--text-muted); }
        .links a { color: var(--violet); text-decoration: none; font-weight: 600; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <a href="/">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            Spectra
        </a>
    </div>
    <h1>Reset Password</h1>
    <p class="subtitle">Enter your email and we'll send a reset link.</p>

    <form id="forgotForm">
        <div class="field">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
        </div>
        <button type="submit" class="btn" id="submitBtn">Send Reset Link</button>
    </form>

    <div id="msg" class="msg"></div>
    <div class="links"><a href="/login">Back to Sign In</a></div>
</div>

<script nonce="{{ request.state.csp_nonce }}">
    const form = document.getElementById('forgotForm');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.className = 'msg'; msg.style.display = 'none';
        btn.disabled = true; btn.textContent = 'Sending…';

        try {
            const res = await fetch('/api/public/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: form.email.value.trim() }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Request failed');
            msg.textContent = data.detail;
            msg.className = 'msg success';
        } catch (err) {
            msg.textContent = err.message;
            msg.className = 'msg error';
        }
        btn.disabled = false; btn.textContent = 'Send Reset Link';
    });
</script>
</body>
</html>
