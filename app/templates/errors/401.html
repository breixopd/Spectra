<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>401 — Unauthorized</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta name="robots" content="noindex, nofollow">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f; --accent: #00ff88; --accent-dim: rgba(0,255,136,0.15);
            --violet: #8b5cf6; --violet-dim: rgba(139,92,246,0.15);
            --amber: #f59e0b; --amber-dim: rgba(245,158,11,0.15);
            --text: #e2e8f0; --text-muted: #64748b;
            --border: rgba(255,255,255,0.06);
            --font-sans: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            font-family: var(--font-sans); background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 2rem;
            background-image:
                radial-gradient(ellipse 60% 40% at 50% 0%, var(--amber-dim), transparent),
                radial-gradient(ellipse 50% 30% at 80% 100%, var(--violet-dim), transparent);
            -webkit-font-smoothing: antialiased;
        }
        .error-container { text-align: center; max-width: 480px; }
        .error-code {
            font-size: clamp(6rem, 15vw, 10rem); font-weight: 900;
            letter-spacing: -0.05em; line-height: 1;
            background: linear-gradient(135deg, var(--amber) 0%, #fbbf24 50%, var(--violet) 100%);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; margin-bottom: 0.5rem;
        }
        .error-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: #fff; }
        .error-desc { font-size: 0.9375rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 2.5rem; }
        .lock-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 64px; height: 64px; border-radius: 50%;
            background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2);
            margin-bottom: 1.5rem;
        }
        .lock-icon svg { width: 28px; height: 28px; color: var(--amber); }
        .error-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn-primary {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.75rem 1.75rem; background: var(--accent); color: #0a0a0f;
            font-weight: 700; font-size: 0.875rem; border-radius: 10px;
            text-decoration: none; transition: transform 0.15s, box-shadow 0.25s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(0,255,136,0.25); }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="lock-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </div>
        <div class="error-code">401</div>
        <h1 class="error-title">Unauthorized</h1>
        <p class="error-desc">
            Your session has expired or you need to sign in to access this page.
        </p>
        <div class="error-actions">
            <a href="/login" class="btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                Sign In
            </a>
        </div>
    </div>
</body>
</html>
