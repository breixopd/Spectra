<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>429 — Too Many Requests</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/static/css/errors.css">
</head>
<body class="error-amber">
    <div class="error-container">
        <div class="timer-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
        </div>
        <div class="error-code">429</div>
        <h1 class="error-title">Too Many Requests</h1>
        <p class="error-desc">
            You've sent too many requests in a short period. Please wait a moment
            and try again.
        </p>
        <div class="error-actions">
            <button class="btn-ghost" onclick="location.reload()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                Try Again
            </button>
        </div>
    </div>
</body>
</html>
