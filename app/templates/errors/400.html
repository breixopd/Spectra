<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>400 — Bad Request</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f; --accent: #00ff88; --accent-dim: rgba(0,255,136,0.15);
            --violet: #8b5cf6; --violet-dim: rgba(139,92,246,0.15);
            --text: #e2e8f0; --text-muted: #64748b;
            --border: rgba(255,255,255,0.06);
            --font-sans: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
        }
        body {
            font-family: var(--font-sans); background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 2rem;
            background-image:
                radial-gradient(ellipse 60% 40% at 50% 0%, var(--violet-dim), transparent),
                radial-gradient(ellipse 50% 30% at 80% 100%, var(--accent-dim), transparent);
            -webkit-font-smoothing: antialiased;
        }
        .error-container { text-align: center; max-width: 480px; }
        .error-code {
            font-size: clamp(6rem, 15vw, 10rem); font-weight: 900;
            letter-spacing: -0.05em; line-height: 1;
            background: linear-gradient(135deg, var(--accent) 0%, var(--violet) 100%);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            animation: glitch 3s ease-in-out infinite;
        }
        @keyframes glitch {
            0%, 90%, 100% { opacity: 1; }
            92% { opacity: 0.8; transform: translateX(-2px); }
            94% { opacity: 1; transform: translateX(2px); }
            96% { opacity: 0.9; transform: translateX(0); }
        }
        .error-title {
            font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: #fff;
        }
        .error-desc {
            font-size: 0.9375rem; color: var(--text-muted); line-height: 1.7;
            margin-bottom: 2.5rem;
        }
        .error-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn-primary {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.75rem 1.75rem; background: var(--accent); color: #0a0a0f;
            font-weight: 700; font-size: 0.875rem; border-radius: 10px;
            text-decoration: none; transition: transform 0.15s, box-shadow 0.25s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0,255,136,0.25);
        }
        .btn-ghost {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.75rem 1.75rem; background: transparent;
            border: 1px solid var(--border); color: var(--text);
            font-weight: 600; font-size: 0.875rem; border-radius: 10px;
            text-decoration: none; transition: background 0.2s;
            cursor: pointer;
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.05); }
        .scan-line {
            position: fixed; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: scan 4s linear infinite; opacity: 0.3;
        }
        @keyframes scan {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(100vh); }
        }
    </style>
</head>
<body>
    <div class="scan-line"></div>
    <div class="error-container">
        <div class="error-code">400</div>
        <h1 class="error-title">Bad Request</h1>
        <p class="error-desc">
            The server couldn't understand the request due to invalid syntax.
            Please check the request parameters and try again.
        </p>
        <div class="error-actions">
            <a href="/" class="btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Back to Home
            </a>
            <button class="btn-ghost" onclick="history.back()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                Go Back
            </button>
        </div>
    </div>
</body>
</html>
