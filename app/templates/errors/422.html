<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>422 — Validation Error</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f; --accent: #00ff88; --accent-dim: rgba(0,255,136,0.15);
            --violet: #8b5cf6; --violet-dim: rgba(139,92,246,0.15);
            --amber: #f59e0b; --amber-dim: rgba(245,158,11,0.15);
            --text: #e2e8f0; --text-muted: #64748b;
            --border: rgba(255,255,255,0.06);
            --font-sans: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            font-family: var(--font-sans); background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 2rem;
            background-image:
                radial-gradient(ellipse 60% 40% at 50% 0%, var(--amber-dim), transparent),
                radial-gradient(ellipse 50% 30% at 80% 100%, var(--violet-dim), transparent);
            -webkit-font-smoothing: antialiased;
        }
        .error-container { text-align: center; max-width: 480px; }
        .error-code {
            font-size: clamp(6rem, 15vw, 10rem); font-weight: 900;
            letter-spacing: -0.05em; line-height: 1;
            background: linear-gradient(135deg, var(--amber) 0%, #fbbf24 50%, var(--violet) 100%);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; margin-bottom: 0.5rem;
        }
        .error-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: #fff; }
        .error-desc { font-size: 0.9375rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 2.5rem; }
        .validate-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 64px; height: 64px; border-radius: 50%;
            background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2);
            margin-bottom: 1.5rem;
        }
        .validate-icon svg { width: 28px; height: 28px; color: var(--amber); }
        .error-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn-primary {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.75rem 1.75rem; background: var(--accent); color: #0a0a0f;
            font-weight: 700; font-size: 0.875rem; border-radius: 10px;
            text-decoration: none; transition: transform 0.15s, box-shadow 0.25s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0,255,136,0.25);
        }
        .btn-ghost {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.75rem 1.75rem; background: transparent;
            border: 1px solid var(--border); color: var(--text);
            font-weight: 600; font-size: 0.875rem; border-radius: 10px;
            text-decoration: none; transition: background 0.2s;
            cursor: pointer;
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.05); }
        .scan-line {
            position: fixed; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--amber), transparent);
            animation: scan 4s linear infinite; opacity: 0.3;
        }
        @keyframes scan {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(100vh); }
        }
    </style>
</head>
<body>
    <div class="scan-line"></div>
    <div class="error-container">
        <div class="validate-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
        </div>
        <div class="error-code">422</div>
        <h1 class="error-title">Validation Error</h1>
        <p class="error-desc">
            The request data didn't pass validation. Please check the submitted
            fields and ensure all required values are provided in the correct format.
        </p>
        <div class="error-actions">
            <a href="/" class="btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Back to Home
            </a>
            <button class="btn-ghost" onclick="history.back()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                Go Back
            </button>
        </div>
    </div>
</body>
</html>
