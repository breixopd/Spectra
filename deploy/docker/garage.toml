metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "sqlite"
replication_factor = 1

# RPC secret is injected via GARAGE_RPC_SECRET environment variable.
rpc_bind_addr = "[::]:3901"
rpc_public_addr = "[::]:3901"

[s3_api]
api_bind_addr = "[::]:3900"
s3_region = "us-east-1"
root_domain = ".s3.garage.localhost"

[s3_web]
bind_addr = "[::]:3902"
root_domain = ".web.garage.localhost"

[admin]
api_bind_addr = "[::]:3903"
# admin_token is injected via GARAGE_ADMIN_TOKEN environment variable.
