    - generic [ref=e308]:
      - generic [ref=e309]: Why Teams Choose Us
      - heading "Built for security professionals" [level=2] [ref=e310]
      - paragraph [ref=e311]: Security teams use Spectra to accelerate assessments without sacrificing depth or control.
    - generic [ref=e313]:
      - generic [ref=e314]: FAQ
      - heading "Frequently asked questions" [level=2] [ref=e315]
      - paragraph [ref=e316]: Everything you need to know about getting started with Spectra.
      - list [ref=e317]:
        - listitem [ref=e318]:
          - button "What types of security assessments can Spectra perform?" [ref=e319] [cursor=pointer]:
            - text: What types of security assessments can Spectra perform?
            - img [ref=e320]
          - region:
            - paragraph [ref=e321]: Spectra supports network reconnaissance, vulnerability scanning, web app testing, service enumeration, and exploitation. All tools run in isolated sandbox containers. You control the scope and rules of engagement.
        - listitem [ref=e322]:
          - button "Is it safe to run automated exploits?" [ref=e323] [cursor=pointer]:
            - text: Is it safe to run automated exploits?
            - img [ref=e324]
          - region:
            - paragraph [ref=e325]: Absolutely. All tools execute in isolated, sandboxed containers with strict target boundaries and scope limits. You can enable human-in-the-loop approval for high-risk actions, or use fully autonomous mode if your plan supports it. We recommend testing against staging environments first.
        - listitem [ref=e326]:
          - button "Can I bring my own API key?" [ref=e327] [cursor=pointer]:
            - text: Can I bring my own API key?
            - img [ref=e328]
          - region:
            - paragraph [ref=e329]: Yes. Professional and Enterprise plans let you connect your own OpenAI, Anthropic, or other LLM provider API keys.
        - listitem [ref=e330]:
          - button "How are assessment reports generated?" [ref=e331] [cursor=pointer]:
            - text: How are assessment reports generated?
            - img [ref=e332]
          - region:
            - paragraph [ref=e333]: Reports are automatically generated with CVSS-scored findings, evidence screenshots, remediation guidance, and executive summaries. Each finding includes detailed reproduction steps and is mapped to relevant CVE identifiers when applicable. Export in PDF, JSON, or Markdown.
        - listitem [ref=e334]:
          - button "What security tools are available?" [ref=e335] [cursor=pointer]:
            - text: What security tools are available?
            - img [ref=e336]
          - region:
            - paragraph [ref=e337]: "25+ tools are included: Nmap, Nuclei, Nikto, SQLMap, Feroxbuster, Hydra, and more. New tools are added regularly by the Spectra team. Enterprise plans can request custom tool integrations."
