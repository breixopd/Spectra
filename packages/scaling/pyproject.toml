[project]
name = "spectra-scaling"
version = "0.1.0"
description = "Autoscaling, provisioning, and host resource management."
requires-python = ">=3.11"
dependencies = [
    "spectra-common",
    "spectra-persistence",
    "spectra-infra",
    "asyncssh>=2.14.0",
    "docker>=7.0.0",
    "psutil>=5.9.0",
    "sqlalchemy[asyncio]>=2.0.48",
    "httpx>=0.28.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spectra_scaling"]
