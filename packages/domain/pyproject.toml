[project]
name = "spectra-domain"
version = "0.1.0"
description = "Shared Spectra domain models and service contracts."
requires-python = ">=3.11"
dependencies = [
    "spectra-common",
    "jsonschema",
    "aiofiles",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spectra_domain"]

