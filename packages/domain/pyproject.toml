[project]
name = "spectra-domain"
version = "0.1.0"
description = "Pure domain models, enums, and rules."
requires-python = ">=3.11"
dependencies = [
    "spectra-contracts",
    "pydantic[email]>=2.12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spectra_domain"]
