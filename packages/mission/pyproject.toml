[project]
name = "spectra-mission"
version = "0.1.0"
description = "Mission orchestration, frameworks, executor, and reporting."
requires-python = ">=3.11"
dependencies = [
    "spectra-ai-core",
    "spectra-billing",
    "spectra-common",
    "spectra-contracts",
    "spectra-domain",
    "spectra-infra",
    "spectra-observability",
    "spectra-persistence",
    "spectra-storage-policy",
    "spectra-system",
    "spectra-tools",
    "cryptography>=42.0.0",
    "fastapi>=0.115.0",
    "jinja2>=3.1.0",
    "PyJWT[crypto]>=2.8.0",
    "pydantic[email]>=2.12.0",
    "sqlalchemy[asyncio]>=2.0.48",
    "starlette>=0.40.0",
    "typing-extensions>=4.12",
    "pyyaml>=6.0",
    "asyncpg>=0.31.0",
    "xhtml2pdf>=0.2.17",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spectra_mission"]
