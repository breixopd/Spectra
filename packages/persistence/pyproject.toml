[project]
name = "spectra-persistence"
version = "0.1.0"
description = "SQLAlchemy models, repositories, database sessions, and column types."
requires-python = ">=3.11"
dependencies = [
    "spectra-common",
    "spectra-domain",
    "spectra-contracts",
    "sqlalchemy[asyncio]>=2.0.48",
    "asyncpg>=0.31.0",
    "pydantic[email]>=2.12.0",
    "cryptography>=42.0.0",
    "typing-extensions>=4.12",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spectra_persistence"]
