[project]
name = "spectra-billing"
version = "0.1.0"
description = "Plans, quotas, usage tracking, and training discounts."
requires-python = ">=3.11"
dependencies = [
    "spectra-common",
    "spectra-observability",
    "spectra-persistence",
    "sqlalchemy[asyncio]>=2.0.48",
    "pydantic[email]>=2.12.0",
    "httpx>=0.28.0",
    "stripe>=11.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spectra_billing"]
