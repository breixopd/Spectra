[project]
name = "spectra-auth"
version = "0.1.0"
description = "Authentication, authorization, sessions, MFA, and rate limiting."
requires-python = ">=3.11"
dependencies = [
    "spectra-common",
    "spectra-infra",
    "spectra-persistence",
    "bcrypt>=4.0.0",
    "cryptography>=42.0.0",
    "fastapi>=0.115.0",
    "PyJWT[crypto]>=2.8.0",
    "pyotp>=2.9.0",
    "slowapi>=0.1.9",
    "starlette>=0.40.0",
    "sqlalchemy[asyncio]>=2.0.48",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spectra_auth"]
