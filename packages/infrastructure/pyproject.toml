[project]
name = "spectra-infra"
version = "0.1.0"
description = "Technical plumbing: events, queue, cache, circuit breakers, DI, shell sessions."
requires-python = ">=3.11"
dependencies = [
    "spectra-common",
    "spectra-persistence",
    "blinker>=1.7.0",
    "fastapi>=0.115.0",
    "httpx>=0.28.0",
    "redis[hiredis]>=5.2.0",
    "sqlalchemy[asyncio]>=2.0.48",
    "starlette>=0.40.0",
    "asyncpg>=0.31.0",
    "docker>=7.0.0",
    "orjson>=3.9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spectra_infra"]
