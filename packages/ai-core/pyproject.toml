[project]
name = "spectra-ai-core"
version = "0.1.0"
description = "LLM/RAG interfaces, agents, consensus, memory, and exploit intelligence."
requires-python = ">=3.11"
dependencies = [
    "spectra-common",
    "spectra-contracts",
    "spectra-domain",
    "spectra-persistence",
    "spectra-tools-core",
    "spectra-observability",
    "aiohttp>=3.9.0",
    "httpx>=0.28.0",
    "pydantic[email]>=2.12.0",
    "sqlalchemy[asyncio]>=2.0.48",
    "json-repair>=0.58.0",
    "openai>=2.26.0",
]

# Local (offline) embedding backend. Heavy (onnxruntime); only services that
# generate embeddings without a hosted endpoint need it. Embedding code degrades
# gracefully to the API backend when fastembed is not installed.
[project.optional-dependencies]
local-embeddings = ["fastembed>=0.3.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spectra_ai_core"]
