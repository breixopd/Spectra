[project]
name = "spectra-system"
version = "0.1.0"
description = "Runtime settings, secret bootstrap, health, maintenance, and notifications."
requires-python = ">=3.11"
dependencies = [
    "spectra-billing",
    "spectra-common",
    "spectra-persistence",
    "spectra-infra",
    "spectra-auth",
    "fastapi>=0.115.0",
    "httpx>=0.28.0",
    "pydantic[email]>=2.12.0",
    "sqlalchemy[asyncio]>=2.0.48",
    "aiosmtplib>=3.0.0",
    "jinja2>=3.1.0",
    "redis[hiredis]>=5.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spectra_system"]
