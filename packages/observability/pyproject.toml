[project]
name = "spectra-observability"
version = "0.1.0"
description = "Telemetry, metrics, and tracing."
requires-python = ">=3.11"
dependencies = [
    "spectra-common",
    "httpx>=0.28.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spectra_observability"]
