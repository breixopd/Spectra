[project]
name = "spectra-tools"
version = "0.1.0"
description = "Tool execution service, sandboxing, and golden image management."
requires-python = ">=3.11"
dependencies = [
    "spectra-ai-core",
    "spectra-common",
    "spectra-domain",
    "spectra-infra",
    "spectra-observability",
    "spectra-persistence",
    "spectra-storage-policy",
    "spectra-tools-core",
    "aiofiles>=23.0.0",
    "sqlalchemy[asyncio]>=2.0.48",
    "docker>=7.0.0",
    "defusedxml>=0.7.1",
    "jsonschema>=4.20.0",
]

[project.scripts]
imds-fetcher = "spectra_tools.builtin_tools.imds_fetcher:main"
graphql-fuzzer = "spectra_tools.builtin_tools.graphql_fuzzer:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spectra_tools"]
