[project]
name = "spectra-common"
version = "0.1.0"
description = "Shared Spectra infrastructure primitives used by all services."
requires-python = ">=3.11"
dependencies = [
    "pydantic[email]",
    "pydantic-settings",
    "sqlalchemy[asyncio]",
    "asyncpg",
    "PyJWT[crypto]",
    "bcrypt",
    "cryptography",
    "python-dotenv",
    "orjson",
    "defusedxml",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spectra_common"]

