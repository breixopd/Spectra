[project]
name = "spectra-common"
version = "0.1.0"
description = "Lightweight foundation primitives: config, constants, errors, encryption, utils."
requires-python = ">=3.11"
dependencies = [
    "pydantic[email]>=2.12.0",
    "pydantic-settings>=2.13.0",
    "nh3>=0.2.0",
    "aiohttp>=3.9.0",
    "cryptography>=42.0.0",
    "typing-extensions>=4.12",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spectra_common"]
