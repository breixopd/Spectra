[project]
name = "spectra-contracts"
version = "0.1.0"
description = "Shared DTOs, Protocol ports, events, and cross-package contracts."
requires-python = ">=3.11"
dependencies = [
    "pydantic[email]>=2.12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spectra_contracts"]
