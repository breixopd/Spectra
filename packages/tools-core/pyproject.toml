[project]
name = "spectra-tools-core"
version = "0.1.0"
description = "Shared tool registry, plugin, and sandbox contracts."
requires-python = ">=3.11"
dependencies = [
    "spectra-common",
    "spectra-domain",
    "jsonschema",
    "defusedxml",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spectra_tools_core"]

