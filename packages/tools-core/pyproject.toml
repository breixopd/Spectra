[project]
name = "spectra-tools-core"
version = "0.1.0"
description = "Tool plugin schemas, registry contracts, and validation."
requires-python = ">=3.11"
dependencies = [
    "spectra-common",
    "spectra-domain",
    "aiofiles>=23.0.0",
    "defusedxml>=0.7.1",
    "pydantic[email]>=2.12.0",
    "jsonschema>=4.20.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spectra_tools_core"]
