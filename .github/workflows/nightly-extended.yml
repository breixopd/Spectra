# Weekly extended verification: same Docker gate as local/VPS `ci-parity.sh all`
# (static analysis + unit coverage + settings + integration). Does not run compose-smoke
# (full stack + e2e perf); compose-smoke runs on pull requests and protected `main` pushes.
name: Nightly extended verification

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ENCRYPTION_KEY: test-encryption-key

permissions:
  contents: read

concurrency:
  group: nightly-extended
  cancel-in-progress: false

jobs:
  ci-parity-all:
    name: Docker CI parity (static + unit + settings + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6.0.0
        with:
          persist-credentials: false
      - name: Ensure .env.test for Compose
        run: test -f .env.test || cp .env.test.example .env.test
      - name: Run scripts/runbooks/ci-parity.sh all
        run: COMPOSE_DOWN=1 bash scripts/runbooks/ci-parity.sh all
      - name: Collect compose diagnostics on failure
        if: failure()
        run: |
          mkdir -p nightly-logs
          docker compose -f deploy/docker/compose.yaml --profile app --profile test logs --no-color > nightly-logs/compose.log 2>&1 || true
      - name: Upload compose diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: nightly-compose-logs
          path: nightly-logs/
          if-no-files-found: warn
          retention-days: 14
