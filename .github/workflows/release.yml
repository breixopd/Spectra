name: Release

on:
  workflow_dispatch:
    inputs:
      patch:
        description: "Same-day patch number (leave empty for first release of the day)"
        required: false
        default: ""
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/breixopd14/spectra-app
  AI_IMAGE: ghcr.io/breixopd14/spectra-ai-svc
  SCHEDULER_IMAGE: ghcr.io/breixopd14/spectra-scheduler
  WORKER_IMAGE: ghcr.io/breixopd14/spectra-worker
  CADDY_IMAGE: ghcr.io/breixopd14/spectra-caddy

jobs:
  release:
    name: Build, Push & Release
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: spectra
          POSTGRES_PASSWORD: spectra_test
          POSTGRES_DB: spectra_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U spectra -d spectra_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    concurrency:
      group: release
      cancel-in-progress: false
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Determine version ─────────────────────────────────────
      - name: Set version
        id: version
        run: |
          TODAY=$(date -u +"%Y.%m.%d")
          PATCH="${{ github.event.inputs.patch }}"
          if [ -n "$PATCH" ] && [ "$PATCH" != "0" ]; then
            VERSION="${TODAY}.${PATCH}"
          else
            VERSION="${TODAY}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      # ── Update version file ───────────────────────────────────
      - name: Update app/version.py
        run: |
          cat > app/version.py << 'PYEOF'
          """Spectra version — updated automatically by CI on release."""

          __version__ = "${{ steps.version.outputs.version }}"
          PYEOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' app/version.py
          echo "Updated version.py:"
          cat app/version.py

      # ── Run tests before release ──────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements/base.txt numpy

      - name: Run unit tests with coverage
        run: |
          python3 -m pytest tests/unit/ -q \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=60
        env:
          DATABASE_URL: "postgresql+asyncpg://spectra:spectra_test@localhost:5433/spectra_test"
          TENSORZERO_GATEWAY_URL: "http://localhost:3000"
          DATA_ROOT: /tmp/spectra-data
          JWT_SECRET_KEY: test-key
          PLUGIN_SAFE_MODE: "false"

      # ── Security gate ─────────────────────────────────────────
      - name: Security scan (bandit)
        run: |
          pip install bandit[toml]
          bandit -r app/ -c pyproject.toml --severity-filter HIGH --confidence-filter HIGH

      # ── Build & push Docker images ────────────────────────────
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push app-stack images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.app
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.AI_IMAGE }}:latest
            ${{ env.AI_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.SCHEDULER_IMAGE }}:latest
            ${{ env.SCHEDULER_IMAGE }}:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.tools
          push: true
          tags: |
            ${{ env.WORKER_IMAGE }}:latest
            ${{ env.WORKER_IMAGE }}:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push caddy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.caddy
          push: true
          tags: |
            ${{ env.CADDY_IMAGE }}:latest
            ${{ env.CADDY_IMAGE }}:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Commit version bump ───────────────────────────────────
      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/version.py
          git diff --cached --quiet && exit 0
          git commit -m "release: ${{ steps.version.outputs.version }}"
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Tag & GitHub Release ──────────────────────────────────
      - name: Tag release
        run: |
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        id: changelog
        run: |
          chmod +x .github/scripts/generate_changelog.sh
          CHANGELOG=$(.github/scripts/generate_changelog.sh "${{ steps.version.outputs.version }}")
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        continue-on-error: true
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Deploy (separate job, gated by 'production' environment) ──
  deploy:
    name: Deploy to production
    needs: release
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"

      - name: Pre-deploy database backup
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            BACKUP_DIR=~/spectra/data/backups
            mkdir -p "$BACKUP_DIR"
            BACKUP_FILE="$BACKUP_DIR/spectra_pre_deploy_$(date -u '+%Y%m%d_%H%M%S').sql.gz"
            if docker ps -q -f "name=spectra-db" | grep -q .; then
              docker exec spectra-db pg_dump -U spectra -d spectra | gzip > "$BACKUP_FILE"
              echo "Backup saved: $BACKUP_FILE ($(du -h "$BACKUP_FILE" | cut -f1))"
            else
              echo "WARN: DB container not running — skipping backup"
            fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ~/spectra

            export REGISTRY=ghcr.io/breixopd14/
            export VERSION=${{ needs.release.outputs.version }}

            # Login to GHCR for the pull
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker compose -f docker/docker-compose.yml pull

            # Deploy
            docker compose -f docker/docker-compose.yml up -d --remove-orphans

      - name: Post-deploy health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            HEALTH_PORT="${HEALTH_PORT:-80}"
            WAIT=2
            for i in 1 2 3 4 5; do
              if curl -sf --max-time 10 "http://localhost:${HEALTH_PORT}/api/health" > /dev/null 2>&1; then
                echo "Health check passed (attempt $i)"
                exit 0
              fi
              echo "Health check failed (attempt $i/5), retrying in ${WAIT}s..."
              sleep "$WAIT"
              WAIT=$((WAIT * 2))
            done
            echo "Health check FAILED after 5 attempts"
            exit 1

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ~/spectra
            echo "Deploy failed — rolling back..."

            BACKUP_FILE=$(find ~/spectra/data/backups -name "spectra_pre_deploy_*.sql.gz" -type f | sort | tail -n 1)

            # Restart previous containers
            docker compose -f docker/docker-compose.yml down --timeout 30 || true
            docker compose -f docker/docker-compose.yml up -d

            # Restore DB if backup exists
            if [ -n "$BACKUP_FILE" ] && [ -f "$BACKUP_FILE" ]; then
              sleep 15  # Wait for DB to be ready
              gunzip -c "$BACKUP_FILE" | docker exec -i spectra-db psql -U spectra -d spectra || true
              echo "Database restored from $BACKUP_FILE"
            fi

            # Verify rollback
            sleep 10
            if curl -sf "http://localhost:${HEALTH_PORT:-80}/api/health" > /dev/null 2>&1; then
              echo "Rollback successful"
            else
              echo "CRITICAL: Rollback health check failed — manual intervention required"
              exit 1
            fi

      - name: Deploy notification
        if: always()
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          STATUS="${{ job.status }}"
          VERSION="${{ needs.release.outputs.version }}"
          WEBHOOK_URL="$DEPLOY_WEBHOOK_URL"

          if [ -z "$WEBHOOK_URL" ]; then
            echo "No DEPLOY_WEBHOOK_URL configured — skipping notification"
            exit 0
          fi

          if [ "$STATUS" = "success" ]; then
            MSG="Spectra v${VERSION} deployed to production successfully"
          else
            MSG="Spectra v${VERSION} deploy FAILED (status: ${STATUS})"
          fi

          curl -sf --max-time 10 -X POST -H 'Content-Type: application/json' \
            -d "{\"text\":\"$MSG\"}" "$WEBHOOK_URL" || true
