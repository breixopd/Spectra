name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    # Feature work lands in dev first; promotion from dev to main uses the
    # exact same required checks.
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # TensorZero validates provider credentials at boot even for tests that do
  # not invoke an LLM. This inert value is never used for inference and keeps
  # CI health checks deterministic without storing customer credentials.
  DEEPSEEK_API_KEY: spectra-ci-test-key

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # Keep the protected release branch's evidence intact while superseding stale
  # pull-request and development-branch runs.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # One image build (Dockerfile.test): Ruff, import boundaries, Pyright, Bandit — avoids
  # duplicating the same docker build across separate jobs on fresh runners.
  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
        with:
          persist-credentials: false
      - name: Build Docker test runner
        run: docker build -f deploy/docker/Dockerfile.test -t spectra-test-ci .
      - name: Ruff format
        run: docker run --rm spectra-test-ci python -m ruff format --check tests/ services/ packages/ scripts/ db/
      - name: Ruff
        run: docker run --rm spectra-test-ci python -m ruff check tests/ services/ packages/ scripts/ db/
      - name: Import boundaries
        run: docker run --rm spectra-test-ci python scripts/check_import_boundaries.py
      - name: Pyright
        run: docker run --rm spectra-test-ci pyright
      - name: Bandit
        run: docker run --rm spectra-test-ci bandit -r packages/ services/ -c pyproject.toml --severity-level high --confidence-level high

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      ENCRYPTION_KEY: test-encryption-key
      ENV_FILE: ../../.env.test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
        with:
          persist-credentials: false
      - name: Ensure .env.test for Docker Compose
        run: test -f .env.test || cp .env.test.example .env.test
      - name: Build Docker unit runner
        run: docker compose -f deploy/docker/compose.yaml --profile test build unit-test-runner
      - name: Validate TensorZero config
        run: |
          docker compose -f deploy/docker/compose.yaml --profile test run --rm --no-deps unit-test-runner "python -c \"import tomllib; tomllib.load(open('config/tensorzero.toml', 'rb')); print('tensorzero.toml: valid')\""
      - name: Prepare unit database
        run: |
          docker compose -f deploy/docker/compose.yaml --profile test run --rm unit-test-runner \
            "alembic upgrade head"
      - name: Run unit tests with coverage in Docker
        run: |
          set +e
          docker compose -f deploy/docker/compose.yaml --profile test run --name spectra-unit-coverage unit-test-runner \
            "python -m pytest tests/unit/ -q --timeout=120 --override-ini=addopts= --cov=spectra_api --cov=spectra_worker --cov=spectra_ai --cov=spectra_scheduler --cov=spectra_ai_core --cov=spectra_billing --cov=spectra_common --cov=spectra_auth --cov=spectra_contracts --cov=spectra_domain --cov=spectra_infra --cov=spectra_mission --cov=spectra_observability --cov=spectra_persistence --cov=spectra_scaling --cov=spectra_storage_policy --cov=spectra_system --cov=spectra_tools --cov=spectra_tools_core --cov-report=term-missing --cov-report=xml:/tmp/coverage.xml --cov-fail-under=65"
          status=$?
          docker cp spectra-unit-coverage:/tmp/coverage.xml coverage.xml 2>/dev/null || true
          docker rm -f spectra-unit-coverage >/dev/null 2>&1 || true
          exit "$status"
      - name: Run settings tests in Docker
        run: |
          docker compose -f deploy/docker/compose.yaml --profile test run --rm settings-test-runner
      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage.xml ]; then
            echo '## Coverage Report' >> "$GITHUB_STEP_SUMMARY"
            python3 << 'PYEOF' >> "$GITHUB_STEP_SUMMARY"
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = float(root.attrib.get('line-rate', 0)) * 100
          print(f'| Metric | Value |')
          print(f'|--------|-------|')
          print(f'| Line coverage | {rate:.1f}% |')
          PYEOF
          fi
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
      - name: Remove copied coverage artifact
        if: always()
        run: rm -f coverage.xml

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      ENCRYPTION_KEY: test-encryption-key
      ENV_FILE: ../../.env.test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
        with:
          persist-credentials: false
      - name: Ensure .env.test for Docker Compose
        run: test -f .env.test || cp .env.test.example .env.test
      - name: Start integration infrastructure
        run: |
          ENV_FILE=../../.env.test docker compose -f deploy/docker/compose.yaml --profile app --profile test up -d --wait \
            db redis garage tensorzero metasploitable dvwa
          GARAGE_CONTAINER="$(docker compose -f deploy/docker/compose.yaml ps -q garage)" \
          GARAGE_ACCESS_KEY="${GARAGE_ACCESS_KEY:-GK0123456789abcdef01234567}" \
          GARAGE_SECRET_KEY="${GARAGE_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}" \
          GARAGE_PRINT_CREDENTIALS=0 \
            bash deploy/docker/garage-init.sh
      - name: Build and start integration services
        run: |
          ENV_FILE=../../.env.test docker compose -f deploy/docker/compose.yaml --profile app --profile test up -d --build --wait \
            app ai-svc scheduler worker tools caddy
      - name: Run integration tests in Docker
        run: |
          docker compose -f deploy/docker/compose.yaml --profile app --profile test run --rm --no-deps test-runner \
            "python -m pytest tests/integration/ -v --tb=short --timeout=120 --override-ini=addopts= -k 'not live and not e2e'"
      - name: Collect integration logs on failure
        if: failure()
        run: |
          mkdir -p integration-logs
          docker compose -f deploy/docker/compose.yaml --profile app --profile test logs --no-color > integration-logs/compose.log 2>&1 || true
      - name: Upload integration logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: integration-test-logs
          path: integration-logs/
          if-no-files-found: warn
          retention-days: 14
      - name: Tear down integration stack
        if: always()
        run: docker compose -f deploy/docker/compose.yaml --profile app --profile test down --volumes --remove-orphans

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.0.0
      - name: Ensure .env.test for Docker Compose
        run: test -f .env.test || cp .env.test.example .env.test
      - name: Validate Compose config
        run: ENV_FILE=../../.env.example docker compose --env-file .env.example -f deploy/docker/compose.yaml --profile app --profile test --profile targets config --quiet
      - name: Validate Swarm compose
        run: docker compose --env-file .env.example -f deploy/docker/docker-compose.swarm.yml config --quiet
      - name: Free hosted runner tool cache before image builds
        run: df -h
      - name: Build Caddy image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.0.0
        with:
          context: .
          file: deploy/docker/Dockerfile.caddy
          push: false
          load: true
          tags: spectra-caddy:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan Caddy image for critical CVEs
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: spectra-caddy:ci
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Free Docker cache after Caddy scan
        run: docker rmi spectra-caddy:ci || true; df -h
      - name: Build API image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.0.0
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: false
          load: true
          tags: spectra-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan API image for critical CVEs
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: spectra-api:ci
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Free Docker cache after API scan
        run: docker rmi spectra-api:ci || true; df -h
      - name: Build AI image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.0.0
        with:
          context: .
          file: deploy/docker/Dockerfile.ai
          push: false
          load: true
          tags: spectra-ai:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan AI image for critical CVEs
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: spectra-ai:ci
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Free Docker cache after AI scan
        run: docker rmi spectra-ai:ci || true; docker builder prune -af || true; docker system prune -f || true; df -h
      - name: Build scheduler image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.0.0
        with:
          context: .
          file: deploy/docker/Dockerfile.scheduler
          push: false
          load: true
          tags: spectra-scheduler:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan scheduler image for critical CVEs
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: spectra-scheduler:ci
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Free Docker cache after scheduler scan
        run: docker rmi spectra-scheduler:ci || true; df -h
      - name: Build worker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.0.0
        with:
          context: .
          file: deploy/docker/Dockerfile.worker
          push: false
          load: true
          tags: spectra-worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify first-party worker tool entry points
        run: docker run --rm --entrypoint sh spectra-worker:ci -c 'imds-fetcher --version && graphql-fuzzer --version'
      - name: Scan worker image for critical CVEs
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: spectra-worker:ci
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Free Docker cache after worker scan
        run: docker rmi spectra-worker:ci || true; df -h

  deps:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.0.0
        with:
          python-version: "3.11"
      # Audit the locked resolution (all transitive pins) instead of a manifest.
      - run: uv export --frozen --all-packages --no-emit-workspace --format requirements.txt -o /tmp/uv-lock-export.txt > /dev/null
      - run: uvx pip-audit --cache-dir /tmp/pip-audit-cache --progress-spinner off --strict --require-hashes -r /tmp/uv-lock-export.txt

  workflow-security:
    name: Workflow & Secret Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect exposed credentials
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.0.0
        with:
          python-version: "3.11"
      - name: Audit GitHub Actions workflow security
        run: uvx --from zizmor==1.28.0 zizmor .github/workflows

  compose-smoke:
    name: Compose Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [test, integration-test]
    # Run the full live smoke for pull requests and the protected release
    # branch. Feature branch pushes are covered by their pull request, avoiding
    # a second expensive stack boot for the same commit.
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    env:
      ENCRYPTION_KEY: test-encryption-key
      ENV_FILE: ../../.env.test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
        with:
          persist-credentials: false
      - name: Ensure .env.test for Docker Compose
        run: test -f .env.test || cp .env.test.example .env.test
      - name: Start test stack
        run: |
          docker compose -f deploy/docker/compose.yaml --profile app --profile targets --profile test up -d --build
      - name: Bootstrap Garage buckets
        run: |
          GARAGE_CONTAINER="$(docker compose -f deploy/docker/compose.yaml ps -q garage)" \
          GARAGE_ACCESS_KEY="${GARAGE_ACCESS_KEY:-GK0123456789abcdef01234567}" \
          GARAGE_SECRET_KEY="${GARAGE_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}" \
          GARAGE_PRINT_CREDENTIALS=0 \
            bash deploy/docker/garage-init.sh
      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to become healthy..."
          expected_services=(
            db redis garage registry clickhouse tensorzero
            app app-replica ai-svc scheduler tools worker caddy
          )
          compose=(docker compose -f deploy/docker/compose.yaml --profile app --profile targets --profile test)
          for i in $(seq 1 90); do
            missing=()
            pending=()
            unhealthy=()
            for service in "${expected_services[@]}"; do
              container_id=$("${compose[@]}" ps -q "$service" 2>/dev/null || true)
              if [ -z "$container_id" ]; then
                missing+=("$service")
                continue
              fi
              running=$(docker inspect --format '{{.State.Running}}' "$container_id" 2>/dev/null || echo false)
              if [ "$running" != true ]; then
                missing+=("$service")
                continue
              fi
              health=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$container_id" 2>/dev/null || echo unknown)
              case "$health" in
                unhealthy) unhealthy+=("$service") ;;
                starting|unknown) pending+=("$service") ;;
              esac
            done
            if [ "${#unhealthy[@]}" -gt 0 ]; then
              echo "Unhealthy expected services: ${unhealthy[*]}"
              "${compose[@]}" ps
              exit 1
            fi
            if [ "${#missing[@]}" -eq 0 ] && [ "${#pending[@]}" -eq 0 ]; then
              echo "All expected services are running and healthy (or have no healthcheck)."
              "${compose[@]}" ps
              break
            fi
            echo "Waiting... ($i/90) missing=${missing[*]:-none} pending=${pending[*]:-none}"
            sleep 5
          done
          if [ "${#missing[@]}" -ne 0 ] || [ "${#pending[@]}" -ne 0 ]; then
            echo "Timed out waiting for expected services to start" >&2
            "${compose[@]}" ps >&2 || true
            docker ps -a --filter "label=spectra.managed=true" --format "{{.Names}}\t{{.Status}}" >&2 || true
            exit 1
          fi
      # Performance runs first: it calls ensure_admin_setup() so a fresh postgres volume has an
      # admin user before e2e tests authenticate (see tests/platform_harness.py defaults).
      - name: Run performance smoke tests
        run: |
          docker compose -f deploy/docker/compose.yaml --profile app --profile targets --profile test run --rm \
            -e LOAD_TEST_APP_URL=http://app:5000 \
            test-runner \
            "python -m pytest tests/performance/test_api_latency.py -v --tb=short --timeout=120 --override-ini=addopts="
      - name: Run e2e API live tests
        run: |
          docker compose -f deploy/docker/compose.yaml --profile app --profile targets --profile test run --rm \
            -e APP_BASE_URL=http://app:5000 \
            test-runner \
            "python -m pytest tests/e2e/test_api_live.py -v --tb=short --timeout=120 --override-ini=addopts="
      - name: Run health endpoint integration test
        run: |
          docker compose -f deploy/docker/compose.yaml --profile app --profile targets --profile test run --rm \
            -e APP_BASE_URL=http://app:5000 \
            test-runner \
            "python -m pytest tests/integration/test_api_health_live.py -v --tb=short --timeout=120 --override-ini=addopts="
      - name: Run vulnerable-target live scan
        run: |
          docker compose -f deploy/docker/compose.yaml --profile app --profile targets --profile test run --rm --no-deps \
            -e VULN_WEB_HOST=spectra-vuln-web \
            -e VULN_SSH_HOST=spectra-vuln-ssh \
            -e VULN_NETWORK_HOST=spectra-vuln-network \
            test-runner \
            "python -m pytest tests/integration/test_live_scan.py -v -m live --timeout=120 --tb=short --override-ini=addopts= -p no:cov"
      - name: Collect logs on failure
        if: failure()
        run: |
          mkdir -p compose-logs
          for container in $(docker ps -aq --filter "label=spectra.managed=true"); do
            name=$(docker inspect --format '{{.Name}}' "$container" | sed 's/^\///')
            docker logs "$container" > "compose-logs/${name}.log" 2>&1 || true
          done
      - name: Upload container logs as artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: compose-smoke-logs
          path: compose-logs/
      - name: Stop test stack
        if: always()
        run: |
          docker compose -f deploy/docker/compose.yaml --profile app --profile targets --profile test down -v --remove-orphans
