name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check app/
      - name: Check import boundaries
        run: python3 scripts/check_import_boundaries.py

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: spectra
          POSTGRES_PASSWORD: spectra_test
          POSTGRES_DB: spectra_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U spectra -d spectra_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements/base.txt numpy
      - name: Validate TensorZero config
        run: |
          python3 -c "import tomllib; tomllib.load(open('config/tensorzero.toml', 'rb')); print('tensorzero.toml: valid')"
      - name: Run unit tests with coverage
        run: |
          python3 -m pytest tests/unit/ -q \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70
        env:
          DATABASE_URL: "postgresql+asyncpg://spectra:spectra_test@localhost:5433/spectra_test"
          TENSORZERO_GATEWAY_URL: "http://localhost:3000"
          DATA_ROOT: /tmp/spectra-data
          JWT_SECRET_KEY: test-key
          PLUGIN_SAFE_MODE: "false"
      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage.xml ]; then
            echo '## Coverage Report' >> "$GITHUB_STEP_SUMMARY"
            python3 << 'PYEOF' >> "$GITHUB_STEP_SUMMARY"
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = float(root.attrib.get('line-rate', 0)) * 100
          print(f'| Metric | Value |')
          print(f'|--------|-------|')
          print(f'| Line coverage | {rate:.1f}% |')
          PYEOF
          fi
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: spectra
          POSTGRES_PASSWORD: spectra_test
          POSTGRES_DB: spectra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spectra -d spectra_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements/base.txt numpy pytest-timeout
      - name: Run integration tests
        run: |
          python3 -m pytest tests/integration/ -v --tb=short \
            --timeout=120 \
            --override-ini="addopts=" \
            -k "not live and not e2e"
        env:
          DATABASE_URL: "postgresql+asyncpg://spectra:spectra_test@localhost:5432/spectra_test"
          TENSORZERO_GATEWAY_URL: "http://localhost:3000"
          DATA_ROOT: /tmp/spectra-data
          JWT_SECRET_KEY: test-key
          PLUGIN_SAFE_MODE: "false"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install bandit[toml]
      - run: bandit -r app/ -c pyproject.toml -f json -o bandit-report.json || true
      - run: bandit -r app/ -c pyproject.toml --severity-level high --confidence-level high

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.caddy
          push: false
          load: false
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.app
          push: false
          load: false
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.tools
          push: false
          load: false
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.test
          push: false
          load: false
      - name: Validate Docker Compose
        run: docker compose --env-file .env.example -f docker/docker-compose.yml config --quiet
      - name: Validate Swarm compose
        run: docker compose --env-file .env.example -f docker/docker-compose.swarm.yml config --quiet

  deps:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install pip-audit
      - run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config python3-dev
      - run: pip install -r requirements/app.txt
      # pip-audit: keep || true because transitive dependency vulns in pinned
      # packages shouldn't block CI; ignore known disputed advisories.
      - run: pip-audit --fix --dry-run -l --ignore-vuln PYSEC-2024-65 --ignore-vuln PYSEC-2024-66 || true

  version-check:
    name: Version file check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify app/version.py exists and has __version__
        run: |
          python3 -c "exec(open('app/version.py').read()); print('Version:', __version__)"
