name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check app/ --select F821,F841,E722

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/unit/ --no-cov -q
        env:
          AI_PROVIDER: mock
          DATABASE_URL: "sqlite+aiosqlite:///test.db"
          REDIS_HOST: localhost
          REDIS_PASSWORD: changeme
          JWT_SECRET_KEY: test-key
          PLUGIN_SAFE_MODE: "false"
          FULLY_AUTOMATED: "true"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f docker/Dockerfile.app -t spectra-app .
