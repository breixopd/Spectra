name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker test runner
        run: docker build -f docker/Dockerfile.test -t spectra-test-ci .
      - name: Run lint in Docker
        run: docker run --rm spectra-test-ci python -m ruff check app/ tests/
      - name: Check import boundaries in Docker
        run: docker run --rm spectra-test-ci python scripts/check_import_boundaries.py

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install pyright
      - run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config python3-dev
      - run: pip install -r requirements/app.txt
      - run: pyright

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      ENCRYPTION_KEY: test-encryption-key
    steps:
      - uses: actions/checkout@v4
      - name: Ensure .env.test for Docker Compose
        run: test -f .env.test || cp .env.test.example .env.test
      - name: Build Docker unit runner
        run: docker compose -f docker/docker-compose.test.yml build unit-test-runner
      - name: Validate TensorZero config
        run: |
          docker compose -f docker/docker-compose.test.yml run --rm --no-deps unit-test-runner "python -c \"import tomllib; tomllib.load(open('config/tensorzero.toml', 'rb')); print('tensorzero.toml: valid')\""
      - name: Run unit tests with coverage in Docker
        run: |
          set +e
          docker compose -f docker/docker-compose.test.yml run --name spectra-unit-coverage unit-test-runner \
            "python -m pytest tests/unit/ -q --override-ini=addopts= --cov=app --cov-report=term-missing --cov-report=xml:/tmp/coverage.xml --cov-fail-under=67.4"
          status=$?
          docker cp spectra-unit-coverage:/tmp/coverage.xml coverage.xml 2>/dev/null || true
          docker rm -f spectra-unit-coverage >/dev/null 2>&1 || true
          exit "$status"
      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage.xml ]; then
            echo '## Coverage Report' >> "$GITHUB_STEP_SUMMARY"
            python3 << 'PYEOF' >> "$GITHUB_STEP_SUMMARY"
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = float(root.attrib.get('line-rate', 0)) * 100
          print(f'| Metric | Value |')
          print(f'|--------|-------|')
          print(f'| Line coverage | {rate:.1f}% |')
          PYEOF
          fi
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
      - name: Remove copied coverage artifact
        if: always()
        run: rm -f coverage.xml

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    env:
      ENCRYPTION_KEY: test-encryption-key
    steps:
      - uses: actions/checkout@v4
      - name: Ensure .env.test for Docker Compose
        run: test -f .env.test || cp .env.test.example .env.test
      - name: Build Docker integration runner
        run: docker compose -f docker/docker-compose.test.yml build test-runner
      - name: Run integration tests in Docker
        run: |
          docker compose -f docker/docker-compose.test.yml run --rm test-runner \
            "python -m pytest tests/integration/ -v --tb=short --timeout=120 --override-ini=addopts= -k 'not live and not e2e'"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker test runner
        run: docker build -f docker/Dockerfile.test -t spectra-test-ci .
      - name: Run Bandit in Docker
        run: docker run --rm spectra-test-ci bandit -r app/ -c pyproject.toml --severity-level high --confidence-level high

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.caddy
          push: false
          load: true
          tags: spectra-caddy:ci
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: false
          load: true
          tags: spectra-api:ci
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ai
          push: false
          load: true
          tags: spectra-ai:ci
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.scheduler
          push: false
          load: true
          tags: spectra-scheduler:ci
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.worker
          push: false
          load: true
          tags: spectra-worker:ci
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.test
          push: false
          load: false
      - name: Validate Docker Compose
        run: docker compose --env-file .env.example -f docker/docker-compose.yml config --quiet
      - name: Validate Swarm compose
        run: docker compose --env-file .env.example -f docker/docker-compose.swarm.yml config --quiet
      - name: Scan API image for critical CVEs
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: spectra-api:ci
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Scan AI image for critical CVEs
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: spectra-ai:ci
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Scan scheduler image for critical CVEs
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: spectra-scheduler:ci
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Scan worker image for critical CVEs
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: spectra-worker:ci
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Scan Caddy image for critical CVEs
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: spectra-caddy:ci
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  deps:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install pip-audit
      - run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config python3-dev
      - run: pip install -r requirements/app.txt
      # pip-audit: hard gate — vulnerabilities block CI; ignore known disputed advisories.
      - run: pip-audit --fix --dry-run -l --ignore-vuln PYSEC-2024-65 --ignore-vuln PYSEC-2024-66

  version-check:
    name: Version file check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify app/version.py exists and has __version__
        run: |
          python3 -c "exec(open('app/_meta/version.py').read()); print('Version:', __version__)"

  performance-smoke:
    name: Performance Smoke Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    continue-on-error: false
    env:
      ENCRYPTION_KEY: test-encryption-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config python3-dev
      - run: pip install -r requirements/app.txt
      - run: pip install -r requirements/dev.txt
      - run: pytest tests/performance/test_api_latency.py -v --tb=short
