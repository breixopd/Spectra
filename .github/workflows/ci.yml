name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check app/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt numpy
      - name: Run unit tests with coverage
        run: |
          python3 -m pytest tests/unit/ -q \
            --cov=app \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=40
        env:
          AI_PROVIDER: mock
          DATABASE_URL: "sqlite+aiosqlite:///test.db"
          JWT_SECRET_KEY: test-key
          PLUGIN_SAFE_MODE: "false"
          FULLY_AUTOMATED: "true"
      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage.xml ]; then
            echo '## Coverage Report' >> "$GITHUB_STEP_SUMMARY"
            python3 << 'PYEOF' >> "$GITHUB_STEP_SUMMARY"
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = float(root.attrib.get('line-rate', 0)) * 100
          print(f'| Metric | Value |')
          print(f'|--------|-------|')
          print(f'| Line coverage | {rate:.1f}% |')
          PYEOF
          fi
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: spectra
          POSTGRES_PASSWORD: spectra_test
          POSTGRES_DB: spectra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spectra -d spectra_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt numpy
      - name: Run integration tests
        run: |
          python3 -m pytest tests/integration/ -q \
            --timeout=120 \
            -k "not live and not e2e" \
            || true
        env:
          AI_PROVIDER: mock
          DATABASE_URL: "postgresql+asyncpg://spectra:spectra_test@localhost:5432/spectra_test"
          JWT_SECRET_KEY: test-key
          PLUGIN_SAFE_MODE: "false"
          FULLY_AUTOMATED: "true"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit[toml]
      - run: bandit -r app/ -c pyproject.toml -f json -o bandit-report.json || true
      - run: bandit -r app/ -c pyproject.toml --severity-level high --confidence-level high

  deps:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      - run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config python3-dev
      - run: pip install -r requirements-app.txt
      - run: pip-audit --fix --dry-run || true  # Report only, don't fail CI

  version-check:
    name: Version file check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify app/version.py exists and has __version__
        run: |
          python3 -c "exec(open('app/version.py').read()); print('Version:', __version__)"
