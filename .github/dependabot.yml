version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    # Version bumps are validated on dev before the release promotion to main.
    # GitHub still sends security-update PRs to the default branch.
    target-branch: "dev"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/apps/web"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/config"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/deploy/docker"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
